<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Payment Options</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html {
      -webkit-user-select: none;
      -webkit-text-size-adjust: 100%;
    }

    body {
      background: #0a0e1a url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><defs><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/></filter></defs><rect width="100" height="100" fill="%23000" filter="url(%23noise)" opacity="0.03"/></svg>');
      background-attachment: fixed;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      color: #e8e9ed;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at 20% 50%, rgba(255,140,0,0.15), transparent 50%), radial-gradient(circle at 80% 80%, rgba(0,200,150,0.1), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    body > * { position: relative; z-index: 1; }

    .pay-container {
      background: linear-gradient(135deg, rgba(30,35,50,0.78), rgba(25,30,45,0.73));
      border-radius: 28px;
      padding: 36px 30px 30px;
      max-width: 480px;
      width: 100%;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px) saturate(140%);
      text-align: center;
    }

    h3 {
      font-size: 24px;
      font-weight: 800;
      color: #f5e6d3;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-shadow: 0 0 15px rgba(255,140,0,0.3);
    }

    .pay-sub {
      color: #aeb5c4;
      font-size: 14px;
      margin-bottom: 20px;
      letter-spacing: 0.02em;
    }

    .amount-box {
      background: linear-gradient(135deg, rgba(40,50,70,0.4), rgba(35,45,65,0.35));
      border-radius: 16px;
      padding: 18px 20px;
      text-align: center;
      margin-bottom: 24px;
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(8px);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
    }

    .amount-label {
      font-size: 13px;
      color: #aeb5c4;
      margin-bottom: 4px;
      letter-spacing: 0.04em;
    }

    .amount-value {
      font-size: 28px;
      font-weight: 900;
      color: #00d9a3;
      text-shadow: 0 0 12px rgba(0,220,170,0.35);
    }

    .pay-toggle-row {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 20px;
    }

    .pay-tab {
      padding: 14px 20px;
      border-radius: 12px;
      border: none;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 200ms ease;
      min-height: 44px;
      touch-action: manipulation;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .pay-tab.primary {
      background: linear-gradient(135deg, #ffaa00, #ff8c00);
      color: #0a0e1a;
      box-shadow: 0 0 20px rgba(255,140,0,0.4);
    }

    .pay-tab.primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 28px rgba(255,140,0,0.6), 0 10px 22px rgba(0,0,0,0.3);
    }

    .pay-tab.primary:active {
      transform: scale(0.98);
    }

    .pay-tab.secondary {
      background: linear-gradient(135deg, rgba(40,50,70,0.3), rgba(35,45,65,0.25));
      color: #00d9a3;
      border: 1.5px solid rgba(0,220,170,0.4);
      box-shadow: 0 0 16px rgba(0,220,170,0.2);
      backdrop-filter: blur(8px);
    }

    .pay-tab.secondary:hover {
      background: linear-gradient(135deg, rgba(40,50,70,0.4), rgba(35,45,65,0.35));
      border-color: rgba(0,220,170,0.6);
      box-shadow: 0 0 24px rgba(0,220,170,0.35);
      transform: translateY(-2px);
    }

    .pay-tab.secondary:active {
      transform: scale(0.98);
    }

    .note {
      font-size: 12px;
      color: #aeb5c4;
      letter-spacing: 0.02em;
      margin-top: 12px;
    }

    .back-btn {
      position: absolute;
      top: 20px;
      left: 20px;
      background: linear-gradient(135deg, rgba(40,50,70,0.5), rgba(35,45,65,0.45));
      border-radius: 12px;
      padding: 10px 14px;
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 13px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.08);
      color: #aeb5c4;
      z-index: 200;
      min-height: 44px;
      min-width: 44px;
      touch-action: manipulation;
      backdrop-filter: blur(8px);
      transition: all 200ms ease;
    }

    .back-btn:hover {
      background: linear-gradient(135deg, rgba(40,50,70,0.65), rgba(35,45,65,0.6));
      border-color: rgba(0,220,170,0.2);
      color: #f5e6d3;
      box-shadow: 0 0 16px rgba(0,220,170,0.2), inset 0 1px 0 rgba(255,255,255,0.1);
      transform: translateY(-1px);
    }

    .back-btn:active {
      transform: scale(0.98);
    }

    /* PREMIUM GLASSMORPHIC USER-BAR */
    .user-bar {
      position: fixed !important;
      top: 14px !important;
      left: 50% !important;
      transform: translateX(-50%) !important;
      max-width: 720px !important;
      width: calc(100% - 28px) !important;
      background: linear-gradient(135deg, rgba(30,35,50,0.8), rgba(25,30,45,0.77)) !important;
      backdrop-filter: blur(16px) saturate(160%) !important;
      border-radius: 20px !important;
      padding: 12px 20px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: space-between !important;
      z-index: 999 !important;
      box-shadow: 0 16px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.12) !important;
      border: 1px solid rgba(255,255,255,0.08) !important;
    }

    .user-info {
      display: flex !important;
      align-items: center !important;
      gap: 10px !important;
    }

    .user-avatar {
      width: 48px !important;
      height: 48px !important;
      border-radius: 12px !important;
      background: linear-gradient(135deg, rgba(255,140,0,0.5), rgba(255,160,20,0.45)) !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      color: #f5e6d3 !important;
      font-weight: 800 !important;
      font-size: 18px !important;
      box-shadow: 0 0 20px rgba(255,160,0,0.4) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
    }

    .user-text {
      display: flex !important;
      flex-direction: column !important;
      gap: 2px !important;
    }

    .user-name {
      color: #f5e6d3 !important;
      font-weight: 700 !important;
      font-size: 13px !important;
      letter-spacing: 0.04em !important;
    }

    .user-email {
      color: #aeb5c4 !important;
      font-size: 11px !important;
      letter-spacing: 0.02em !important;
    }

    .logout-btn {
      background: linear-gradient(135deg, rgba(0,200,150,0.3), rgba(0,180,140,0.25)) !important;
      border: 1px solid rgba(0,220,170,0.3) !important;
      color: #00d9a3 !important;
      padding: 8px 16px !important;
      border-radius: 10px !important;
      font-size: 12px !important;
      font-weight: 700 !important;
      cursor: pointer !important;
      transition: all 200ms ease !important;
      box-shadow: 0 0 16px rgba(0,220,170,0.35) !important;
      letter-spacing: 0.04em !important;
      text-transform: uppercase !important;
    }

    .logout-btn:hover {
      background: linear-gradient(135deg, rgba(0,220,170,0.4), rgba(0,200,150,0.35)) !important;
      box-shadow: 0 0 24px rgba(0,220,170,0.5) !important;
      transform: translateY(-1px) !important;
    }

    .logout-btn:active {
      transform: scale(0.98) !important;
    }

    /* Adjust container for fixed header */
    .page-with-header {
      margin-top: 82px !important;
    }

    @media (max-width: 480px) {
      .pay-container {
        border-radius: 16px;
        padding: 24px 16px 20px;
        margin-top: 40px;
      }

      h3 {
        font-size: 20px;
      }

      .pay-tab {
        font-size: 13px;
        padding: 12px 16px;
      }

      .back-btn {
        top: 10px;
        left: 10px;
        padding: 10px 12px;
        font-size: 12px;
      }
    }
  </style>
</head>
<body>
<script src="fp-config.js"></script>
<script src="fp-fetch-proxy.js"></script>
<script src="api.js"></script>
<script src="dev-check.js"></script>
  <div class="user-bar">
    <div class="user-info">
      <div class="user-avatar">FP</div>
      <div class="user-text">
        <div class="user-name">Food Point</div>
        <div class="user-email">Payment</div>
      </div>
    </div>
    <button class="logout-btn" onclick="location.href='home.html'">Home</button>
  </div>

  <button class="back-btn" onclick="history.back()">← Back</button>
  <div class="pay-container page-with-header">
    <h3>PAYMENT</h3>
    <p class="pay-sub">Choose how you want to pay.</p>
    <div class="amount-box">
      <div class="amount-label">Amount to pay</div>
      <div id="amountValue" class="amount-value">₹0.00</div>
    </div>
    <div class="pay-toggle-row">
      <button id="btnPay" class="pay-tab primary" onclick="goToPayment()">PAY</button>
    </div>
    <p class="note">You can still see full details on the next screen.</p>
  </div>
  <script>
    function getAmount() { return localStorage.getItem('amountPaid') || '₹149.99'; }
    function setPayment(m) { localStorage.setItem('paymentMethod', m); localStorage.setItem('amountPaid', getAmount()); }
    function selectCash() { setPayment('cash'); localStorage.setItem('justPaid','1'); location.href='thank-you.html'; }
    function selectOnline() { setPayment('online'); location.href='payment-upi.html'; }
    function goToPayment() { try { localStorage.setItem('amountPaid', getAmount()); } catch(e){}; location.href='payment-upi.html'; }
    document.addEventListener('DOMContentLoaded', () => { document.getElementById('amountValue').textContent = getAmount(); });
    // Defensive cleanup in case of stray 'uud' or tiny text nodes
    document.addEventListener('DOMContentLoaded', () => {
      const bodyChildren = Array.from(document.body.childNodes);
      bodyChildren.forEach((n) => { if (n.nodeType === Node.TEXT_NODE && n.nodeValue.trim().toLowerCase().includes('uud')) n.parentNode.removeChild(n); });
    });
  </script>
</body>
</html>
