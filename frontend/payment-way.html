<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>FOOD POINT · Choose Payment • Crypto Style</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Backgrounds - Crypto Dark Theme */
      --bg-primary: #0A0A0F;
      --bg-secondary: #111116;
      --bg-card: #15171E;
      --bg-elevated: #1A1C23;
      --bg-userbar: #0D0D12;
      
      /* Text Colors */
      --text-primary: #FFFFFF;
      --text-secondary: #8A8F9E;
      --text-muted: #5A5F73;
      
      /* Accent Colors */
      --accent-green: #00FF85;
      --accent-blue: #3B82F6;
      --accent-red: #FF4D4D;
      --accent-orange: #F97316;
      --accent-purple: #A855F7;
      
      /* Borders */
      --border-subtle: #1E1E2E;
      --border-card: rgba(255, 255, 255, 0.05);
      
      /* Spacing */
      --spacing-xs: 0.5rem;
      --spacing-sm: 1rem;
      --spacing-md: 1.5rem;
      --spacing-lg: 2rem;
      --spacing-xl: 3rem;
      
      /* Border Radius */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      
      /* Gradients */
      --gradient-primary: linear-gradient(135deg, #00FF85 0%, #00C96D 100%);
      --gradient-card-hover: linear-gradient(180deg, #1A1C23 0%, #111116 100%);
      --gradient-glow: radial-gradient(circle at 50% 0%, rgba(0, 255, 133, 0.08), transparent);
      --gradient-amount: linear-gradient(135deg, #00FF85 0%, #3B82F6 100%);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(0, 255, 133, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255, 157, 77, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 50% 0%, rgba(255, 100, 50, 0.12) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      animation: gradientShift 15s ease-in-out infinite;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(90deg, transparent 1px, rgba(0, 255, 133, 0.03) 1px),
        linear-gradient(transparent 1px, rgba(0, 255, 133, 0.03) 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
      animation: gridShift 20s linear infinite;
    }

    /* User Bar */
    .user-bar {
      background: linear-gradient(135deg, rgba(13, 13, 18, 0.95) 0%, rgba(21, 23, 30, 0.9) 100%);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(0, 255, 133, 0.1);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: fixed;
      top: 20px;
      left: 50%;
      border-radius: 50px;
      z-index: 100;
      max-width: 600px;
      width: calc(100% - 40px);
      box-shadow: 0 8px 32px rgba(0, 255, 133, 0.08), 0 0 20px rgba(0, 255, 133, 0.04);
      animation: floatingBar 3s ease-in-out infinite, userBarEnter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);\n    }\n\n    .user-bar:hover {\n      box-shadow: 0 12px 40px rgba(0, 255, 133, 0.15), 0 0 30px rgba(0, 255, 133, 0.08);\n      border-color: rgba(0, 255, 133, 0.2);\n    }

    @keyframes userBarEnter {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    @keyframes floatingBar {
      0%, 100% {
        transform: translateX(-50%) translateY(0);
      }
      50% {
        transform: translateX(-50%) translateY(-8px);
      }
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-avatar {
      width: 44px;
      height: 44px;
      background: var(--gradient-primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 20px;
      color: #0A0A0F;
      animation: avatarPulse 2s ease-in-out infinite;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .user-avatar:hover {
      transform: scale(1.1) rotate(5deg);
      box-shadow: 0 0 20px rgba(0, 255, 133, 0.4);
    }

    @keyframes avatarPulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(0, 255, 133, 0.4);
      }
      50% {
        box-shadow: 0 0 0 8px rgba(0, 255, 133, 0);
      }
    }

    .user-text .user-name {
      font-weight: 700;
      font-size: 15px;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .user-text .user-email {
      font-size: 11px;
      color: var(--text-muted);
    }

    .logout-btn {
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      padding: 8px 20px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: buttonEnter 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s backwards;
    }

    .logout-btn:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      background: rgba(59, 130, 246, 0.05);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(59, 130, 246, 0.25);\n    }

    @keyframes buttonHoverGlow {
      0% {
        box-shadow: 0 0 0 0 rgba(59, 130, 246, 0.4);
      }
      100% {
        box-shadow: 0 0 0 0 rgba(59, 130, 246, 0);
      }
    }

    /* Floating circles */
    .bg-circle-1,
    .bg-circle-2,
    .bg-circle-3 {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(40px);
    }

    .bg-circle-1 {
      width: 300px;
      height: 300px;
      top: 10%;
      right: 5%;
      background: radial-gradient(circle, rgba(0, 255, 133, 0.3) 0%, rgba(0, 255, 133, 0.1) 40%, transparent 70%);
      animation: floatComplex1 25s ease-in-out infinite;
    }

    .bg-circle-2 {
      width: 250px;
      height: 250px;
      bottom: 15%;
      left: 8%;
      background: radial-gradient(circle, rgba(255, 157, 77, 0.25) 0%, rgba(255, 157, 77, 0.08) 40%, transparent 70%);
      animation: floatComplex2 30s ease-in-out infinite;
    }

    .bg-circle-3 {
      width: 280px;
      height: 280px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(255, 100, 50, 0.2) 0%, rgba(255, 100, 50, 0.05) 40%, transparent 70%);
      animation: floatComplex3 35s ease-in-out infinite;
    }

    /* Back Button */
    .back-btn {
      position: fixed;
      top: 80px;
      left: 24px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      padding: 10px 18px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: 'Inter', sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      z-index: 99;
      backdrop-filter: blur(10px);
      animation: buttonEnter 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s backwards;
    }

    .back-btn:hover {
      border-color: var(--accent-green);
      color: var(--accent-green);
      background: rgba(0, 255, 133, 0.05);
      transform: translateX(-4px);
      box-shadow: 0 0 20px rgba(0, 255, 133, 0.25);
    }

    /* Payment Container */
    .pay-container {
      max-width: 500px;
      margin: 0 auto;
      padding: 120px 20px 60px;
      position: relative;
      z-index: 1;
      animation: pageEnter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }

    .pay-container h3 {
      font-size: 1.8rem;
      font-weight: 800;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 20px rgba(0, 255, 133, 0.3));
      animation: titleShimmer 3s ease-in-out infinite;
    }

    @keyframes titleShimmer {
      0%, 100% {
        filter: drop-shadow(0 0 20px rgba(0, 255, 133, 0.3));
      }
      50% {
        filter: drop-shadow(0 0 30px rgba(0, 255, 133, 0.5));
      }
    }

    .pay-sub {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      margin-bottom: 32px;
      animation: subtitleEnter 0.8s ease-out 0.15s backwards;
    }

    @keyframes subtitleEnter {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Amount Box */
    .amount-box {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-xl);
      padding: 28px;
      text-align: center;
      margin-bottom: 32px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: cardEnter 0.85s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
      position: relative;
      overflow: hidden;
    }

    .amount-box::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(0, 255, 133, 0.15), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.3;
      animation: shimmerPulse 4s ease-in-out infinite;
    }

    @keyframes shimmerPulse {
      0%, 100% {
        opacity: 0.2;
      }
      50% {
        opacity: 0.5;
      }
    }

    .amount-box:hover {
      box-shadow: 0 18px 45px -12px rgba(0, 255, 133, 0.25), inset 0 0 20px rgba(0, 255, 133, 0.08);
      border-color: rgba(0, 255, 133, 0.3);
      transform: translateY(-3px) scale(1.01);
    }

    .amount-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 12px;
      animation: fadeInUp 0.6s ease-out 0.15s backwards;
    }

    .amount-value {
      font-size: 3rem;
      font-weight: 800;
      background: var(--gradient-amount);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
      animation: fadeInUp 0.6s ease-out 0.25s backwards;
    }

    /* Payment Methods */
    .pay-methods {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 32px;
    }

    .pay-option {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-lg);
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }

    .pay-option:nth-child(1) {
      animation: cardEnter 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s backwards;
    }

    .pay-option:nth-child(2) {
      animation: cardEnter 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.4s backwards;
    }

    .pay-option::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 133, 0.15), transparent);
      transition: left 0.6s ease;
      pointer-events: none;
    }

    .pay-option:hover::before {
      left: 100%;
    }

    .pay-option:hover {
      transform: translateX(6px) scale(1.02);
      border-color: var(--accent-green);
      box-shadow: 0 12px 28px rgba(0, 255, 133, 0.25), inset 0 0 15px rgba(0, 255, 133, 0.08);
    }

    .pay-option-left {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .pay-option-left i {
      font-size: 28px;
      width: 40px;
      text-align: center;
    }

    .pay-option-left .fa-money-bill-wave {
      color: var(--accent-green);
    }

    .pay-option-left .fa-qrcode {
      color: var(--accent-blue);
    }

    .pay-option-title {
      font-weight: 700;
      font-size: 1rem;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .pay-option-desc {
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .pay-option-arrow {
      color: var(--text-muted);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);\n    }\n\n    .pay-option:hover .pay-option-arrow {
      transform: translateX(6px);\n      color: var(--accent-green);
    }

    /* Note */
    .note {
      text-align: center;
      padding: 20px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      font-size: 0.75rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: noteEnter 0.6s ease-out 0.6s backwards;
      position: relative;
      overflow: hidden;
    }

    .note::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 133, 0.1), transparent);
      transition: left 0.6s ease;
      pointer-events: none;
    }

    .note:hover::before {
      left: 100%;
    }

    .note:hover {
      border-color: rgba(0, 255, 133, 0.3);
      box-shadow: 0 6px 16px rgba(0, 255, 133, 0.15);
      transform: translateY(-2px);
    }

    .note i {
      color: var(--accent-green);
    }

    @keyframes noteEnter {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Proceed Button */
    .proceed-btn {
      width: 100%;
      background: var(--gradient-primary);
      border: none;
      color: #0A0A0F;
      padding: 16px;
      border-radius: var(--radius-lg);
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: 'Inter', sans-serif;
      margin-bottom: 32px;
      box-shadow: 0 10px 25px -5px rgba(0, 255, 133, 0.3);
      animation: buttonEnter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s backwards;
      position: relative;
      overflow: hidden;
    }

    .proceed-btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transform: rotate(45deg);
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .proceed-btn:hover::before {
      opacity: 1;
      animation: shimmer 0.6s ease-in-out;
    }

    .proceed-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 16px 40px rgba(0, 255, 133, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.1);
      animation: buttonGlow 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
    }

    .proceed-btn:active {
      transform: translateY(0) scale(0.98);
    }

    @keyframes shimmer {
      0% {
        background-position: -1000px 0;
      }
      100% {
        background-position: 1000px 0;
      }
    }

    @keyframes buttonGlow {
      0%, 100% {
        box-shadow: 0 16px 40px rgba(0, 255, 133, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.1);
      }
      50% {
        box-shadow: 0 20px 50px rgba(0, 255, 133, 0.6), inset 0 0 15px rgba(255, 255, 255, 0.2);
      }
    }

    .user-bar,
    .back-btn,
    .logout-btn {
      animation: buttonPop 0.7s ease-out backwards;
    }

    .back-btn:hover,
    .logout-btn:hover {
      animation: buttonGlow 1.5s ease-in-out infinite;
    }

    @keyframes gradientShift {
      0%, 100% {
        background: 
          radial-gradient(circle at 20% 50%, rgba(0, 255, 133, 0.15) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(255, 157, 77, 0.1) 0%, transparent 50%),
          radial-gradient(circle at 50% 0%, rgba(255, 100, 50, 0.12) 0%, transparent 60%);
      }
      50% {
        background: 
          radial-gradient(circle at 80% 20%, rgba(0, 255, 133, 0.15) 0%, transparent 50%),
          radial-gradient(circle at 20% 80%, rgba(255, 157, 77, 0.1) 0%, transparent 50%),
          radial-gradient(circle at 50% 100%, rgba(255, 100, 50, 0.12) 0%, transparent 60%);
      }
    }

    @keyframes gridShift {
      0% {
        background-position: 0 0, 0 0;
      }
      100% {
        background-position: 50px 50px, 50px 50px;
      }
    }

    @keyframes floatComplex1 {
      0%, 100% {
        transform: translate(0, 0) scale(1) rotate(0deg);
      }
      25% {
        transform: translate(30px, -40px) scale(1.1) rotate(90deg);
      }
      50% {
        transform: translate(-20px, 30px) scale(0.95) rotate(180deg);
      }
      75% {
        transform: translate(40px, 20px) scale(1.05) rotate(270deg);
      }
    }

    @keyframes floatComplex2 {
      0%, 100% {
        transform: translate(0, 0) scale(1) rotate(0deg);
      }
      25% {
        transform: translate(-35px, 25px) scale(0.9) rotate(-90deg);
      }
      50% {
        transform: translate(25px, -35px) scale(1.08) rotate(-180deg);
      }
      75% {
        transform: translate(-20px, -15px) scale(0.98) rotate(-270deg);
      }
    }

    @keyframes floatComplex3 {
      0%, 100% {
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
      }
      25% {
        transform: translate(-50%, -40%) scale(1.08) rotate(45deg);
      }
      50% {
        transform: translate(-60%, -50%) scale(0.95) rotate(90deg);
      }
      75% {
        transform: translate(-40%, -60%) scale(1.05) rotate(135deg);
      }
    }

    @keyframes pageEnter {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.98);
        filter: blur(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes buttonEnter {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes buttonGlow {
      0%, 100% {
        box-shadow: 0 0 14px rgba(0, 255, 133, 0.16);
      }
      50% {
        box-shadow: 0 0 28px rgba(0, 255, 133, 0.28);
      }
    }

    @keyframes buttonPop {
      from {
        opacity: 0;
        transform: translateY(-10px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Responsive */
    @media (max-width: 560px) {
      .user-bar {
        padding: 10px 16px;
      }
      .back-btn {
        top: 70px;
        left: 16px;
        padding: 8px 14px;
        font-size: 12px;
      }
      .pay-container {
        padding: 90px 16px 40px;
      }
      .pay-container h3 {
        font-size: 1.4rem;
      }
      .amount-value {
        font-size: 2.2rem;
      }
      .pay-option {
        padding: 16px;
      }
      .pay-option-left i {
        font-size: 22px;
        width: 32px;
      }
      .pay-option-title {
        font-size: 0.9rem;
      }
    }

    /* Animation */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .pay-container {
      animation: fadeInUp 0.4s ease-out;
    }
  </style>
</head>
<body>

<!-- Floating circle decorations -->
<div class="bg-circle-1"></div>
<div class="bg-circle-2"></div>
<div class="bg-circle-3"></div>

<!-- external compatibility scripts (preserved) -->
<script src="fp-config.js"></script>
<script src="fp-fetch-proxy.js"></script>
<script src="api.js"></script>
<script src="dev-check.js"></script>

<div class="user-bar">
  <div class="user-info">
    <div class="user-avatar">🍔</div>
    <div class="user-text">
      <div class="user-name">FOOD POINT</div>
      <div class="user-email">secure checkout</div>
    </div>
  </div>
  <button class="logout-btn" onclick="history.back()"><i class="fas fa-arrow-left"></i> Back</button>
</div>

<div class="pay-container page-with-header">
  <h3>💳 PAYMENT</h3>
  <p class="pay-sub">Choose your preferred method</p>

  <div class="amount-box">
    <div class="amount-label">TOTAL AMOUNT</div>
    <div id="amountValue" class="amount-value">₹0.00</div>
  </div>

  <button class="proceed-btn" onclick="proceedToPayment()">Proceed to Payment</button>

  <div class="note">
    <i class="fas fa-lock"></i> 100% secure transaction · Instant confirmation
  </div>
</div>

<script>
  // ------------------- Helper functions (consistent with payment flow) -------------------
  function getCurrentUser() {
    try {
      const raw = localStorage.getItem("fp_current_user");
      return raw ? JSON.parse(raw) : null;
    } catch(e) { return null; }
  }

  function getUserSpecificKey(baseKey) {
    const user = getCurrentUser();
    return user && user.id ? baseKey + "_" + user.id : baseKey;
  }

  function safeGet(key) { try { return localStorage.getItem(getUserSpecificKey(key)); } catch(e) { return null; } }
  function safeSet(key, val) { try { localStorage.setItem(getUserSpecificKey(key), String(val)); } catch(e) {} }

  // Get current amount from storage (priority: amountPaidNumeric, amountPaid, cartItems calculation)
  function getCurrentAmount() {
    // first check numeric amount stored by cart
    let numeric = null;
    const amountNumRaw = safeGet('amountPaidNumeric');
    if (amountNumRaw && !isNaN(parseFloat(amountNumRaw))) {
      numeric = parseFloat(amountNumRaw);
    }
    if (numeric !== null && numeric > 0) {
      return '₹' + numeric.toFixed(2);
    }
    // check amountPaid string
    const amountStr = safeGet('amountPaid');
    if (amountStr && amountStr !== '₹0.00') {
      const cleaned = amountStr.replace(/[₹, ]+/g, '');
      const val = parseFloat(cleaned);
      if (!isNaN(val) && val > 0) return '₹' + val.toFixed(2);
    }
    // fallback: compute from cartItems / selectedFoods
    try {
      const cartJson = safeGet('cartItems') || safeGet('selectedFoods_v1') || safeGet('selectedFoods');
      if (cartJson) {
        const parsed = JSON.parse(cartJson);
        if (Array.isArray(parsed) && parsed.length) {
          let total = 0;
          parsed.forEach(it => {
            const price = (it && (it.price || it.priceNumeric || it.amount)) || 0;
            const qty = (it && (it.qty || it.quantity || it.qtyOrdered)) || 1;
            const pnum = parseFloat(String(price).replace(/[₹, ]+/g, '')) || 0;
            const qnum = parseFloat(qty) || 1;
            total += pnum * qnum;
          });
          if (total > 0) return '₹' + total.toFixed(2);
        }
      }
    } catch(e) {}
    // default fallback
    return '₹149.00';
  }

  // store amount consistently before proceeding
  function syncAmountToStorage() {
    const displayAmount = document.getElementById('amountValue').innerText;
    const numericRaw = displayAmount.replace('₹', '').replace(/,/g, '');
    const numeric = parseFloat(numericRaw);
    if (!isNaN(numeric)) {
      safeSet('amountPaid', displayAmount);
      safeSet('amountPaidNumeric', numeric);
    } else {
      // fallback if something odd
      const fallback = getCurrentAmount();
      const fallbackNum = parseFloat(fallback.replace('₹', ''));
      safeSet('amountPaid', fallback);
      safeSet('amountPaidNumeric', fallbackNum);
      document.getElementById('amountValue').innerText = fallback;
    }
  }

  // ----- Payment method handler (single button to payment.html) -----
  function proceedToPayment() {
    // get latest amount and store
    const amountDisplay = document.getElementById('amountValue').innerText;
    const amountNum = parseFloat(amountDisplay.replace('₹', '').replace(/,/g, ''));
    safeSet('amountPaid', amountDisplay);
    if (!isNaN(amountNum)) safeSet('amountPaidNumeric', amountNum);
    // redirect to payment.html
    window.location.href = 'payment.html';
  }

  // ----- UI initialization & event binding -----
  document.addEventListener('DOMContentLoaded', () => {
    // display the correct amount from cart or saved data
    const amountSpan = document.getElementById('amountValue');
    if (amountSpan) {
      let displayAmount = getCurrentAmount();
      // also attempt to read from any recently stored value (if redirected from cart)
      const storedAmount = safeGet('amountPaid');
      if (storedAmount && storedAmount !== '₹0.00') {
        const cleaned = storedAmount.replace(/[₹, ]+/g, '');
        const num = parseFloat(cleaned);
        if (!isNaN(num) && num > 0) displayAmount = '₹' + num.toFixed(2);
      }
      amountSpan.innerText = displayAmount;
      // sync numeric storage
      const numericVal = parseFloat(displayAmount.replace('₹', '').replace(/,/g, ''));
      if (!isNaN(numericVal)) {
        safeSet('amountPaidNumeric', numericVal);
        safeSet('amountPaid', displayAmount);
      }
    }

    // bind click events for payment button
    const proceedBtn = document.querySelector('.proceed-btn');
    if (proceedBtn) {
      proceedBtn.addEventListener('click', (e) => {
        e.preventDefault();
        proceedToPayment();
      });
    }

    // listen for storage changes (if cart updates from another tab)
    window.addEventListener('storage', (event) => {
      if (event.key === 'amountPaidNumeric' || event.key === 'cartItems' || event.key === 'selectedFoods') {
        const freshAmount = getCurrentAmount();
        if (amountSpan && freshAmount !== amountSpan.innerText) {
          amountSpan.innerText = freshAmount;
          const numericVal = parseFloat(freshAmount.replace('₹', '').replace(/,/g, ''));
          if (!isNaN(numericVal)) safeSet('amountPaidNumeric', numericVal);
        }
      }
    });

    // tiny defensive cleanup: remove any stray text nodes that might appear (legacy)
    const bodyChildren = Array.from(document.body.childNodes);
    bodyChildren.forEach((n) => {
      if (n.nodeType === Node.TEXT_NODE && n.nodeValue && n.nodeValue.trim().toLowerCase().includes('uud')) {
        if (n.parentNode) n.parentNode.removeChild(n);
      }
    });
  });
</script>
</body>
</html>
