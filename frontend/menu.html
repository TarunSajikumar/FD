<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Food Menu | Food Point • Crypto Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Backgrounds - Crypto Dark Theme */
            --bg-primary: #0A0A0F;
            --bg-secondary: #111116;
            --bg-card: #15171E;
            --bg-elevated: #1A1C23;
            --bg-userbar: #0D0D12;
            
            /* Text Colors */
            --text-primary: #FFFFFF;
            --text-secondary: #8A8F9E;
            --text-muted: #5A5F73;
            
            /* Accent Colors */
            --accent-green: #00FF85;
            --accent-blue: #3B82F6;
            --accent-red: #FF4D4D;
            --accent-orange: #F97316;
            
            /* Borders */
            --border-subtle: #1E1E2E;
            --border-card: rgba(255, 255, 255, 0.05);
            
            /* Spacing */
            --spacing-xs: 0.5rem;
            --spacing-sm: 1rem;
            --spacing-md: 1.5rem;
            --spacing-lg: 2rem;
            --spacing-xl: 3rem;
            
            /* Border Radius */
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
            
            /* Gradients */
            --gradient-primary: linear-gradient(135deg, #00FF85 0%, #00C96D 100%);
            --gradient-card-hover: linear-gradient(180deg, #1A1C23 0%, #111116 100%);
            --gradient-glow: radial-gradient(circle at 50% 0%, rgba(0, 255, 133, 0.08), transparent);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 255, 133, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 157, 77, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 0%, rgba(255, 100, 50, 0.12) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
            animation: gradientShift 15s ease-in-out infinite;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                linear-gradient(90deg, transparent 1px, rgba(0, 255, 133, 0.03) 1px),
                linear-gradient(transparent 1px, rgba(0, 255, 133, 0.03) 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 0;
            animation: gridShift 20s linear infinite;
        }

        /* Premium User Bar */
        .user-bar {
            background: var(--bg-userbar);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 12px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 44px;
            height: 44px;
            background: var(--gradient-primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
            color: #0A0A0F;
        }

        .user-text .user-name {
            font-weight: 600;
            font-size: 15px;
            color: var(--text-primary);
        }

        .user-text .user-email {
            font-size: 12px;
            color: var(--text-muted);
        }

        .logout-btn {
            background: transparent;
            border: 1px solid var(--border-subtle);
            color: var(--text-secondary);
            padding: 8px 20px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
        }

        .logout-btn:hover {
            border-color: var(--accent-red);
            color: var(--accent-red);
            background: rgba(255, 77, 77, 0.05);
        }

        /* Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 20px 100px;
            position: relative;
            z-index: 1;
        }

        /* Brand */
        .brand {
            font-size: 2.5rem;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            letter-spacing: -0.02em;
            margin-bottom: 8px;
            animation: brandEnter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
            filter: drop-shadow(0 0 20px rgba(0, 255, 133, 0.3));
            transition: filter 0.3s ease;
        }

        .brand:hover {
            filter: drop-shadow(0 0 30px rgba(0, 255, 133, 0.5));
            animation: brandGlow 3s ease-in-out infinite;
        }

        @keyframes brandGlow {
            0%, 100% {
                filter: drop-shadow(0 0 30px rgba(0, 255, 133, 0.5));
            }
            50% {
                filter: drop-shadow(0 0 40px rgba(0, 255, 133, 0.8));
            }
        }

        .tagline {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 32px;
            animation: subtitleEnter 0.8s ease-out 0.2s backwards;
        }

        /* Search Bar */
        .search-container {
            margin-bottom: 32px;
            animation: inputEnter 0.6s ease-out 0.3s backwards;
        }

        .search-bar {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 100px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .search-bar::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0, 255, 133, 0.05) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .search-bar:focus-within::before {
            opacity: 1;
        }

        .search-bar:focus-within {
            border-color: var(--accent-green);
            box-shadow: 0 0 0 3px rgba(0, 255, 133, 0.1), 0 0 20px rgba(0, 255, 133, 0.15), inset 0 0 10px rgba(0, 255, 133, 0.08);
            animation: searchGlow 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes searchGlow {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 255, 133, 0.4), inset 0 0 5px rgba(0, 255, 133, 0.04);
            }
            100% {
                box-shadow: 0 0 0 8px rgba(0, 255, 133, 0), inset 0 0 10px rgba(0, 255, 133, 0.08);
            }
        }

        .search-bar i {
            color: var(--text-muted);
            font-size: 16px;
        }

        .search-bar input {
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 15px;
            width: 100%;
            font-family: 'Inter', sans-serif;
        }

        .search-bar input:focus {
            outline: none;
        }

        .search-bar input::placeholder {
            color: var(--text-muted);
        }

        /* Category Tabs */
        .category-tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 14px 12px 14px 10px;
            margin-bottom: 24px;
            scrollbar-width: thin;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 24px;
            animation: inputEnter 0.6s ease-out 0.35s backwards;
        }

        .category-tabs::before,
        .category-tabs::after {
            content: '';
            flex: 0 0 8px;
        }

        .category-tabs::-webkit-scrollbar {
            height: 6px;
        }

        .category-tabs::-webkit-scrollbar-track {
            background: var(--bg-secondary);
            border-radius: 10px;
        }

        .category-tabs::-webkit-scrollbar-thumb {
            background: var(--accent-green);
            border-radius: 10px;
        }

        .category-tab {
            flex: 0 0 auto;
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 100px;
            padding: 10px 22px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            scroll-snap-align: start;
        }

        .category-tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(0, 255, 133, 0.1);
            transition: left 0.3s ease;
            pointer-events: none;
        }

        .category-tab.active {
            background: var(--gradient-primary);
            color: #0A0A0F;
            border-color: transparent;
            box-shadow: 0 0 20px rgba(0, 255, 133, 0.3);
            transform: scale(1.05);
            animation: tabActivePulse 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Floating circles */
        .bg-circle-1,
        .bg-circle-2,
        .bg-circle-3 {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(40px);
        }

        .bg-circle-1 {
            width: 300px;
            height: 300px;
            top: 10%;
            right: 5%;
            background: radial-gradient(circle, rgba(0, 255, 133, 0.3) 0%, rgba(0, 255, 133, 0.1) 40%, transparent 70%);
            animation: floatComplex1 25s ease-in-out infinite;
        }

        .bg-circle-2 {
            width: 250px;
            height: 250px;
            bottom: 15%;
            left: 8%;
            background: radial-gradient(circle, rgba(255, 157, 77, 0.25) 0%, rgba(255, 157, 77, 0.08) 40%, transparent 70%);
            animation: floatComplex2 30s ease-in-out infinite;
        }

        .bg-circle-3 {
            width: 280px;
            height: 280px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255, 100, 50, 0.2) 0%, rgba(255, 100, 50, 0.05) 40%, transparent 70%);
            animation: floatComplex3 35s ease-in-out infinite;
        }

        .category-tab:hover:not(.active) {
            border-color: var(--accent-green);
            color: var(--accent-green);
            transform: translateY(-2px);
        }

        /* Menu Sections */
        .menu-section {
            margin-bottom: 32px;
            animation: sectionEnter 0.6s ease-out backwards;
        }

        .menu-section:nth-child(2) { animation-delay: 0.1s; }
        .menu-section:nth-child(3) { animation-delay: 0.2s; }
        .menu-section:nth-child(4) { animation-delay: 0.3s; }
        .menu-section:nth-child(5) { animation-delay: 0.4s; }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            padding-bottom: 12px;
            margin-bottom: 16px;
            border-bottom: 1px solid var(--border-subtle);
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .section-title span:first-child {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            filter: drop-shadow(0 0 8px rgba(0, 255, 133, 0.2));
        }

        .menu-section:hover .section-title span:first-child {
            filter: drop-shadow(0 0 15px rgba(0, 255, 133, 0.4));
            transform: translateX(2px);
        }

        /* Food Items */
        .food-item {
            background: var(--bg-card);
            border: 1px solid var(--border-card);
            border-radius: var(--radius-lg);
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
            position: relative;
            overflow: hidden;
            animation: itemSlideIn 0.5s ease-out backwards;
        }

        .food-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 133, 0.1), transparent);
            transition: left 0.6s ease;
            pointer-events: none;
        }

        .food-item:hover::before {
            left: 100%;
        }

        .food-item:hover {
            transform: translateX(4px) scale(1.02);
            border-color: rgba(0, 255, 133, 0.4);
            box-shadow: 0 8px 30px rgba(0, 255, 133, 0.2), inset 0 0 15px rgba(0, 255, 133, 0.05);
            background: linear-gradient(180deg, rgba(26, 28, 35, 0.8) 0%, rgba(17, 17, 22, 0.6) 100%);
        }

        .food-item:active {
            transform: translateX(0px) scale(0.99);
        }

        .food-item.selected {
            border-color: var(--accent-green);
            background: linear-gradient(180deg, #1A1C23 0%, #111116 100%);
            box-shadow: 0 0 22px rgba(0, 255, 133, 0.15);
        }

        .food-item.selected:hover {
            transform: translateX(4px) scale(1);
        }

        .food-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .food-name {
            font-weight: 600;
            font-size: 16px;
            color: var(--text-primary);
        }

        .variant-label {
            font-size: 12px;
            color: var(--accent-green);
            margin-left: 8px;
        }

        .food-price {
            font-weight: 700;
            color: var(--accent-green);
            font-size: 15px;
            transition: transform 0.25s ease, color 0.25s ease;
            position: relative;
            padding-right: 28px;
        }

        .food-price::after {
            content: '✔';
            position: absolute;
            right: 0;
            top: 50%;
            transform: translateX(10px) translateY(-50%) scale(0.6);
            opacity: 0;
            color: #0A0A0F;
            background: var(--accent-green);
            width: 22px;
            height: 22px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.25s ease, opacity 0.25s ease, background 0.25s ease;
        }

        .food-item.selected .food-price {
            transform: translateX(-18px);
        }

        .food-item.selected .food-price::after {
            opacity: 1;
            transform: translateX(0) translateY(-50%) scale(1);
        }

        .food-description {
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        /* Price Options */
        .price-options {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .price-opt {
            background: var(--bg-secondary);
            border: 1px solid var(--border-subtle);
            border-radius: 100px;
            padding: 4px 12px;
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .price-opt[aria-pressed="true"] {
            background: var(--accent-green);
            color: #0A0A0F;
            border-color: transparent;
        }

        .price-opt:hover:not([aria-pressed="true"]) {
            border-color: var(--accent-green);
            color: var(--accent-green);
        }

        .selected-badge {
            display: none;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: var(--bg-card);
            border-radius: var(--radius-xl);
            border: 1px solid var(--border-card);
        }

        .empty-state i {
            font-size: 48px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 8px;
        }

        .empty-state p {
            color: var(--text-muted);
        }

        /* Bottom Action Bar */
        .bottom-bar-spacer {
            height: 80px;
        }

        .bottom-action-bar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100%);
            max-width: 1080px;
            width: calc(100% - 32px);
            background: rgba(15, 20, 30, 0.82);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 18px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(24px) saturate(160%);
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.28);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .bottom-action-bar.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
            animation: barPopup 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes barPopup {
            0% {
                transform: translateX(-50%) translateY(120%);
                opacity: 0;
            }
            60% {
                transform: translateX(-50%) translateY(-8px);
                opacity: 0.95;
            }
            100% {
                transform: translateX(-50%) translateY(0);
                opacity: 1;
            }
        }

        .bottom-action-bar::before {
            content: '';
            position: absolute;
            top: -20%;
            left: 50%;
            width: 260px;
            height: 260px;
            transform: translateX(-50%);
            background: radial-gradient(circle, rgba(0, 255, 133, 0.16), transparent 55%);
            opacity: 0.24;
            pointer-events: none;
            filter: blur(30px);
        }

        .bottom-action-bar.show::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 28px;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
            pointer-events: none;
        }

        @keyframes barGlow {
            0%, 100% {
                opacity: 0.08;
            }
            50% {
                opacity: 0.18;
            }
        }

        .selection-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            z-index: 1;
        }

        .selection-count {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .selection-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-green);
        }

        .add-to-cart-btn {
            background: linear-gradient(135deg, #00ff85, #00c96d);
            border: none;
            border-radius: 999px;
            padding: 14px 26px;
            font-weight: 700;
            font-size: 14px;
            color: #0A0A0F;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.25s ease;
            font-family: 'Inter', sans-serif;
            z-index: 1;
        }

        .add-to-cart-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(0, 255, 133, 0.28);
        }

        .add-to-cart-btn:disabled {
            opacity: 0.65;
            cursor: not-allowed;
        }

        .cart-btn-icon {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .cart-fab-count {
            position: absolute;
            top: -8px;
            right: -12px;
            background: #0A0A0F;
            color: var(--accent-green);
            font-size: 10px;
            font-weight: 700;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(255,255,255,0.12);
        }

        .bottom-action-bar.show::before {
            animation: barGlow 4s ease-in-out infinite;
        }

        .selection-info {
            display: flex;
            flex-direction: column;
        }

        .selection-count {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .selection-price {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-green);
        }

        .add-to-cart-btn {
            background: var(--gradient-primary);
            border: none;
            border-radius: 100px;
            padding: 12px 24px;
            font-weight: 700;
            font-size: 14px;
            color: #0A0A0F;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            font-family: 'Inter', sans-serif;
            position: relative;
            overflow: hidden;
            animation: buttonEnter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s backwards;
        }

        .add-to-cart-btn::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transform: rotate(45deg);
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .add-to-cart-btn:hover:not(:disabled)::before {
            opacity: 1;
            animation: shimmer 0.6s ease-in-out;
        }

        .add-to-cart-btn:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 12px 35px rgba(0, 255, 133, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.1), 0 0 20px rgba(0, 255, 133, 0.3);
            animation: buttonGlow 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) infinite;
        }

        .add-to-cart-btn:active:not(:disabled) {
            transform: translateY(0) scale(0.98);
        }

        .add-to-cart-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .cart-btn-icon {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .cart-fab-count {
            position: absolute;
            top: -8px;
            right: -12px;
            background: #0A0A0F;
            color: var(--accent-green);
            font-size: 10px;
            font-weight: 700;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;

      /* RICE - VEG */

        { name: "Ghee Rice", price: 60, description: "Aromatic ghee rice" },
        { name: "Paneer Rice", price: 80, description: "Paneer fried rice" },
        { name: "Mushroom Rice", price: 80, description: "Mushroom fried rice" },
        { name: "Manchurian Rice", price: 70, description: "Rice with veg manchurian" },
        { name: "Gobi Rice", price: 70, description: "Cauliflower fried rice" },
        { name: "Jeera Rice", price: 50, description: "Cumin flavored rice" }
      ]},

      /* RICE - NON-VEG */
      { category: "🍗 RICE ITEMS – NON-VEG", items: [
        { name: "Chicken Fried Rice", price: "50 / 90", description: "Chicken fried rice" },
        { name: "Egg Fried Rice", price: "40 / 60", description: "Egg fried rice" },
        { name: "Singapore Chicken Rice", price: 120, description: "Singapore style chicken rice" }
      ]},

      /* MEALS */
      { category: "🍽️ MEALS", items: [
        { name: "Veg Meals (2 roti, ½ rice, dal, sabji)", price: 60, description: "" },
        { name: "Chicken Meals (2 roti, ½ rice, dal, ½ chicken curry)", price: 90, description: "" },
        { name: "Fish Meals (2 roti, ½ rice, dal, ½ fish curry)", price: 90, description: "" },
        { name: "Chole Bhature (12:00 – 4:00 PM)", price: 80, description: "" }
      ]}
    ];

    // If owner has managed menu items in localStorage under key "menuItems",
    // prefer that data (grouped by category) and filter out unavailable items.
    function getMenuData() {
      try {
        const local = JSON.parse(localStorage.getItem('menuItems') || '[]');
        if (Array.isArray(local) && local.length) {
          const filtered = local.filter(i => i.available !== false);
          const map = new Map();
          filtered.forEach(it => {
            const cat = it.category || 'Uncategorized';
            if (!map.has(cat)) map.set(cat, []);
            map.get(cat).push({ name: it.name, price: it.price, description: it.description || '' });
          });
          return Array.from(map.entries()).map(([category, items]) => ({ category, items }));
        }
      } catch (e) { console.warn('getMenuData parse error', e); }
      return foodData;
    }

    /* ================
       State / Storage
       ================ */
    function getCurrentUser() {
      try {
        const raw = localStorage.getItem("fp_current_user");
        return raw ? JSON.parse(raw) : null;
      } catch(e) { return null; }
    }

    function getUserSpecificKey(baseKey) {
      const user = getCurrentUser();
      return user && user.id ? baseKey + "_" + user.id : baseKey;
    }

    const STORAGE_KEY = getUserSpecificKey("selectedFoods_v1");
    const selectedItems = new Map(); // id -> {id,name,price,description,quantity}
    let currentCategory = 0;

    /* DOM */
    const categoryTabs = document.getElementById("categoryTabs");
    const menuContainer = document.getElementById("menuContainer");
    const searchInput = document.getElementById("searchInput");
    const cartFabCount = document.getElementById("cartFabCount");
    const bottomBar = document.getElementById("bottomBar");
    const selectionCount = document.getElementById("selectionCount");
    const selectionPrice = document.getElementById("selectionPrice");
    const addToCartBtn = document.getElementById("addToCartBtn");

    /* ===== utilities ===== */
    function parsePriceToNumber(price){
      if (typeof price === 'number') return price;
      if (!price) return 0;
      const m = String(price).match(/(\d+(\.\d+)?)/);
      return m ? Number(m[1]) : 0;
    }
    function saveSelected(){
      const arr = Array.from(selectedItems.values());
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); } catch(e){ console.warn(e); }
    }
    function loadSelected(){
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const arr = JSON.parse(raw);
        arr.forEach(it => selectedItems.set(it.id, it));
      } catch(e){ console.warn("loadSelected failed", e); }
    }

    /* ===== rendering ===== */
    function renderCategories(){
      categoryTabs.innerHTML = "";
      const menu = getMenuData();
      menu.forEach((cat, idx) => {
        const tab = document.createElement("div");
        tab.className = "category-tab" + (idx === currentCategory ? " active" : "");
        tab.textContent = cat.category;
        tab.dataset.index = idx;
        tab.addEventListener("click", () => {
          currentCategory = idx;
          document.querySelectorAll(".category-tab").forEach(t => t.classList.remove("active"));
          tab.classList.add("active");
          scrollToSection(idx);
        });
        categoryTabs.appendChild(tab);
      });
    }

    function renderFoodItems(){
      menuContainer.innerHTML = "";
      const menu = getMenuData();
      menu.forEach((cat, sectionIndex) => {
        const section = document.createElement("div");
        section.id = `section-${sectionIndex}`;
        section.className = "menu-section";
        const title = document.createElement("div");
        title.className = "section-title";
        title.innerHTML = `<span>${cat.category}</span><span style="font-size:14px;color:#5A5F73;margin-left:auto">${cat.items.length} items</span>`;
        section.appendChild(title);

        cat.items.forEach((item, itemIndex) => {
          const id = `${sectionIndex}-${itemIndex}`;
          const isSelected = selectedItems.has(id);
          const numericPrice = parsePriceToNumber(item.price);

          const foodItem = document.createElement("div");
          foodItem.className = "food-item" + (isSelected ? " selected" : "");
          foodItem.dataset.id = id;
          foodItem.dataset.name = item.name;
          foodItem.dataset.price = numericPrice;
          foodItem.dataset.rawPrice = typeof item.price === 'string' ? item.price : String(item.price);

          const savedObj = selectedItems.get(id);
          const savedPriceValue = savedObj ? String(savedObj.price || savedObj.rawPrice || savedObj.numericPrice) : null;
          let chosenPrice = savedPriceValue || (typeof item.price === 'string' && item.price.includes('/') ? item.price.split('/').map(s=>s.trim())[0] : item.price);
          const priceText = `₹${chosenPrice}`;

          let optionsHtml = '';
          let hasOptions = false;
          if (typeof item.price === 'string' && item.price.includes('/')) {
            hasOptions = true;
            const opts = item.price.split('/').map(s => s.trim());
            optionsHtml = `<div class="price-options" role="tablist" aria-label="Price options">` +
              opts.map((opt, oi) => ` <button class="price-opt" data-price="${escapeHtml(opt)}" aria-pressed="${escapeHtml((savedPriceValue ? (savedPriceValue === opt) : (oi===0)))}">${escapeHtml('₹' + opt)}</button>`).join('') +
              `</div>`;
          }

          foodItem.innerHTML = `
            <div class="food-header">
              <div class="food-name">${escapeHtml(item.name)} <span class="variant-label">₹${escapeHtml(String(chosenPrice))}</span></div>
              <div class="food-price">${escapeHtml(priceText)}</div>
            </div>
            <div class="food-description">${escapeHtml(item.description || '')}</div>
            ${optionsHtml}
            ${isSelected ? '<div class="selected-badge"><i class="fas fa-check"></i></div>' : ''}
          `;

          if (hasOptions) {
            const optContainer = foodItem.querySelector('.price-options');
            const priceDisplay = foodItem.querySelector('.food-price');
            const variantLabel = foodItem.querySelector('.variant-label');
            optContainer.addEventListener('click', (ev) => {
              const btn = ev.target.closest('.price-opt');
              if (!btn) return;
              optContainer.querySelectorAll('.price-opt').forEach(b => b.setAttribute('aria-pressed', 'false'));
              btn.setAttribute('aria-pressed', 'true');
              const val = btn.dataset.price;
              priceDisplay.textContent = '₹' + val;
              if (variantLabel) variantLabel.textContent = '₹' + val;
              foodItem.dataset.chosenPrice = val;
              foodItem.dataset.price = parsePriceToNumber(val);
              foodItem.dataset.rawPrice = val;
              if (selectedItems.has(id)) {
                const saved = selectedItems.get(id);
                saved.price = val;
                saved.numericPrice = parsePriceToNumber(val);
                selectedItems.set(id, saved);
                saveSelected();
                updateUI();
              }
            });
            const firstOpt = optContainer.querySelector('.price-opt[aria-pressed="true"]') || optContainer.querySelector('.price-opt');
            if (firstOpt) {
              optContainer.querySelectorAll('.price-opt').forEach(b => b.setAttribute('aria-pressed', 'false'));
              firstOpt.setAttribute('aria-pressed', 'true');
              const startVal = firstOpt.dataset.price;
              priceDisplay.textContent = '₹' + startVal;
              if (variantLabel) variantLabel.textContent = '₹' + startVal;
              foodItem.dataset.chosenPrice = startVal;
              foodItem.dataset.price = parsePriceToNumber(startVal);
              foodItem.dataset.rawPrice = startVal;
            }
          } else {
            const finalPrice = savedPriceValue || String(item.price);
            foodItem.dataset.chosenPrice = finalPrice;
            foodItem.dataset.price = numericPrice;
            foodItem.dataset.rawPrice = finalPrice;
            const variantLabel = foodItem.querySelector('.variant-label');
            if (variantLabel) variantLabel.textContent = '₹' + finalPrice;
          }

          foodItem.addEventListener("click", (e) => {
            if (e.target.closest('.price-opt')) return;
            const chosen = foodItem.dataset.rawPrice || foodItem.dataset.chosenPrice || item.price;
            toggleSelection(id, item.name, chosen, item.description);
          });
          foodItem.tabIndex = 0;
          foodItem.addEventListener("keydown", (e) => { if (e.key === "Enter") toggleSelection(id, item.name, item.price, item.description); });
          section.appendChild(foodItem);
        });

        menuContainer.appendChild(section);
      });
    }

    function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

    function toggleSelection(id, name, price, description){
      const element = document.querySelector(`[data-id="${id}"]`);
      if (!element) return;
      if (selectedItems.has(id)){
        selectedItems.delete(id);
        element.classList.remove("selected");
        const oldBadge = element.querySelector(".selected-badge");
        if (oldBadge) oldBadge.remove();
      } else {
        const numeric = parsePriceToNumber(price);
        const obj = { id, name, price, description, quantity: 1, numericPrice: numeric };
        selectedItems.set(id, obj);
        element.classList.add("selected");
        if (!element.querySelector(".selected-badge")){
          const badge = document.createElement("div");
          badge.className = "selected-badge";
          badge.innerHTML = '<i class="fas fa-check"></i>';
          element.appendChild(badge);
        }
      }
      saveSelected();
      updateUI();
      pulse(element);
    }

    function pulse(el){
      if (!el) return;
      el.style.animation = "none";
      void el.offsetWidth;
      el.style.animation = "pulse .28s ease";
      setTimeout(()=> el.style.animation = "", 300);
    }

    function updateUI(){
      const totalItems = selectedItems.size;
      const totalPrice = Array.from(selectedItems.values()).reduce((s,it)=> s + (parsePriceToNumber(it.price) * (it.quantity||1)), 0);
      if (totalItems > 0){
        cartFabCount.textContent = totalItems > 99 ? "99+" : String(totalItems);
        cartFabCount.style.display = "flex";
      } else {
        cartFabCount.style.display = "none";
      }
      if (totalItems > 0){
        bottomBar.classList.add("show");
        selectionCount.textContent = `${totalItems} ${totalItems === 1 ? 'item' : 'items'} selected`;
        selectionPrice.textContent = `Total: ₹${totalPrice}`;
        addToCartBtn.disabled = false;
      } else {
        bottomBar.classList.remove("show");
      }
    }

    function setupSearch(){
      searchInput.addEventListener("input", (e) => {
        const q = String(e.target.value || "").trim().toLowerCase();
        filterBySearch(q);
      });
    }

    function filterBySearch(query){
      document.querySelectorAll(".menu-section").forEach(section => {
        let anyVisible = false;
        section.querySelectorAll(".food-item").forEach(itemEl => {
          const name = (itemEl.dataset.name || "").toLowerCase();
          const desc = (itemEl.querySelector(".food-description")?.textContent || "").toLowerCase();
          if (!query || name.includes(query) || desc.includes(query)){
            itemEl.style.display = "";
            anyVisible = true;
          } else {
            itemEl.style.display = "none";
          }
        });
        section.style.display = anyVisible ? "" : "none";
      });
      const anyItemVisible = Array.from(document.querySelectorAll(".food-item")).some(i => i.style.display !== "none");
      if (!anyItemVisible && query){
        showEmptyState();
      } else {
        hideEmptyState();
      }
    }

    function showEmptyState(){
      if (menuContainer.querySelector(".empty-state")) return;
      const emptyState = document.createElement("div");
      emptyState.className = "empty-state";
      emptyState.innerHTML = `<i class="fas fa-search"></i><h3>No items found</h3><p>Try searching for something else</p>`;
      menuContainer.appendChild(emptyState);
    }
    function hideEmptyState(){
      const s = menuContainer.querySelector(".empty-state");
      if (s) s.remove();
    }

    function scrollToSection(index){
      const sec = document.getElementById(`section-${index}`);
      if (!sec) return;
      const headerHeight = document.querySelector(".user-bar").getBoundingClientRect().height + 20;
      const top = sec.getBoundingClientRect().top + window.scrollY - headerHeight;
      window.scrollTo({ top, behavior: "smooth" });
    }

    addToCartBtn.addEventListener("click", function(){
      if (selectedItems.size === 0) return;
      const originalHTML = addToCartBtn.innerHTML;
      addToCartBtn.innerHTML = '<i class="fas fa-check"></i> ADDED';
      addToCartBtn.disabled = true;
      setTimeout(()=> {
        addToCartBtn.innerHTML = originalHTML;
        addToCartBtn.disabled = false;
        window.location.href = "cart.html";
      }, 700);
    });

    // Integrated Logout functionality (no floating elements)
    const logoutBtn = document.getElementById("logoutBtn");
    
    if (logoutBtn) {
      logoutBtn.addEventListener("click", function() {
        localStorage.removeItem("fp_current_user");
        window.location.href = "login.html";
      });
    }

    function init(){
      loadSelected();
      renderCategories();
      renderFoodItems();
      setupSearch();
      filterBySearch("");
      updateUI();
      document.addEventListener('touchstart', function() {}, { passive: true });
      let lastTouch = 0;
      document.addEventListener('touchend', function(e){
        const now = Date.now();
        if (now - lastTouch <= 300) e.preventDefault();
        lastTouch = now;
      }, false);
      function setVH(){ document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`); }
      window.addEventListener('resize', setVH);
      window.addEventListener('orientationchange', setVH);
      setVH();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
