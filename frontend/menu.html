<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Food Menu | Food Point</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
      /* Base reset and touch optimizations */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }

      html, body {
        height: 100%;
      }

      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: #e8e9ed;
        line-height: 1.5;
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        background: #0a0e1a url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><defs><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/></filter></defs><rect width="100" height="100" fill="%23000" filter="url(%23noise)" opacity="0.03"/></svg>');
        background-attachment: fixed;
        position: relative;
        overflow-x: hidden;
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        background: radial-gradient(circle at 20% 50%, rgba(255,140,0,0.15), transparent 50%), radial-gradient(circle at 80% 80%, rgba(0,200,150,0.1), transparent 50%);
        pointer-events: none;
        z-index: 0;
      }

      body > * {
        position: relative;
        z-index: 1;
      }

      /* Premium glassmorphic user-bar header with integrated logout */
      .user-bar {
        position: relative !important;
        margin: 16px auto !important;
        max-width: 720px !important;
        width: calc(100% - 28px) !important;
        background: linear-gradient(135deg, rgba(30,35,50,0.8), rgba(25,30,45,0.77)) !important;
        backdrop-filter: blur(16px) saturate(160%) !important;
        border-radius: 20px !important;
        padding: 12px 20px !important;
        display: flex !important;
        align-items: center !important;
        justify-content: space-between !important;
        z-index: 1 !important;
        box-shadow: 0 16px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.12) !important;
        border: 1px solid rgba(255,255,255,0.08) !important;
      }

      .user-info {
        display: flex !important;
        align-items: center !important;
        gap: 10px !important;
      }

      .user-avatar {
        width: 48px !important;
        height: 48px !important;
        border-radius: 12px !important;
        background: linear-gradient(135deg, rgba(255,140,0,0.5), rgba(255,160,20,0.45)) !important;
        display: flex !important;
        align-items: center !important;
        justify-content: center !important;
        color: #f5e6d3 !important;
        font-weight: 800 !important;
        font-size: 18px !important;
        box-shadow: 0 0 20px rgba(255,160,0,0.4) !important;
        border: 1px solid rgba(255,255,255,0.1) !important;
      }

      .user-text {
        display: flex !important;
        flex-direction: column !important;
        gap: 2px !important;
      }

      .user-name {
        color: #f5e6d3 !important;
        font-weight: 700 !important;
        font-size: 13px !important;
        letter-spacing: 0.04em !important;
      }

      .user-email {
        color: #aeb5c4 !important;
        font-size: 11px !important;
        letter-spacing: 0.02em !important;
      }

      /* Button group in user bar */
      .user-actions {
        display: flex !important;
        align-items: center !important;
        gap: 10px !important;
      }

      /* Home button */
      .home-btn {
        background: linear-gradient(135deg, rgba(0,200,150,0.25), rgba(0,180,140,0.2)) !important;
        border: 1px solid rgba(0,220,170,0.3) !important;
        color: #00d9a3 !important;
        padding: 8px 14px !important;
        border-radius: 12px !important;
        font-size: 12px !important;
        font-weight: 600 !important;
        cursor: pointer !important;
        transition: all 200ms ease !important;
        display: flex !important;
        align-items: center !important;
        gap: 6px !important;
      }

      .home-btn:hover {
        background: linear-gradient(135deg, rgba(0,220,170,0.4), rgba(0,200,150,0.35)) !important;
        transform: translateY(-1px) !important;
      }

      /* Logout button - integrated in user bar */
      .logout-btn {
        background: linear-gradient(135deg, rgba(220,70,70,0.25), rgba(200,60,60,0.2)) !important;
        border: 1px solid rgba(220,70,70,0.3) !important;
        color: #ff6b6b !important;
        padding: 8px 14px !important;
        border-radius: 12px !important;
        font-size: 12px !important;
        font-weight: 600 !important;
        cursor: pointer !important;
        transition: all 200ms ease !important;
        display: flex !important;
        align-items: center !important;
        gap: 6px !important;
      }

      .logout-btn:hover {
        background: linear-gradient(135deg, rgba(220,70,70,0.4), rgba(200,60,60,0.35)) !important;
        transform: translateY(-1px) !important;
        box-shadow: 0 0 12px rgba(220,70,70,0.3) !important;
      }

      .logout-btn:active, .home-btn:active {
        transform: scale(0.96) !important;
      }

      /* Main container */
      .container {
        max-width: 880px;
        margin: 100px auto 120px;
        padding: 28px 24px;
        background: linear-gradient(135deg, rgba(30,35,50,0.78), rgba(25,30,45,0.73));
        border-radius: 28px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.08);
        backdrop-filter: blur(12px) saturate(140%);
      }

      .page-with-header {
        margin-top: 0 !important;
      }

      /* Brand and header */
      .brand {
        font-weight: 900;
        letter-spacing: 0.16em;
        font-size: 28px;
        color: #f5e6d3;
        text-shadow: 0 4px 20px rgba(255,140,0,0.2);
        text-align: center;
        margin-bottom: 8px;
      }

      .tagline {
        color: #aeb5c4;
        font-size: 13px;
        margin-bottom: 20px;
        letter-spacing: 0.04em;
        text-align: center;
      }

      /* Search Bar */
      .search-container {
        margin-bottom: 20px;
      }

      .search-bar {
        position: relative;
        display: flex;
        align-items: center;
        background: rgba(40,50,70,0.3);
        border-radius: 16px;
        padding: 14px 16px;
        border: 1px solid rgba(255,255,255,0.08);
        backdrop-filter: blur(8px);
      }

      .search-bar i {
        color: #aeb5c4;
        margin-right: 12px;
        font-size: 16px;
      }

      .search-bar input {
        flex: 1;
        background: transparent;
        border: none;
        color: #f5e6d3;
        font-size: 15px;
        outline: none;
        width: 100%;
      }

      .search-bar input::placeholder {
        color: #aeb5c4;
      }

      /* Tabs */
      .category-tabs {
        display: flex;
        overflow-x: auto;
        gap: 10px;
        padding: 12px 6px;
        margin-bottom: 12px;
        -webkit-overflow-scrolling: touch;
      }

      .category-tab {
        flex-shrink: 0;
        padding: 10px 18px;
        background: linear-gradient(135deg, rgba(40,50,70,0.3), rgba(35,45,65,0.25));
        border-radius: 12px;
        font-weight: 600;
        font-size: 14px;
        color: #aeb5c4;
        cursor: pointer;
        transition: all 200ms ease;
        border: 1px solid rgba(255,255,255,0.08);
        white-space: nowrap;
        backdrop-filter: blur(8px);
      }

      .category-tab.active {
        background: linear-gradient(135deg, #ffaa00, #ff8c00);
        color: #0a0e1a;
        border-color: rgba(255,160,0,0.4);
        box-shadow: 0 0 16px rgba(255,140,0,0.35);
      }

      /* Menu sections */
      .menu-section {
        margin-bottom: 22px;
        animation: fadeIn 0.28s ease;
      }

      .menu-section .section-title {
        font-size: 18px;
        font-weight: 800;
        color: #f5e6d3;
        margin-bottom: 12px;
        display: flex;
        align-items: center;
        gap: 10px;
        letter-spacing: 0.04em;
      }

      /* Food items */
      .food-item {
        background: rgba(40,50,70,0.3);
        border-radius: 16px;
        padding: 14px;
        margin-bottom: 12px;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.06);
        transition: all 200ms ease;
        border: 1px solid rgba(255,255,255,0.08);
        position: relative;
        overflow: hidden;
        touch-action: manipulation;
        cursor: pointer;
        backdrop-filter: blur(8px);
      }

      .food-item:hover {
        background: rgba(50,65,90,0.4);
        box-shadow: 0 10px 30px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.08);
      }

      .food-item:active {
        transform: scale(0.98);
      }

      .food-item.selected {
        background: linear-gradient(135deg, rgba(0,200,150,0.15), rgba(0,180,140,0.1));
        border-color: rgba(0,220,170,0.3);
        box-shadow: 0 0 16px rgba(0,220,170,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
      }

      .food-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 6px;
      }

      .food-name {
        font-weight: 700;
        font-size: 16px;
        color: #f5e6d3;
        flex: 1;
      }

      .food-price {
        font-weight: 800;
        font-size: 16px;
        color: #00d9a3;
        margin-left: 10px;
        text-shadow: 0 0 8px rgba(0,220,170,0.3);
      }

      .food-description {
        font-size: 13px;
        color: #aeb5c4;
        margin-bottom: 8px;
        line-height: 1.4;
      }

      .selected-badge {
        position: absolute;
        top: 12px;
        right: 12px;
        background: linear-gradient(135deg, #00d9a3, #00c890);
        color: #0a0e1a;
        width: 28px;
        height: 28px;
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
        box-shadow: 0 0 12px rgba(0,220,170,0.4);
      }

      /* Price option pills */
      .price-options {
        display: flex;
        gap: 8px;
        margin-top: 8px;
        flex-wrap: wrap;
      }

      .price-opt {
        background: linear-gradient(135deg, rgba(40,50,70,0.3), rgba(35,45,65,0.25));
        border: 1px solid rgba(255,255,255,0.1);
        padding: 8px 12px;
        border-radius: 12px;
        font-weight: 700;
        cursor: pointer;
        transition: all 160ms ease;
        font-size: 14px;
        color: #aeb5c4;
        backdrop-filter: blur(6px);
      }

      .price-opt:hover {
        border-color: rgba(0,220,170,0.3);
        color: #00d9a3;
      }

      .price-opt[aria-pressed="true"] {
        background: linear-gradient(135deg, #00d9a3, #00c890);
        color: #0a0e1a;
        border-color: rgba(0,220,170,0.4);
        box-shadow: 0 0 12px rgba(0,220,170,0.35);
      }

      .price-opt:focus {
        outline: none;
        box-shadow: 0 0 16px rgba(0,220,170,0.25);
      }

      .variant-label {
        display: inline-block;
        margin-left: 8px;
        font-size: 12px;
        color: #aeb5c4;
        font-weight: 600;
        background: rgba(0,220,170,0.15);
        padding: 3px 8px;
        border-radius: 12px;
        letter-spacing: 0.02em;
      }

      /* Bottom action bar */
      .bottom-action-bar {
        position: fixed;
        bottom: 10px;
        left: 10px;
        right: 10px;
        background: linear-gradient(135deg, rgba(30,35,50,0.85), rgba(25,30,45,0.82));
        padding: 12px 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-radius: 14px;
        box-shadow: 0 16px 40px rgba(0,0,0,0.5);
        z-index: 999;
        border: 1px solid rgba(255,255,255,0.08);
        backdrop-filter: blur(12px);
        max-width: calc(100% - 20px);
      }

      .selection-info {
        flex: 1;
      }

      .selection-count {
        font-weight: 700;
        font-size: 15px;
        color: #f5e6d3;
      }

      .selection-price {
        font-size: 13px;
        color: #aeb5c4;
        margin-top: 2px;
      }

      .add-to-cart-btn {
        background: linear-gradient(135deg, #ffaa00, #ff8c00);
        color: #0a0e1a;
        border: none;
        padding: 12px 20px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        transition: all 200ms ease;
        min-width: 130px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        box-shadow: 0 0 16px rgba(255,140,0,0.35);
      }

      .add-to-cart-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 24px rgba(255,140,0,0.5);
      }

      .add-to-cart-btn:active {
        transform: scale(0.98);
      }

      /* Empty state */
      .empty-state {
        text-align: center;
        padding: 60px 20px;
        color: #aeb5c4;
      }

      .empty-state i {
        font-size: 48px;
        margin-bottom: 16px;
        color: #666;
      }

      .empty-state h3 {
        color: #f5e6d3;
        margin-bottom: 8px;
      }

      /* Pulse animation */
      @keyframes pulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.02); }
        100% { transform: scale(1); }
      }

      /* Animations */
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      /* Reserve space for floating ADD TO CART bar */
      .bottom-bar-spacer {
        height: 110px;
      }

      /* Ensure bottom bar truly floats like top bar */
      .bottom-action-bar {
        position: fixed !important;
        bottom: 12px !important;
        left: 50% !important;
        transform: translateX(-50%) !important;
        max-width: 880px !important;
        width: calc(100% - 24px) !important;
        z-index: 10000 !important;
      }

      @media (max-width: 480px) {
        .container {
          margin: 80px 10px 120px;
          border-radius: 16px;
          padding: 16px 12px;
        }

        .brand {
          font-size: 22px;
        }

        .menu-section .section-title {
          font-size: 16px;
        }

        .food-name {
          font-size: 14px;
        }

        .bottom-action-bar {
          flex-direction: column;
          gap: 10px;
          align-items: flex-start;
        }

        .add-to-cart-btn {
          width: 100%;
          text-align: center;
        }

        .user-bar {
          padding: 10px 16px !important;
        }

        .user-avatar {
          width: 40px !important;
          height: 40px !important;
          font-size: 14px !important;
        }

        .home-btn, .logout-btn {
          padding: 6px 10px !important;
          font-size: 10px !important;
        }

        .user-actions {
          gap: 6px !important;
        }
      }
    </style>
</head>

      { category: "🍽️ MEALS", items: [
        { name: "Veg Meals (2 roti, ½ rice, dal, sabji)", price: 60, description: "" },
        { name: "Chicken Meals (2 roti, ½ rice, dal, ½ chicken curry)", price: 90, description: "" },
        { name: "Fish Meals (2 roti, ½ rice, dal, ½ fish curry)", price: 90, description: "" },
        { name: "Chole Bhature (12:00 – 4:00 PM)", price: 80, description: "" }
      ]}
    ];

    // If owner has managed menu items in localStorage under key "menuItems",
    // prefer that data (grouped by category) and filter out unavailable items.
    function getMenuData() {
      try {
        const local = JSON.parse(localStorage.getItem('menuItems') || '[]');
        if (Array.isArray(local) && local.length) {
          const filtered = local.filter(i => i.available !== false);
          const map = new Map();
          filtered.forEach(it => {
            const cat = it.category || 'Uncategorized';
            if (!map.has(cat)) map.set(cat, []);
            map.get(cat).push({ name: it.name, price: it.price, description: it.description || '' });
          });
          return Array.from(map.entries()).map(([category, items]) => ({ category, items }));
        }
      } catch (e) { console.warn('getMenuData parse error', e); }
      return foodData;
    }

    /* ================
       State / Storage
       ================ */
    const STORAGE_KEY = "selectedFoods_v1";
    const selectedItems = new Map(); // id -> {id,name,price,description,quantity}
    let currentCategory = 0;

    /* DOM */
    const categoryTabs = document.getElementById("categoryTabs");
    const menuContainer = document.getElementById("menuContainer");
    const searchInput = document.getElementById("searchInput");
    const cartFabCount = document.getElementById("cartFabCount");
    const bottomBar = document.getElementById("bottomBar");
    const selectionCount = document.getElementById("selectionCount");
    const selectionPrice = document.getElementById("selectionPrice");
    const addToCartBtn = document.getElementById("addToCartBtn");

    /* ===== utilities ===== */
    function parsePriceToNumber(price){
      if (typeof price === 'number') return price;
      if (!price) return 0;
      const m = String(price).match(/(\d+(\.\d+)?)/);
      return m ? Number(m[1]) : 0;
    }
    function saveSelected(){
      const arr = Array.from(selectedItems.values());
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(arr)); } catch(e){ console.warn(e); }
    }
    function loadSelected(){
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const arr = JSON.parse(raw);
        arr.forEach(it => selectedItems.set(it.id, it));
      } catch(e){ console.warn("loadSelected failed", e); }
    }

    /* ===== rendering ===== */
    function renderCategories(){
      categoryTabs.innerHTML = "";
      const menu = getMenuData();
      menu.forEach((cat, idx) => {
        const tab = document.createElement("div");
        tab.className = "category-tab" + (idx === currentCategory ? " active" : "");
        tab.textContent = cat.category;
        tab.dataset.index = idx;
        tab.addEventListener("click", () => {
          currentCategory = idx;
          document.querySelectorAll(".category-tab").forEach(t => t.classList.remove("active"));
          tab.classList.add("active");
          scrollToSection(idx);
        });
        categoryTabs.appendChild(tab);
      });
    }

    function renderFoodItems(){
      menuContainer.innerHTML = "";
      const menu = getMenuData();
      menu.forEach((cat, sectionIndex) => {
        const section = document.createElement("div");
        section.id = `section-${sectionIndex}`;
        section.className = "menu-section";
        const title = document.createElement("div");
        title.className = "section-title";
        title.innerHTML = `<span>${cat.category}</span><span style="font-size:14px;color:#666;margin-left:auto">${cat.items.length} items</span>`;
        section.appendChild(title);

        cat.items.forEach((item, itemIndex) => {
          const id = `${sectionIndex}-${itemIndex}`;
          const isSelected = selectedItems.has(id);
          const numericPrice = parsePriceToNumber(item.price);

          const foodItem = document.createElement("div");
          foodItem.className = "food-item" + (isSelected ? " selected" : "");
          foodItem.dataset.id = id;
          foodItem.dataset.name = item.name;
          foodItem.dataset.price = numericPrice;
          foodItem.dataset.rawPrice = typeof item.price === 'string' ? item.price : String(item.price);

          const savedObj = selectedItems.get(id);
          const savedPriceValue = savedObj ? String(savedObj.price || savedObj.rawPrice || savedObj.numericPrice) : null;
          let chosenPrice = savedPriceValue || (typeof item.price === 'string' && item.price.includes('/') ? item.price.split('/').map(s=>s.trim())[0] : item.price);
          const priceText = `₹${chosenPrice}`;

          let optionsHtml = '';
          let hasOptions = false;
          if (typeof item.price === 'string' && item.price.includes('/')) {
            hasOptions = true;
            const opts = item.price.split('/').map(s => s.trim());
            optionsHtml = `<div class="price-options" role="tablist" aria-label="Price options">` +
              opts.map((opt, oi) => ` <button class="price-opt" data-price="${escapeHtml(opt)}" aria-pressed="${escapeHtml((savedPriceValue ? (savedPriceValue === opt) : (oi===0)))}">${escapeHtml('₹' + opt)}</button>`).join('') +
              `</div>`;
          }

          foodItem.innerHTML = `
            <div class="food-header">
              <div class="food-name">${escapeHtml(item.name)} <span class="variant-label">₹${escapeHtml(String(chosenPrice))}</span></div>
              <div class="food-price">${escapeHtml(priceText)}</div>
            </div>
            <div class="food-description">${escapeHtml(item.description || '')}</div>
            ${optionsHtml}
            ${isSelected ? '<div class="selected-badge"><i class="fas fa-check"></i></div>' : ''}
          `;

          if (hasOptions) {
            const optContainer = foodItem.querySelector('.price-options');
            const priceDisplay = foodItem.querySelector('.food-price');
            const variantLabel = foodItem.querySelector('.variant-label');
            optContainer.addEventListener('click', (ev) => {
              const btn = ev.target.closest('.price-opt');
              if (!btn) return;
              optContainer.querySelectorAll('.price-opt').forEach(b => b.setAttribute('aria-pressed', 'false'));
              btn.setAttribute('aria-pressed', 'true');
              const val = btn.dataset.price;
              priceDisplay.textContent = '₹' + val;
              if (variantLabel) variantLabel.textContent = '₹' + val;
              foodItem.dataset.chosenPrice = val;
              foodItem.dataset.price = parsePriceToNumber(val);
              foodItem.dataset.rawPrice = val;
              if (selectedItems.has(id)) {
                const saved = selectedItems.get(id);
                saved.price = val;
                saved.numericPrice = parsePriceToNumber(val);
                selectedItems.set(id, saved);
                saveSelected();
                updateUI();
              }
            });
            const firstOpt = optContainer.querySelector('.price-opt[aria-pressed="true"]') || optContainer.querySelector('.price-opt');
            if (firstOpt) {
              optContainer.querySelectorAll('.price-opt').forEach(b => b.setAttribute('aria-pressed', 'false'));
              firstOpt.setAttribute('aria-pressed', 'true');
              const startVal = firstOpt.dataset.price;
              priceDisplay.textContent = '₹' + startVal;
              if (variantLabel) variantLabel.textContent = '₹' + startVal;
              foodItem.dataset.chosenPrice = startVal;
              foodItem.dataset.price = parsePriceToNumber(startVal);
              foodItem.dataset.rawPrice = startVal;
            }
          } else {
            const finalPrice = savedPriceValue || String(item.price);
            foodItem.dataset.chosenPrice = finalPrice;
            foodItem.dataset.price = numericPrice;
            foodItem.dataset.rawPrice = finalPrice;
            const variantLabel = foodItem.querySelector('.variant-label');
            if (variantLabel) variantLabel.textContent = '₹' + finalPrice;
          }

          foodItem.addEventListener("click", (e) => {
            if (e.target.closest('.price-opt')) return;
            const chosen = foodItem.dataset.rawPrice || foodItem.dataset.chosenPrice || item.price;
            toggleSelection(id, item.name, chosen, item.description);
          });
          foodItem.tabIndex = 0;
          foodItem.addEventListener("keydown", (e) => { if (e.key === "Enter") toggleSelection(id, item.name, item.price, item.description); });
          section.appendChild(foodItem);
        });

        menuContainer.appendChild(section);
      });
    }

    function escapeHtml(s){ return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

    function toggleSelection(id, name, price, description){
      const element = document.querySelector(`[data-id="${id}"]`);
      if (!element) return;
      if (selectedItems.has(id)){
        selectedItems.delete(id);
        element.classList.remove("selected");
        const oldBadge = element.querySelector(".selected-badge");
        if (oldBadge) oldBadge.remove();
      } else {
        const numeric = parsePriceToNumber(price);
        const obj = { id, name, price, description, quantity: 1, numericPrice: numeric };
        selectedItems.set(id, obj);
        element.classList.add("selected");
        if (!element.querySelector(".selected-badge")){
          const badge = document.createElement("div");
          badge.className = "selected-badge";
          badge.innerHTML = '<i class="fas fa-check"></i>';
          element.appendChild(badge);
        }
      }
      saveSelected();
      updateUI();
      pulse(element);
    }

    function pulse(el){
      if (!el) return;
      el.style.animation = "none";
      void el.offsetWidth;
      el.style.animation = "pulse .28s ease";
      setTimeout(()=> el.style.animation = "", 300);
    }

    function updateUI(){
      const totalItems = selectedItems.size;
      const totalPrice = Array.from(selectedItems.values()).reduce((s,it)=> s + (parsePriceToNumber(it.price) * (it.quantity||1)), 0);
      if (totalItems > 0){
        cartFabCount.textContent = totalItems > 99 ? "99+" : String(totalItems);
        cartFabCount.style.display = "flex";
      } else {
        cartFabCount.style.display = "none";
      }
      if (totalItems > 0){
        bottomBar.style.display = "flex";
        selectionCount.textContent = `${totalItems} ${totalItems === 1 ? 'item' : 'items'} selected`;
        selectionPrice.textContent = `Total: ₹${totalPrice}`;
        addToCartBtn.disabled = false;
      } else {
        bottomBar.style.display = "none";
      }
    }

    function setupSearch(){
      searchInput.addEventListener("input", (e) => {
        const q = String(e.target.value || "").trim().toLowerCase();
        filterBySearch(q);
      });
    }

    function filterBySearch(query){
      document.querySelectorAll(".menu-section").forEach(section => {
        let anyVisible = false;
        section.querySelectorAll(".food-item").forEach(itemEl => {
          const name = (itemEl.dataset.name || "").toLowerCase();
          const desc = (itemEl.querySelector(".food-description")?.textContent || "").toLowerCase();
          if (!query || name.includes(query) || desc.includes(query)){
            itemEl.style.display = "";
            anyVisible = true;
          } else {
            itemEl.style.display = "none";
          }
        });
        section.style.display = anyVisible ? "" : "none";
      });
      const anyItemVisible = Array.from(document.querySelectorAll(".food-item")).some(i => i.style.display !== "none");
      if (!anyItemVisible && query){
        showEmptyState();
      } else {
        hideEmptyState();
      }
    }

    function showEmptyState(){
      if (menuContainer.querySelector(".empty-state")) return;
      const emptyState = document.createElement("div");
      emptyState.className = "empty-state";
      emptyState.innerHTML = `<i class="fas fa-search"></i><h3>No items found</h3><p>Try searching for something else</p>`;
      menuContainer.appendChild(emptyState);
    }
    function hideEmptyState(){
      const s = menuContainer.querySelector(".empty-state");
      if (s) s.remove();
    }

    function scrollToSection(index){
      const sec = document.getElementById(`section-${index}`);
      if (!sec) return;
      const headerHeight = document.querySelector(".user-bar").getBoundingClientRect().height + 20;
      const top = sec.getBoundingClientRect().top + window.scrollY - headerHeight;
      window.scrollTo({ top, behavior: "smooth" });
    }

    addToCartBtn.addEventListener("click", function(){
      if (selectedItems.size === 0) return;
      const originalHTML = addToCartBtn.innerHTML;
      addToCartBtn.innerHTML = '<i class="fas fa-check"></i> ADDED';
      addToCartBtn.disabled = true;
      setTimeout(()=> {
        addToCartBtn.innerHTML = originalHTML;
        addToCartBtn.disabled = false;
        window.location.href = "cart.html";
      }, 700);
    });

    // Integrated Home and Logout functionality (no floating elements)
    const homeBtn = document.getElementById("homeBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    
    if (homeBtn) {
      homeBtn.addEventListener("click", function() {
        window.location.href = "home.html";
      });
    }
    
    if (logoutBtn) {
      logoutBtn.addEventListener("click", function() {
        localStorage.removeItem("fp_current_user");
        window.location.href = "login.html";
      });
    }

    function init(){
      loadSelected();
      renderCategories();
      renderFoodItems();
      setupSearch();
      filterBySearch("");
      updateUI();
      document.addEventListener('touchstart', function() {}, { passive: true });
      let lastTouch = 0;
      document.addEventListener('touchend', function(e){
        const now = Date.now();
        if (now - lastTouch <= 300) e.preventDefault();
        lastTouch = now;
      }, false);
      function setVH(){ document.documentElement.style.setProperty('--vh', `${window.innerHeight * 0.01}px`); }
      window.addEventListener('resize', setVH);
      window.addEventListener('orientationchange', setVH);
      setVH();
    }

    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
