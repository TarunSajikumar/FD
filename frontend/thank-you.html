<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>FOOD POINT · Payment Confirmed • Crypto Style</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="fp-config.js"></script>
  <script src="fp-fetch-proxy.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Backgrounds - Crypto Dark Theme */
      --bg-primary: #0A0A0F;
      --bg-secondary: #111116;
      --bg-card: #15171E;
      --bg-elevated: #1A1C23;
      --bg-userbar: #0D0D12;
      
      /* Text Colors */
      --text-primary: #FFFFFF;
      --text-secondary: #8A8F9E;
      --text-muted: #5A5F73;
      
      /* Accent Colors */
      --accent-green: #00FF85;
      --accent-blue: #3B82F6;
      --accent-red: #FF4D4D;
      --accent-orange: #F97316;
      
      /* Borders */
      --border-subtle: #1E1E2E;
      --border-card: rgba(255, 255, 255, 0.05);
      
      /* Spacing */
      --spacing-xs: 0.5rem;
      --spacing-sm: 1rem;
      --spacing-md: 1.5rem;
      --spacing-lg: 2rem;
      --spacing-xl: 3rem;
      
      /* Border Radius */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      
      /* Gradients */
      --gradient-primary: linear-gradient(135deg, #00FF85 0%, #00C96D 100%);
      --gradient-card-hover: linear-gradient(180deg, #1A1C23 0%, #111116 100%);
      --gradient-glow: radial-gradient(circle at 50% 0%, rgba(0, 255, 133, 0.08), transparent);
      --gradient-success: linear-gradient(135deg, #00FF85 0%, #3B82F6 100%);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(0, 255, 133, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255, 157, 77, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 50% 0%, rgba(255, 100, 50, 0.12) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      animation: gradientShift 15s ease-in-out infinite;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(90deg, transparent 1px, rgba(0, 255, 133, 0.03) 1px),
        linear-gradient(transparent 1px, rgba(0, 255, 133, 0.03) 1px);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
      animation: gridShift 20s linear infinite;
    }

    /* User Bar */
    .user-bar {
      background: var(--bg-userbar);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-subtle);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      animation: userBarEnter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .user-bar:hover {
      box-shadow: 0 4px 12px rgba(0, 255, 133, 0.1), inset 0 0 10px rgba(0, 255, 133, 0.05);
      border-color: rgba(0, 255, 133, 0.15);
    }

    @keyframes userBarEnter {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Floating circles */
    .bg-circle-1,
    .bg-circle-2,
    .bg-circle-3 {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(40px);
    }

    .bg-circle-1 {
      width: 300px;
      height: 300px;
      top: 10%;
      right: 5%;
      background: radial-gradient(circle, rgba(0, 255, 133, 0.3) 0%, rgba(0, 255, 133, 0.1) 40%, transparent 70%);
      animation: floatComplex1 25s ease-in-out infinite;
    }

    .bg-circle-2 {
      width: 250px;
      height: 250px;
      bottom: 15%;
      left: 8%;
      background: radial-gradient(circle, rgba(255, 157, 77, 0.25) 0%, rgba(255, 157, 77, 0.08) 40%, transparent 70%);
      animation: floatComplex2 30s ease-in-out infinite;
    }

    .bg-circle-3 {
      width: 280px;
      height: 280px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(255, 100, 50, 0.2) 0%, rgba(255, 100, 50, 0.05) 40%, transparent 70%);
      animation: floatComplex3 35s ease-in-out infinite;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-avatar {
      width: 44px;
      height: 44px;
      background: var(--gradient-primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 20px;
      color: #0A0A0F;
      animation: avatarPulse 2s ease-in-out infinite;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .user-avatar:hover {
      transform: scale(1.1) rotate(5deg);
      box-shadow: 0 0 20px rgba(0, 255, 133, 0.4);
    }

    @keyframes avatarPulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(0, 255, 133, 0.4);
      }
      50% {
        box-shadow: 0 0 0 8px rgba(0, 255, 133, 0);
      }
    }

    .user-text .user-name {
      font-weight: 700;
      font-size: 15px;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .user-text .user-email {
      font-size: 11px;
      color: var(--text-muted);
    }

    .logout-btn {
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      padding: 8px 20px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      gap: 8px;
      animation: buttonEnter 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s backwards;
    }

    .logout-btn:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      background: rgba(59, 130, 246, 0.05);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(59, 130, 246, 0.25);
    }

    @keyframes buttonEnter {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    /* Floating circles */
    .bg-circle-1,
    .bg-circle-2,
    .bg-circle-3 {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(40px);
    }

    .bg-circle-1 {
      width: 300px;
      height: 300px;
      top: 10%;
      right: 5%;
      background: radial-gradient(circle, rgba(0, 255, 133, 0.3) 0%, rgba(0, 255, 133, 0.1) 40%, transparent 70%);
      animation: floatComplex1 25s ease-in-out infinite;
    }

    .bg-circle-2 {
      width: 250px;
      height: 250px;
      bottom: 15%;
      left: 8%;
      background: radial-gradient(circle, rgba(255, 157, 77, 0.25) 0%, rgba(255, 157, 77, 0.08) 40%, transparent 70%);
      animation: floatComplex2 30s ease-in-out infinite;
    }

    .bg-circle-3 {
      width: 280px;
      height: 280px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(255, 100, 50, 0.2) 0%, rgba(255, 100, 50, 0.05) 40%, transparent 70%);
      animation: floatComplex3 35s ease-in-out infinite;
    }

    /* Container */
    .container {
      max-width: 550px;
      margin: 0 auto;
      padding: 40px 20px 60px;
      position: relative;
      z-index: 1;
      animation: pageEnter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }

    @keyframes pageEnter {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Success Circle */
    .success-circle {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, rgba(0, 255, 133, 0.15), rgba(0, 255, 133, 0.05));
      border: 2px solid var(--accent-green);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      animation: successPulse 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, pulse 2s ease-in-out 0.8s infinite;
      box-shadow: 0 0 0 0 rgba(0, 255, 133, 0.4);
    }

    .success-circle i {
      font-size: 40px;
      color: var(--accent-green);
      animation: iconScale 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s backwards;
    }

    @keyframes successPulse {
      0% {
        transform: scale(0.3);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }

    @keyframes iconScale {
      from {
        transform: scale(0);
      }
      to {
        transform: scale(1);
      }
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 800;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      filter: drop-shadow(0 0 20px rgba(0, 255, 133, 0.3));
      animation: titleShimmer 3s ease-in-out infinite, fadeInUp 0.6s ease-out backwards;
    }

    @keyframes titleShimmer {
      0%, 100% {
        filter: drop-shadow(0 0 20px rgba(0, 255, 133, 0.3));
      }
      50% {
        filter: drop-shadow(0 0 30px rgba(0, 255, 133, 0.5));
      }
    }

    .sub-text {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: 32px;
      animation: subtitleEnter 0.8s ease-out 0.15s backwards;
    }

    @keyframes subtitleEnter {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Info Box */
    .info-box {
      background: rgba(0, 255, 133, 0.08);
      border: 1px solid rgba(0, 255, 133, 0.2);
      border-radius: var(--radius-lg);
      padding: 16px 20px;
      text-align: center;
      margin-bottom: 28px;
      color: var(--text-secondary);
      font-size: 0.85rem;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: fadeInUp 0.6s ease-out 0.2s backwards;
      position: relative;
      overflow: hidden;
    }

    .info-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 133, 0.1), transparent);
      transition: left 0.6s ease;
      pointer-events: none;
    }

    .info-box:hover::before {
      left: 100%;
    }

    .info-box:hover {
      border-color: rgba(0, 255, 133, 0.4);
      background: rgba(0, 255, 133, 0.12);
      box-shadow: 0 4px 12px rgba(0, 255, 133, 0.15);
    }

    .info-box i {
      color: var(--accent-green);
      margin-right: 8px;
    }

    /* Order Details */
    .order-details {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-xl);
      padding: 24px;
      margin-bottom: 28px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.2);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: cardEnter 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) 0.25s backwards;
      position: relative;
      overflow: hidden;
    }

    .order-details::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, rgba(0, 255, 133, 0.15), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      opacity: 0.2;
      animation: shimmerPulse 4s ease-in-out infinite;
    }

    @keyframes shimmerPulse {
      0%, 100% {
        opacity: 0.2;
      }
      50% {
        opacity: 0.4;
      }
    }

    .order-details:hover {
      box-shadow: 0 18px 45px -12px rgba(0, 255, 133, 0.25), inset 0 0 20px rgba(0, 255, 133, 0.08);
      border-color: rgba(0, 255, 133, 0.3);
      transform: translateY(-3px) scale(1.01);
    }

    .order-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--accent-green);
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border-subtle);
      animation: fadeInUp 0.6s ease-out 0.3s backwards;
      filter: drop-shadow(0 0 8px rgba(0, 255, 133, 0.2));
    }

    .detail-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-subtle);
      animation: fadeInUp 0.6s ease-out backwards;
    }

    .detail-row:nth-child(2) {
      animation-delay: 0.35s;
    }
    .detail-row:nth-child(3) {
      animation-delay: 0.4s;
    }
    .detail-row:nth-child(4) {
      animation-delay: 0.45s;
    }
    .detail-row:nth-child(5) {
      animation-delay: 0.5s;
    }

    .detail-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .detail-row:hover .detail-label {
      color: var(--accent-green);
    }

    .detail-label i {
      width: 20px;
      color: var(--text-muted);
      transition: color 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .detail-row:hover .detail-label i {
      color: var(--accent-green);
    }

    .detail-value {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    /* Button Row */
    .btn-row {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
      animation: fadeInUp 0.6s ease-out 0.55s backwards;
    }

    .btn {
      flex: 1;
      padding: 14px 20px;
      border-radius: 100px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: 'Inter', sans-serif;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      text-decoration: none;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transform: rotate(45deg);
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    .btn:hover::before {
      opacity: 1;
    }

    .btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top left, rgba(0, 255, 133, 0.12), transparent 45%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .btn:hover::after {
      opacity: 1;
    }

    .btn-primary {
      background: var(--gradient-primary);
      color: #0A0A0F;
    }

    .btn-primary:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 12px 30px rgba(0, 255, 133, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.1);
    }

    .btn-primary:active {
      transform: translateY(0) scale(0.98);
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .btn-outline:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      background: rgba(59, 130, 246, 0.05);
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 20px rgba(59, 130, 246, 0.25);
    }

    .btn-outline:active {
      transform: translateY(0) scale(0.98);
    }

    /* Help Text */
    .help-text {
      text-align: center;
      font-size: 0.75rem;
      color: var(--text-muted);
      animation: fadeInUp 0.6s ease-out 0.65s backwards;
    }

    .help-text a {
      color: var(--accent-green);
      text-decoration: none;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-weight: 600;
    }

    .help-text a:hover {
      text-decoration: underline;
      text-shadow: 0 0 8px rgba(0, 255, 133, 0.4);
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes gradientShift {
      0%, 100% {
        background: 
          radial-gradient(circle at 20% 50%, rgba(0, 255, 133, 0.15) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(255, 157, 77, 0.1) 0%, transparent 50%),
          radial-gradient(circle at 50% 0%, rgba(255, 100, 50, 0.12) 0%, transparent 60%);
      }
      50% {
        background: 
          radial-gradient(circle at 80% 20%, rgba(0, 255, 133, 0.15) 0%, transparent 50%),
          radial-gradient(circle at 20% 80%, rgba(255, 157, 77, 0.1) 0%, transparent 50%),
          radial-gradient(circle at 50% 100%, rgba(255, 100, 50, 0.12) 0%, transparent 60%);
      }
    }

    @keyframes gridShift {
      0% {
        background-position: 0 0, 0 0;
      }
      100% {
        background-position: 50px 50px, 50px 50px;
      }
    }

    @keyframes floatComplex1 {
      0%, 100% {
        transform: translate(0, 0) scale(1) rotate(0deg);
      }
      25% {
        transform: translate(30px, -40px) scale(1.1) rotate(90deg);
      }
      50% {
        transform: translate(-20px, 30px) scale(0.95) rotate(180deg);
      }
      75% {
        transform: translate(40px, 20px) scale(1.05) rotate(270deg);
      }
    }

    @keyframes floatComplex2 {
      0%, 100% {
        transform: translate(0, 0) scale(1) rotate(0deg);
      }
      25% {
        transform: translate(-35px, 25px) scale(0.9) rotate(-90deg);
      }
      50% {
        transform: translate(25px, -35px) scale(1.08) rotate(-180deg);
      }
      75% {
        transform: translate(-20px, -15px) scale(0.98) rotate(-270deg);
      }
    }

    @keyframes floatComplex3 {
      0%, 100% {
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
      }
      25% {
        transform: translate(-50%, -40%) scale(1.08) rotate(45deg);
      }
      50% {
        transform: translate(-60%, -50%) scale(0.95) rotate(90deg);
      }
      75% {
        transform: translate(-40%, -60%) scale(1.05) rotate(135deg);
      }
    }

    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.98);
        filter: blur(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes pageEnter {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 0 0 rgba(0, 255, 133, 0.4);
      }
      50% {
        transform: scale(1.05);
        box-shadow: 0 0 0 10px rgba(0, 255, 133, 0);
      }
    }

    .detail-row:last-child {
      border-bottom: none;
    }

    /* Responsive */
    @media (max-width: 560px) {
      .user-bar {
        padding: 10px 16px;
      }
      .container {
        padding: 30px 16px 40px;
      }
      h1 {
        font-size: 1.4rem;
      }
      .success-circle {
        width: 60px;
        height: 60px;
      }
      .success-circle i {
        font-size: 28px;
      }
      .btn-row {
        flex-direction: column;
      }
      .order-details {
        padding: 18px;
      }
      .detail-row {
        flex-direction: column;
        align-items: flex-start;
        gap: 4px;
      }
    }
  </style>
</head>
<body>

<!-- Floating circle decorations -->
<div class="bg-circle-1"></div>
<div class="bg-circle-2"></div>
<div class="bg-circle-3"></div>

<div class="user-bar">
  <div class="user-info">
    <div class="user-avatar">🍔</div>
    <div class="user-text">
      <div class="user-name">FOOD POINT</div>
      <div class="user-email">premium taste</div>
    </div>
  </div>
  <button class="logout-btn" onclick="location.href='menu.html'"><i class="fas fa-utensils"></i> Menu</button>
</div>

<div class="container page-with-header">
  <div class="success-circle">
    <i class="fas fa-check"></i>
  </div>
  <h1>Payment Successful!</h1>
  <p class="sub-text">Thank you for your order</p>

  <div class="info-box">
    <i class="fas fa-receipt"></i> Your payment has been confirmed. Get ready to enjoy!
  </div>

  <div class="order-details">
    <div class="order-title">
      <i class="fas fa-tag"></i> ORDER SUMMARY
    </div>

    <div class="detail-row">
      <span class="detail-label"><i class="far fa-hashtag"></i> Order ID:</span>
      <span class="detail-value" id="orderId">#FP-001</span>
    </div>

    <div class="detail-row">
      <span class="detail-label"><i class="far fa-calendar-alt"></i> Date:</span>
      <span class="detail-value" id="orderDate">December 18, 2025</span>
    </div>

    <div class="detail-row">
      <span class="detail-label"><i class="fas fa-rupee-sign"></i> Amount Paid:</span>
      <span class="detail-value" id="amountPaid">₹0.00</span>
    </div>

    <div class="detail-row">
      <span class="detail-label"><i class="fas fa-credit-card"></i> Payment Method:</span>
      <span class="detail-value" id="paymentMethod">UPI / Cash</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="location.href='menu.html'">
      <i class="fas fa-utensils"></i> Go Menu
    </button>

    <button class="btn btn-outline" id="viewOrdersBtn">
      <i class="fas fa-clipboard-list"></i> View Orders
    </button>
  </div>

  <!-- Orders Modal -->
  <div id="ordersModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);z-index:200;overflow-y:auto;padding:20px;">
    <div style="max-width:520px;margin:40px auto;background:#15171E;border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:28px;box-shadow:0 30px 60px rgba(0,0,0,.5);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;">
        <div style="font-size:1rem;font-weight:700;color:#00FF85;"><i class="fas fa-history"></i> Your Order History</div>
        <button onclick="document.getElementById('ordersModal').style.display='none'" style="background:transparent;border:1px solid rgba(255,255,255,.15);color:#8A8F9E;border-radius:999px;width:32px;height:32px;cursor:pointer;font-size:16px;">✕</button>
      </div>
      <div id="ordersModalList" style="max-height:60vh;overflow-y:auto;"></div>
    </div>
  </div>

  <p class="help-text">
    <i class="fas fa-headset"></i> Need assistance? <a href="tel:+918095248273">Call Support</a>
  </p>
</div>

<script>
  (function() {
    // ------ KEYS (compatible with payment page flow) ------
    const COUNTER_KEY = "orderCounterDaily";
    const ORDERS_KEY   = "ordersHistory";

    function getCurrentUser() {
      try {
        const raw = localStorage.getItem("fp_current_user");
        return raw ? JSON.parse(raw) : null;
      } catch(e) { return null; }
    }

    function getUserSpecificKey(baseKey) {
      const user = getCurrentUser();
      return user && user.id ? baseKey + "_" + user.id : baseKey;
    }

    function getOrdersStorageKey() {
      const CURRENT_USER_KEY = "fp_current_user";
      const userRaw = localStorage.getItem(CURRENT_USER_KEY);
      if (!userRaw) return ORDERS_KEY;
      try {
        const user = JSON.parse(userRaw);
        if (user && user.id) return ORDERS_KEY + "_" + user.id;
      } catch (e) {}
      return ORDERS_KEY;
    }

    function getShopStatus() {
      return localStorage.getItem('shopStatus') || 'open';
    }

    function enforceOpenStore() {
      if (getShopStatus() === 'closed') {
        window.location.replace('index.html');
        return true;
      }
      return false;
    }

    function formatINR(amountRaw) {
      let numeric = 0;
      if (typeof amountRaw === 'number') numeric = amountRaw;
      else if (typeof amountRaw === 'string') {
        const cleaned = amountRaw.replace(/[₹, ]+/g, '');
        numeric = parseFloat(cleaned);
        if (isNaN(numeric)) numeric = 0;
      } else numeric = 0;
      return '₹' + numeric.toFixed(2);
    }

    function applyOrderToUI(order) {
      if (!order) return;
      const orderId = order._id ? '#FP' + order._id.slice(-6).toUpperCase() : (order.id || '###');
      document.getElementById("orderId").innerText = orderId;

      const dateText = order.createdAt ? new Date(order.createdAt).toLocaleDateString('en-IN', { year: "numeric", month: "long", day: "numeric" }) : (order.date || 'Today');
      document.getElementById("orderDate").innerText = dateText;

      if (order.amount != null) document.getElementById("amountPaid").innerHTML = formatINR(order.amount);
      if (order.method) {
        let methodText = order.method === 'online' ? 'Online UPI' : (order.method === 'cash' ? 'Cash Payment' : order.method);
        document.getElementById("paymentMethod").innerText = methodText;
      }
    }

    // ----- main execution -----
    if (enforceOpenStore()) return;

    let lastOrder = null;
    try {
      const rawLastOrder = localStorage.getItem('fp_last_order');
      if (rawLastOrder) {
        lastOrder = JSON.parse(rawLastOrder);
      }
    } catch(e) {}

    const justPaidFlag = localStorage.getItem(getUserSpecificKey("justPaid")) === "1";
    if (justPaidFlag) {
      // clear cart & payment flags after creating order
      localStorage.removeItem("selectedFoods");
      localStorage.removeItem("selectedFoods_v1");
      localStorage.removeItem(getUserSpecificKey("cartItems"));
      localStorage.removeItem(getUserSpecificKey("parcelSelected"));
      localStorage.setItem(getUserSpecificKey("justPaid"), "0");
    }

    if (lastOrder) {
      applyOrderToUI(lastOrder);
    } else {
      // fallback: attempt to pull from localStorage fields set by payment page
      let fallbackAmount = localStorage.getItem("amountPaid") || "₹149.00";
      let fallbackMethod = localStorage.getItem("paymentMethod") || "Cash / UPI";
      let fallbackDate = new Date().toLocaleDateString("en-IN", { year: "numeric", month: "long", day: "numeric" });
      let fallbackId = "#FP" + Math.floor(Math.random() * 1000);
      applyOrderToUI({
        id: fallbackId,
        date: fallbackDate,
        amount: fallbackAmount,
        method: fallbackMethod
      });
    }

    // Additional polish: if amount displays as ₹0.00 due to missing numeric, try to recover from amountPaidNumeric
    const amountEl = document.getElementById("amountPaid");
    if (amountEl && (amountEl.innerText === "₹0.00" || amountEl.innerText === "₹0.0")) {
      const numericFallback = localStorage.getItem("amountPaidNumeric");
      if (numericFallback && !isNaN(parseFloat(numericFallback))) {
        const val = parseFloat(numericFallback);
        if (val > 0) amountEl.innerText = '₹' + val.toFixed(2);
      } else {
        const rawAmount = localStorage.getItem("amountPaid");
        if (rawAmount && rawAmount !== "₹0.00") {
          const cleaned = rawAmount.replace(/[₹, ]+/g, '');
          const num = parseFloat(cleaned);
          if (!isNaN(num) && num > 0) amountEl.innerText = '₹' + num.toFixed(2);
        }
      }
    }

    // final clean: sync method display if needed
    const methodEl = document.getElementById("paymentMethod");
    const rawMethod = localStorage.getItem("paymentMethod");
    if (rawMethod && methodEl && (methodEl.innerText === "UPI / Cash" || methodEl.innerText === "online / cash")) {
      if (rawMethod === "online") methodEl.innerText = "Online UPI";
      else if (rawMethod === "cash") methodEl.innerText = "Cash on Delivery";
      else methodEl.innerText = rawMethod;
    }
  })();

  // ---- View Orders modal ----
  document.getElementById('viewOrdersBtn').addEventListener('click', function () {
    const modal = document.getElementById('ordersModal');
    const list  = document.getElementById('ordersModalList');

    function getCurrentUser() {
      try { return JSON.parse(localStorage.getItem('fp_current_user') || 'null'); } catch(e){ return null; }
    }
    const user = getCurrentUser();
    const key  = user && user.id ? 'ordersHistory_' + user.id : 'ordersHistory';
    let orders = [];
    try { orders = JSON.parse(localStorage.getItem(key) || '[]'); } catch(e){}

    if (!orders.length) {
      list.innerHTML = '<div style="text-align:center;padding:32px;color:#5A5F73;font-size:14px;"><i class="fas fa-receipt" style="font-size:32px;display:block;margin-bottom:12px;"></i>No orders yet.</div>';
    } else {
      const sorted = orders.slice().reverse();
      list.innerHTML = sorted.map(o => {
        const items = Array.isArray(o.items) ? o.items.join(', ') : '';
        const statusColor = o.status === 'completed' ? '#00FF85' : o.status === 'cancelled' ? '#FF4D4D' : '#F5A623';
        return `<div style="background:#1A1C23;border:1px solid rgba(255,255,255,.07);border-radius:12px;padding:16px;margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px;">
              <span style="font-weight:700;font-size:14px;">${o.id || 'N/A'}</span>
              <span style="font-size:11px;font-weight:600;padding:3px 10px;border-radius:999px;background:rgba(0,0,0,.3);color:${statusColor};">${(o.status||'new').toUpperCase()}</span>
            </div>
            <div style="font-size:12px;color:#8A8F9E;margin-bottom:6px;"><i class="far fa-calendar-alt" style="margin-right:6px;"></i>${o.date || ''} ${o.time || ''}</div>
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px;">
              <span style="color:#8A8F9E;">Amount</span><span style="font-weight:700;color:#00FF85;">${o.amount || '₹0.00'}</span>
            </div>
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:${items?'8px':'0'};">
              <span style="color:#8A8F9E;">Payment</span><span style="font-weight:600;">${o.method || 'N/A'}</span>
            </div>
            ${items ? `<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.06);font-size:12px;color:#5A5F73;">${items}</div>` : ''}
          </div>`;
      }).join('');
    }
    modal.style.display = 'block';
  });

  document.getElementById('ordersModal').addEventListener('click', function(e) {
    if (e.target === this) this.style.display = 'none';
  });
</script>
</body>
</html>
