<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>FOOD POINT · Payment Confirmed</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
</head>
<body>

<div class="user-bar">
  <div class="user-info">
    <div class="user-avatar">🍔</div>
    <div class="user-text">
      <div class="user-name">FOOD POINT</div>
      <div class="user-email">premium taste</div>
    </div>
  </div>
  <button class="logout-btn" onclick="location.href='menu.html'"><i class="fas fa-utensils"></i> Home</button>
</div>

<div class="container page-with-header">
  <div class="success-circle">
    <i class="fas fa-check"></i>
  </div>
  <h1>Payment Successful!</h1>
  <p class="sub-text">Thank you for your order</p>

  <div class="info-box">
    <i class="fas fa-receipt" style="margin-right: 8px;"></i> Your payment has been confirmed. Get ready to enjoy!
  </div>

  <div class="order-details">
    <div class="order-title">
      <i class="fas fa-tag"></i> ORDER SUMMARY
    </div>

    <div class="detail-row">
      <span class="detail-label"><i class="far fa-hashtag"></i> Order ID:</span>
      <span class="detail-value" id="orderId">#FP-001</span>
    </div>

    <div class="detail-row">
      <span class="detail-label"><i class="far fa-calendar-alt"></i> Date:</span>
      <span class="detail-value" id="orderDate">December 18, 2025</span>
    </div>

    <div class="detail-row">
      <span class="detail-label"><i class="fas fa-rupee-sign"></i> Amount Paid:</span>
      <span class="detail-value" id="amountPaid">₹0.00</span>
    </div>

    <div class="detail-row">
      <span class="detail-label"><i class="fas fa-credit-card"></i> Payment Method:</span>
      <span class="detail-value" id="paymentMethod">UPI / Cash</span>
    </div>
  </div>

  <div class="btn-row">
    <button class="btn btn-primary" onclick="location.href='menu.html'">
      <i class="fas fa-home"></i> Back to Menu
    </button>

    <button class="btn btn-outline" onclick="location.href='orders.html'">
      <i class="fas fa-clipboard-list"></i> My Orders
    </button>
  </div>

  <p class="help-text">
    <i class="fas fa-headset"></i> Need assistance? <a href="tel:+918095248273">Call Support</a>
  </p>
</div>

<script>
  (function() {
    // ------ KEYS (compatible with payment page flow) ------
    const COUNTER_KEY = "orderCounterDaily";
    const ORDERS_KEY   = "ordersHistory";

    function getOrdersStorageKey() {
      const CURRENT_USER_KEY = "fp_current_user";
      const userRaw = localStorage.getItem(CURRENT_USER_KEY);
      if (!userRaw) return ORDERS_KEY;
      try {
        const user = JSON.parse(userRaw);
        if (user && user.id) return ORDERS_KEY + "_" + user.id;
      } catch (e) {}
      return ORDERS_KEY;
    }

    function formatINR(amountRaw) {
      let numeric = 0;
      if (typeof amountRaw === 'number') numeric = amountRaw;
      else if (typeof amountRaw === 'string') {
        const cleaned = amountRaw.replace(/[₹, ]+/g, '');
        numeric = parseFloat(cleaned);
        if (isNaN(numeric)) numeric = 0;
      } else numeric = 0;
      return '₹' + numeric.toFixed(2);
    }

    function applyOrderToUI(order) {
      if (order.id) document.getElementById("orderId").innerText = order.id;
      if (order.date) document.getElementById("orderDate").innerText = order.date;
      if (order.amount) document.getElementById("amountPaid").innerHTML = formatINR(order.amount);
      if (order.method) document.getElementById("paymentMethod").innerText = order.method;
    }

    // ------ create fresh order from justPaid flag or retrieve latest ------
    function buildNewOrderFromStorage() {
      const now = new Date();
      const dateOptions = { year: "numeric", month: "long", day: "numeric" };
      const dateText = now.toLocaleDateString("en-IN", dateOptions);
      const timeText = now.toLocaleTimeString("en-IN", { hour: "2-digit", minute: "2-digit" });

      // get amount from payment page (set by payment-flow)
      let storedAmount = localStorage.getItem("amountPaid") || localStorage.getItem("amountPaidNumeric") || "₹0.00";
      let numericAmount = 0;
      if (typeof storedAmount === 'string') {
        const parsed = parseFloat(storedAmount.replace(/[₹, ]+/g, ''));
        numericAmount = isNaN(parsed) ? 0 : parsed;
      } else if (typeof storedAmount === 'number') numericAmount = storedAmount;
      
      const method = localStorage.getItem("paymentMethod") || "Online UPI";
      const displayAmount = (numericAmount > 0) ? '₹' + numericAmount.toFixed(2) : storedAmount;

      // generate order ID sequential (daily)
      const todayKey = now.toISOString().slice(0, 10);
      let counterData = { date: todayKey, last: 0 };
      try {
        const storedCounter = localStorage.getItem(COUNTER_KEY);
        if (storedCounter) {
          const parsed = JSON.parse(storedCounter);
          if (parsed.date === todayKey) counterData = parsed;
        }
      } catch(e) {}
      counterData.last = (counterData.last || 0) + 1;
      localStorage.setItem(COUNTER_KEY, JSON.stringify(counterData));
      const orderNumber = counterData.last;
      const orderId = "#FP" + String(orderNumber).padStart(4, "0") + "-" + String(Date.now()).slice(-4);

      // build items list (for future orders page, we preserve)
      let items = [];
      try {
        const cartRaw = localStorage.getItem('cartItems');
        if (cartRaw) {
          const parsed = JSON.parse(cartRaw);
          if (Array.isArray(parsed) && parsed.length) {
            items = parsed.map(it => (typeof it === 'object' ? (it.name || it.title || 'Item') : String(it)));
          }
        }
      } catch(e) {}
      if (!items.length) {
        try {
          const v1 = JSON.parse(localStorage.getItem('selectedFoods_v1') || '[]');
          if (Array.isArray(v1) && v1.length) items = v1.map(it => typeof it === 'object' ? (it.name || 'Item') : it);
        } catch(e) {}
      }
      if (!items.length) {
        try {
          const legacy = JSON.parse(localStorage.getItem('selectedFoods') || '[]');
          if (Array.isArray(legacy) && legacy.length) items = legacy;
        } catch(e) {}
      }
      
      let customerName = 'Guest';
      try {
        const userRaw = localStorage.getItem("fp_current_user");
        if (userRaw) {
          const user = JSON.parse(userRaw);
          if (user && user.name) customerName = user.name;
        }
      } catch(e) {}

      const newOrder = {
        id: orderId,
        date: dateText,
        time: timeText,
        amount: displayAmount,
        amountNumeric: numericAmount,
        method: method,
        items: items,
        customerName: customerName,
        status: 'confirmed',
        createdAt: now.toISOString()
      };
      return newOrder;
    }

    // ----- main execution -----
    const justPaidFlag = localStorage.getItem("justPaid") === "1";
    const storageKey = getOrdersStorageKey();
    let history = [];

    try {
      const rawHistory = localStorage.getItem(storageKey);
      history = rawHistory ? JSON.parse(rawHistory) : [];
    } catch(e) { history = []; }

    if (justPaidFlag) {
      // fresh order created after successful payment
      const freshOrder = buildNewOrderFromStorage();
      // add to user-specific history
      history.push(freshOrder);
      localStorage.setItem(storageKey, JSON.stringify(history));
      
      // also sync to global ordersHistory (for admin/fallback)
      try {
        const globalHistory = JSON.parse(localStorage.getItem(ORDERS_KEY) || "[]");
        globalHistory.push(freshOrder);
        localStorage.setItem(ORDERS_KEY, JSON.stringify(globalHistory));
      } catch(e) {}

      // display fresh order
      applyOrderToUI(freshOrder);

      // clear cart & payment flags after creating order (preserve justPaid reset)
      localStorage.removeItem("selectedFoods");
      localStorage.removeItem("selectedFoods_v1");
      localStorage.removeItem("cartItems");
      localStorage.removeItem("parcelSelected");
      localStorage.setItem("justPaid", "0");
    } 
    else {
      // No fresh payment — show the most recent order from history (if any)
      if (history.length > 0) {
        const lastOrder = history[history.length - 1];
        applyOrderToUI(lastOrder);
      } 
      else {
        // fallback: attempt to pull from localStorage fields set by payment page
        let fallbackAmount = localStorage.getItem("amountPaid") || "₹149.00";
        let fallbackMethod = localStorage.getItem("paymentMethod") || "Cash / UPI";
        let fallbackDate = new Date().toLocaleDateString("en-IN", { year: "numeric", month: "long", day: "numeric" });
        let fallbackId = "#FP" + Math.floor(Math.random() * 1000);
        applyOrderToUI({
          id: fallbackId,
          date: fallbackDate,
          amount: fallbackAmount,
          method: fallbackMethod
        });
      }
    }

    // Additional polish: if amount displays as ₹0.00 due to missing numeric, try to recover from amountPaidNumeric
    const amountEl = document.getElementById("amountPaid");
    if (amountEl && (amountEl.innerText === "₹0.00" || amountEl.innerText === "₹0.0")) {
      const numericFallback = localStorage.getItem("amountPaidNumeric");
      if (numericFallback && !isNaN(parseFloat(numericFallback))) {
        const val = parseFloat(numericFallback);
        if (val > 0) amountEl.innerText = '₹' + val.toFixed(2);
      } else {
        const rawAmount = localStorage.getItem("amountPaid");
        if (rawAmount && rawAmount !== "₹0.00") {
          const cleaned = rawAmount.replace(/[₹, ]+/g, '');
          const num = parseFloat(cleaned);
          if (!isNaN(num) && num > 0) amountEl.innerText = '₹' + num.toFixed(2);
        }
      }
    }

    // final clean: sync method display if needed
    const methodEl = document.getElementById("paymentMethod");
    const rawMethod = localStorage.getItem("paymentMethod");
    if (rawMethod && methodEl && (methodEl.innerText === "UPI / Cash" || methodEl.innerText === "online / cash")) {
      if (rawMethod === "online") methodEl.innerText = "Online UPI";
      else if (rawMethod === "cash") methodEl.innerText = "Cash on Delivery";
      else methodEl.innerText = rawMethod;
    }
  })();
</script>
</body>
</html>
