<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Food Point • Your Orders</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
</head>
<body>
  <div class="user-bar">
    <div class="user-info">
      <div class="user-avatar">FP</div>
      <div class="user-text">
        <div class="user-name">Food Point</div>
        <div class="user-email">Your Orders</div>
      </div>
    </div>
    <button class="logout-btn" onclick="location.href='menu.html'">Menu</button>
  </div>

  <div class="page-wrap page-with-header">
    <div class="card">
      <div class="home-card">
        <div class="brand">FOOD POINT</div>
        <div class="tagline">Fresh, fast & tasty bites for you</div>
      </div>
      <!-- go to menu button -->
      <button class="back-btn" onclick="location.href='menu.html'">
        <i class="fas fa-arrow-left"></i>
        Go to Menu
      </button>

      <div class="title">your order</div>

      <!-- table header: item | parcel | payment (with details inline) -->
      <div class="header-row">
        <span>item</span>
        <span>parcel</span>
        <span>payment </span>
      </div>

      <div id="ordersContainer"></div>

      <div id="emptyState" class="empty-text" style="display:none;">
        No orders yet. Place an order from the store.
      </div>
    </div>
  </div>

  <script>
    const ORDERS_KEY = "ordersHistory";

    function getOrdersStorageKey() {
      const CURRENT_USER_KEY = "fp_current_user";
      const userRaw = localStorage.getItem(CURRENT_USER_KEY);
      if (!userRaw) return ORDERS_KEY;
      try {
        const user = JSON.parse(userRaw);
        if (user && user.id) return ORDERS_KEY + "_" + user.id;
      } catch (e) {}
      return ORDERS_KEY;
    }

    function formatItemName(item) {
      try {
        if (typeof item === 'string') return item;
        if (item && typeof item === 'object') {
          return item.name || item.title || item.itemName || JSON.stringify(item);
        }
        return String(item);
      } catch(e) {
        return String(item);
      }
    }

    function renderOrders() {
      const container = document.getElementById("ordersContainer");
      const emptyState = document.getElementById("emptyState");

      let orders = [];
      try {
        const raw = localStorage.getItem(getOrdersStorageKey());
        orders = raw ? JSON.parse(raw) : [];
      } catch (e) {
        orders = [];
      }

      if (!orders.length) {
        container.innerHTML = "";
        emptyState.style.display = "block";
        return;
      }

      emptyState.style.display = "none";
      container.innerHTML = "";

      // most recent first
      const reversedOrders = [...orders].reverse();
      
      reversedOrders.forEach(order => {
          const block = document.createElement("div");
          block.className = "order-block";
          
          const orderId = order.id || "###";
          const dateText = order.date || new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
          const method = order.method || "online";   // 'cash' or 'online' (UPI)
          const parcelSelected = order.parcelSelected === true;
          const items = Array.isArray(order.items) ? order.items : [];

          // order id label
          const label = document.createElement("div");
          label.className = "order-id-label";
          label.textContent = `order id #${orderId} • ${dateText}`;
          block.appendChild(label);
          
          // header row (3 columns)
          const header = document.createElement('div');
          header.className = 'order-header';
          
          // --- COLUMN 1: ITEM (FOOD + dine-in/takeaway) ---
          const summaryCol = document.createElement('div');
          summaryCol.className = 'order-summary';
          const foodStrong = document.createElement('strong');
          foodStrong.textContent = 'FOOD';
          const metaSpan = document.createElement('div');
          metaSpan.className = 'order-meta';
          metaSpan.textContent = parcelSelected ? 'Takeaway' : 'Dine in';
          summaryCol.appendChild(foodStrong);
          summaryCol.appendChild(metaSpan);
          
          // --- COLUMN 2: PARCEL (Yes/No) ---
          const parcelCol = document.createElement('div');
          parcelCol.className = 'order-parcel';
          const parcelPill = document.createElement('span');
          parcelPill.className = `status-pill ${parcelSelected ? 'status-paid' : 'status-unpaid'}`;
          parcelPill.textContent = parcelSelected ? 'Yes' : 'No';
          parcelCol.appendChild(parcelPill);
          
          // --- COLUMN 3: PAYMENT PILL + DETAILS BUTTON (in same row) ---
          const paymentCol = document.createElement('div');
          paymentCol.className = 'order-payment';
          
          // Create a flex row container that holds both the payment pill and the details button
          const rowContainer = document.createElement('div');
          rowContainer.className = 'payment-details-row';
          
          // payment pill
          let paymentMethodDisplay = '';
          if (method === 'online') paymentMethodDisplay = 'UPI';
          else if (method === 'cash') paymentMethodDisplay = 'Cash';
          else paymentMethodDisplay = method.charAt(0).toUpperCase() + method.slice(1);
          
          const paymentPill = document.createElement('span');
          paymentPill.className = `status-pill ${method === 'online' ? 'status-paid' : 'status-unpaid'}`;
          paymentPill.textContent = paymentMethodDisplay;
          
          // details toggle button
          const toggleBtn = document.createElement('button');
          toggleBtn.className = 'order-toggle';
          toggleBtn.setAttribute('aria-expanded', 'false');
          toggleBtn.textContent = 'details';
          
          // Append both to the row container
          rowContainer.appendChild(paymentPill);
          rowContainer.appendChild(toggleBtn);
          paymentCol.appendChild(rowContainer);
          
          header.appendChild(summaryCol);
          header.appendChild(parcelCol);
          header.appendChild(paymentCol);
          block.appendChild(header);
          
          // --- DETAILS SECTION (hidden by default, shows ordered items) ---
          const detailsList = document.createElement('ul');
          detailsList.className = 'order-details-list';
          
          if (!items.length) {
            const emptyItem = document.createElement('li');
            emptyItem.className = 'order-item-line';
            emptyItem.textContent = 'No items listed for this order.';
            detailsList.appendChild(emptyItem);
          } else {
            items.forEach(it => {
              const li = document.createElement('li');
              li.className = 'order-item-line';
              li.textContent = formatItemName(it);
              detailsList.appendChild(li);
            });
          }
          block.appendChild(detailsList);
          
          // Toggle logic: expand/collapse on button click or block click (except button)
          const toggleExpanded = (expandedState) => {
            if (expandedState) {
              block.classList.add('expanded');
              toggleBtn.setAttribute('aria-expanded', 'true');
              toggleBtn.textContent = 'hide';
            } else {
              block.classList.remove('expanded');
              toggleBtn.setAttribute('aria-expanded', 'false');
              toggleBtn.textContent = 'details';
            }
          };
          
          // button click handler
          const onToggleClick = (e) => {
            e.stopPropagation();
            const isExpanded = block.classList.contains('expanded');
            toggleExpanded(!isExpanded);
          };
          toggleBtn.addEventListener('click', onToggleClick);
          
          // block click (anywhere except toggle button) expands/collapses
          block.addEventListener('click', (e) => {
            if (e.target === toggleBtn || toggleBtn.contains(e.target)) return;
            const isExpanded = block.classList.contains('expanded');
            toggleExpanded(!isExpanded);
          });
          
          container.appendChild(block);
      });
    }

    // update user display name from localStorage
    function updateUserDisplay() {
      try {
        const rawUser = localStorage.getItem('fp_current_user');
        if (rawUser) {
          let displayName = "Food Point";
          try {
            const parsed = JSON.parse(rawUser);
            if (parsed && parsed.name) displayName = parsed.name;
            else if (parsed && parsed.email) displayName = parsed.email.split('@')[0];
            else if (parsed && parsed.username) displayName = parsed.username;
            else if (typeof parsed === 'string') displayName = parsed.split('@')[0];
          } catch(e) {
            displayName = rawUser.split('@')[0] || "Food Point";
          }
          const userNameSpan = document.querySelector('.user-name');
          if (userNameSpan) userNameSpan.textContent = displayName;
        }
      } catch(e) { /* ignore */ }
    }
    
    // populate sample orders for demo if empty, so UI is not blank
    function populateSampleOrdersIfEmpty() {
      const storageKey = getOrdersStorageKey();
      const existing = localStorage.getItem(storageKey);
      if (!existing || JSON.parse(existing).length === 0) {
        const demoOrders = [
          {
            id: "001",
            date: "16 April 2026",
            method: "cash",
            parcelSelected: false,
            items: ["Grilled Chicken Burger", "French Fries", "Coca-Cola"]
          },
          {
            id: "002",
            date: "15 April 2026",
            method: "online",
            parcelSelected: true,
            items: ["Margherita Pizza", "Garlic Bread", "Lemon Iced Tea"]
          },
          {
            id: "003",
            date: "14 April 2026",
            method: "online",
            parcelSelected: false,
            items: ["Vegan Bowl", "Avocado Smoothie"]
          }
        ];
        localStorage.setItem(storageKey, JSON.stringify(demoOrders));
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      populateSampleOrdersIfEmpty();
      updateUserDisplay();
      renderOrders();
    });
  </script>
</body>
</html>
