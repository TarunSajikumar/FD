<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>Food Point • Your Orders • Crypto Style</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Backgrounds - Crypto Dark Theme */
      --bg-primary: #0A0A0F;
      --bg-secondary: #111116;
      --bg-card: #15171E;
      --bg-elevated: #1A1C23;
      --bg-userbar: #0D0D12;
      
      /* Text Colors */
      --text-primary: #FFFFFF;
      --text-secondary: #8A8F9E;
      --text-muted: #5A5F73;
      
      /* Accent Colors */
      --accent-green: #00FF85;
      --accent-blue: #3B82F6;
      --accent-red: #FF4D4D;
      --accent-orange: #F97316;
      
      /* Borders */
      --border-subtle: #1E1E2E;
      --border-card: rgba(255, 255, 255, 0.05);
      
      /* Spacing */
      --spacing-xs: 0.5rem;
      --spacing-sm: 1rem;
      --spacing-md: 1.5rem;
      --spacing-lg: 2rem;
      --spacing-xl: 3rem;
      
      /* Border Radius */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      
      /* Gradients */
      --gradient-primary: linear-gradient(135deg, #00FF85 0%, #00C96D 100%);
      --gradient-card-hover: linear-gradient(180deg, #1A1C23 0%, #111116 100%);
      --gradient-glow: radial-gradient(circle at 50% 0%, rgba(0, 255, 133, 0.08), transparent);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--gradient-glow);
      pointer-events: none;
      z-index: 0;
    }

    /* User Bar */
    .user-bar {
      background: var(--bg-userbar);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-subtle);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-avatar {
      width: 44px;
      height: 44px;
      background: var(--gradient-primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      color: #0A0A0F;
    }

    .user-text .user-name {
      font-weight: 600;
      font-size: 15px;
      color: var(--text-primary);
    }

    .user-text .user-email {
      font-size: 12px;
      color: var(--text-muted);
    }

    .logout-btn {
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      padding: 8px 20px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
    }

    .logout-btn:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      background: rgba(59, 130, 246, 0.05);
    }

    /* Page Wrap */
    .page-wrap {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 20px 60px;
      position: relative;
      z-index: 1;
    }

    /* Card */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-xl);
      padding: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 133, 0.05);
      transition: all 0.3s ease;
    }

    .card:hover {
      box-shadow: 0 30px 60px -15px rgba(0, 255, 133, 0.15), 0 0 0 1px rgba(0, 255, 133, 0.15);
    }

    /* Home Card / Brand */
    .home-card {
      text-align: center;
      margin-bottom: 24px;
    }

    .brand {
      font-size: 2rem;
      font-weight: 800;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 0.8rem;
      color: var(--text-secondary);
    }

    /* Back Button */
    .back-btn {
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .back-btn:hover {
      border-color: var(--accent-green);
      color: var(--accent-green);
      background: rgba(0, 255, 133, 0.05);
    }

    /* Title */
    .title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-primary);
      margin-bottom: 20px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Header Row */
    .header-row {
      display: grid;
      grid-template-columns: 1fr 80px 120px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 16px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-muted);
    }

    /* Order Block */
    .order-block {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      margin-bottom: 16px;
      overflow: hidden;
      transition: all 0.2s ease;
      cursor: pointer;
    }

    .order-block:hover {
      border-color: rgba(0, 255, 133, 0.3);
      transform: translateX(4px);
    }

    .order-block.expanded {
      border-color: var(--accent-green);
      box-shadow: 0 0 20px rgba(0, 255, 133, 0.1);
    }

    /* Order ID Label */
    .order-id-label {
      padding: 12px 16px;
      background: var(--bg-elevated);
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--accent-green);
      border-bottom: 1px solid var(--border-subtle);
      font-family: monospace;
    }

    /* Order Header (3 columns) */
    .order-header {
      display: grid;
      grid-template-columns: 1fr 80px 120px;
      padding: 16px;
      gap: 8px;
      align-items: center;
    }

    .order-summary strong {
      display: block;
      font-size: 0.9rem;
      color: var(--text-primary);
    }

    .order-meta {
      font-size: 0.7rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .order-parcel {
      text-align: center;
    }

    .order-payment {
      text-align: right;
    }

    /* Status Pills */
    .status-pill {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    .status-paid {
      background: rgba(0, 255, 133, 0.15);
      color: var(--accent-green);
      border: 1px solid rgba(0, 255, 133, 0.3);
    }

    .status-unpaid {
      background: rgba(255, 77, 77, 0.1);
      color: var(--accent-red);
      border: 1px solid rgba(255, 77, 77, 0.2);
    }

    /* Payment Details Row */
    .payment-details-row {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
    }

    /* Order Toggle Button */
    .order-toggle {
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 0.65rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: 'Inter', sans-serif;
    }

    .order-toggle:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
    }

    /* Order Details List */
    .order-details-list {
      list-style: none;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
      background: rgba(0, 0, 0, 0.2);
      border-top: none;
    }

    .order-block.expanded .order-details-list {
      max-height: 500px;
      border-top: 1px solid var(--border-subtle);
    }

    .order-item-line {
      padding: 10px 16px;
      font-size: 0.8rem;
      color: var(--text-secondary);
      border-bottom: 1px solid var(--border-subtle);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .order-item-line::before {
      content: "🍽️";
      font-size: 0.7rem;
      opacity: 0.7;
    }

    .order-item-line:last-child {
      border-bottom: none;
    }

    /* Empty State */
    .empty-text {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    /* Responsive */
    @media (max-width: 560px) {
      .user-bar {
        padding: 10px 16px;
      }
      .card {
        padding: 16px;
      }
      .brand {
        font-size: 1.5rem;
      }
      .header-row {
        grid-template-columns: 1fr 70px 100px;
        font-size: 0.65rem;
      }
      .order-header {
        grid-template-columns: 1fr 70px 100px;
        padding: 12px;
      }
      .payment-details-row {
        flex-direction: column;
        align-items: flex-end;
        gap: 6px;
      }
      .order-toggle {
        font-size: 0.6rem;
        padding: 3px 8px;
      }
      .status-pill {
        font-size: 0.65rem;
        padding: 3px 8px;
      }
    }
  </style>
</head>
<body>
  <div class="user-bar">
    <div class="user-info">
      <div class="user-avatar">FP</div>
      <div class="user-text">
        <div class="user-name">Food Point</div>
        <div class="user-email">Your Orders</div>
      </div>
    </div>
    <button class="logout-btn" onclick="location.href='menu.html'">🍽️ Menu</button>
  </div>

  <div class="page-wrap page-with-header">
    <div class="card">
      <div class="home-card">
        <div class="brand">🍽️ FOOD POINT</div>
        <div class="tagline">Fresh, fast & tasty bites • Crypto Style</div>
      </div>
      <!-- go to menu button -->
      <button class="back-btn" onclick="location.href='menu.html'">
        <i class="fas fa-arrow-left"></i>
        Go to Menu
      </button>

      <div class="title">📋 Your Orders</div>

      <!-- table header: item | parcel | payment (with details inline) -->
      <div class="header-row">
        <span>Item</span>
        <span>Parcel</span>
        <span>Payment</span>
      </div>

      <div id="ordersContainer"></div>

      <div id="emptyState" class="empty-text" style="display:none;">
        <i class="fas fa-receipt" style="font-size: 32px; margin-bottom: 12px; display: block; opacity: 0.5;"></i>
        No orders yet. Place an order from the store.
      </div>
    </div>
  </div>

  <script>
    const ORDERS_KEY = "ordersHistory";

    function getOrdersStorageKey() {
      const CURRENT_USER_KEY = "fp_current_user";
      const userRaw = localStorage.getItem(CURRENT_USER_KEY);
      if (!userRaw) return ORDERS_KEY;
      try {
        const user = JSON.parse(userRaw);
        if (user && user.id) return ORDERS_KEY + "_" + user.id;
      } catch (e) {}
      return ORDERS_KEY;
    }

    function formatItemName(item) {
      try {
        if (typeof item === 'string') return item;
        if (item && typeof item === 'object') {
          return item.name || item.title || item.itemName || JSON.stringify(item);
        }
        return String(item);
      } catch(e) {
        return String(item);
      }
    }

    function renderOrders() {
      const container = document.getElementById("ordersContainer");
      const emptyState = document.getElementById("emptyState");

      let orders = [];
      try {
        const raw = localStorage.getItem(getOrdersStorageKey());
        orders = raw ? JSON.parse(raw) : [];
      } catch (e) {
        orders = [];
      }

      if (!orders.length) {
        container.innerHTML = "";
        emptyState.style.display = "block";
        return;
      }

      emptyState.style.display = "none";
      container.innerHTML = "";

      // most recent first
      const reversedOrders = [...orders].reverse();
      
      reversedOrders.forEach(order => {
          const block = document.createElement("div");
          block.className = "order-block";
          
          const orderId = order.id || "###";
          const dateText = order.date || new Date().toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
          const method = order.method || "online";   // 'cash' or 'online' (UPI)
          const parcelSelected = order.parcelSelected === true;
          const items = Array.isArray(order.items) ? order.items : [];

          // order id label
          const label = document.createElement("div");
          label.className = "order-id-label";
          label.textContent = `🔑 order id #${orderId} • ${dateText}`;
          block.appendChild(label);
          
          // header row (3 columns)
          const header = document.createElement('div');
          header.className = 'order-header';
          
          // --- COLUMN 1: ITEM (FOOD + dine-in/takeaway) ---
          const summaryCol = document.createElement('div');
          summaryCol.className = 'order-summary';
          const foodStrong = document.createElement('strong');
          foodStrong.textContent = '🍕 FOOD';
          const metaSpan = document.createElement('div');
          metaSpan.className = 'order-meta';
          metaSpan.textContent = parcelSelected ? '📦 Takeaway' : '🍽️ Dine in';
          summaryCol.appendChild(foodStrong);
          summaryCol.appendChild(metaSpan);
          
          // --- COLUMN 2: PARCEL (Yes/No) ---
          const parcelCol = document.createElement('div');
          parcelCol.className = 'order-parcel';
          const parcelPill = document.createElement('span');
          parcelPill.className = `status-pill ${parcelSelected ? 'status-paid' : 'status-unpaid'}`;
          parcelPill.textContent = parcelSelected ? 'Yes' : 'No';
          parcelCol.appendChild(parcelPill);
          
          // --- COLUMN 3: PAYMENT PILL + DETAILS BUTTON (in same row) ---
          const paymentCol = document.createElement('div');
          paymentCol.className = 'order-payment';
          
          // Create a flex row container that holds both the payment pill and the details button
          const rowContainer = document.createElement('div');
          rowContainer.className = 'payment-details-row';
          
          // payment pill
          let paymentMethodDisplay = '';
          if (method === 'online') paymentMethodDisplay = 'UPI';
          else if (method === 'cash') paymentMethodDisplay = 'Cash';
          else paymentMethodDisplay = method.charAt(0).toUpperCase() + method.slice(1);
          
          const paymentPill = document.createElement('span');
          paymentPill.className = `status-pill ${method === 'online' ? 'status-paid' : 'status-unpaid'}`;
          paymentPill.textContent = paymentMethodDisplay;
          
          // details toggle button
          const toggleBtn = document.createElement('button');
          toggleBtn.className = 'order-toggle';
          toggleBtn.setAttribute('aria-expanded', 'false');
          toggleBtn.textContent = 'details';
          
          // Append both to the row container
          rowContainer.appendChild(paymentPill);
          rowContainer.appendChild(toggleBtn);
          paymentCol.appendChild(rowContainer);
          
          header.appendChild(summaryCol);
          header.appendChild(parcelCol);
          header.appendChild(paymentCol);
          block.appendChild(header);
          
          // --- DETAILS SECTION (hidden by default, shows ordered items) ---
          const detailsList = document.createElement('ul');
          detailsList.className = 'order-details-list';
          
          if (!items.length) {
            const emptyItem = document.createElement('li');
            emptyItem.className = 'order-item-line';
            emptyItem.textContent = 'No items listed for this order.';
            detailsList.appendChild(emptyItem);
          } else {
            items.forEach(it => {
              const li = document.createElement('li');
              li.className = 'order-item-line';
              li.textContent = formatItemName(it);
              detailsList.appendChild(li);
            });
          }
          block.appendChild(detailsList);
          
          // Toggle logic: expand/collapse on button click or block click (except button)
          const toggleExpanded = (expandedState) => {
            if (expandedState) {
              block.classList.add('expanded');
              toggleBtn.setAttribute('aria-expanded', 'true');
              toggleBtn.textContent = 'hide';
            } else {
              block.classList.remove('expanded');
              toggleBtn.setAttribute('aria-expanded', 'false');
              toggleBtn.textContent = 'details';
            }
          };
          
          // button click handler
          const onToggleClick = (e) => {
            e.stopPropagation();
            const isExpanded = block.classList.contains('expanded');
            toggleExpanded(!isExpanded);
          };
          toggleBtn.addEventListener('click', onToggleClick);
          
          // block click (anywhere except toggle button) expands/collapses
          block.addEventListener('click', (e) => {
            if (e.target === toggleBtn || toggleBtn.contains(e.target)) return;
            const isExpanded = block.classList.contains('expanded');
            toggleExpanded(!isExpanded);
          });
          
          container.appendChild(block);
      });
    }

    // update user display name from localStorage
    function updateUserDisplay() {
      try {
        const rawUser = localStorage.getItem('fp_current_user');
        if (rawUser) {
          let displayName = "Food Point";
          try {
            const parsed = JSON.parse(rawUser);
            if (parsed && parsed.name) displayName = parsed.name;
            else if (parsed && parsed.email) displayName = parsed.email.split('@')[0];
            else if (parsed && parsed.username) displayName = parsed.username;
            else if (typeof parsed === 'string') displayName = parsed.split('@')[0];
          } catch(e) {
            displayName = rawUser.split('@')[0] || "Food Point";
          }
          const userNameSpan = document.querySelector('.user-name');
          if (userNameSpan) userNameSpan.textContent = displayName;
        }
      } catch(e) { /* ignore */ }
    }
    
    // populate sample orders for demo if empty, so UI is not blank
    function populateSampleOrdersIfEmpty() {
      const storageKey = getOrdersStorageKey();
      const existing = localStorage.getItem(storageKey);
      if (!existing || JSON.parse(existing).length === 0) {
        const demoOrders = [
          {
            id: "001",
            date: "16 April 2026",
            method: "cash",
            parcelSelected: false,
            items: ["Grilled Chicken Burger", "French Fries", "Coca-Cola"]
          },
          {
            id: "002",
            date: "15 April 2026",
            method: "online",
            parcelSelected: true,
            items: ["Margherita Pizza", "Garlic Bread", "Lemon Iced Tea"]
          },
          {
            id: "003",
            date: "14 April 2026",
            method: "online",
            parcelSelected: false,
            items: ["Vegan Bowl", "Avocado Smoothie"]
          }
        ];
        localStorage.setItem(storageKey, JSON.stringify(demoOrders));
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      populateSampleOrdersIfEmpty();
      updateUserDisplay();
      renderOrders();
    });
  </script>
</body>
</html>
