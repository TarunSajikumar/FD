<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Food Point | Cart</title>
  <script src="fp-config.js"></script>
  <script src="fp-fetch-proxy.js"></script>
  <script src="api.js"></script>
  <script src="dev-check.js"></script>
  <style>
    /* User-bar styling from menu page */
    .user-bar {
      position: fixed !important;
      top: 14px !important;
      left: 50% !important;
      transform: translateX(-50%) !important;
      max-width: 720px !important;
      width: calc(100% - 28px) !important;
      background: linear-gradient(135deg, rgba(30,35,50,0.8), rgba(25,30,45,0.77)) !important;
      backdrop-filter: blur(16px) saturate(160%) !important;
      border-radius: 20px !important;
      padding: 12px 20px !important;
      display: flex !important;
      align-items: center !important;
      justify-content: space-between !important;
      z-index: 999 !important;
      box-shadow: 0 16px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.12) !important;
      border: 1px solid rgba(255,255,255,0.08) !important;
    }

    .user-info {
      display: flex !important;
      align-items: center !important;
      gap: 10px !important;
    }

    .user-avatar {
      width: 48px !important;
      height: 48px !important;
      border-radius: 12px !important;
      background: linear-gradient(135deg, rgba(255,140,0,0.5), rgba(255,160,20,0.45)) !important;
      display: flex !important;
      align-items: center !important;
      justify-content: center !important;
      color: #f5e6d3 !important;
      font-weight: 800 !important;
      font-size: 18px !important;
      box-shadow: 0 0 20px rgba(255,160,0,0.4) !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
    }

    .user-text {
      display: flex !important;
      flex-direction: column !important;
      gap: 2px !important;
    }

    .user-name {
      color: #f5e6d3 !important;
      font-weight: 700 !important;
      font-size: 13px !important;
      letter-spacing: 0.04em !important;
    }

    .user-email {
      color: #aeb5c4 !important;
      font-size: 11px !important;
      letter-spacing: 0.02em !important;
    }

    .logout-btn {
      background: linear-gradient(135deg, rgba(0,200,150,0.3), rgba(0,180,140,0.25)) !important;
      border: 1px solid rgba(0,220,170,0.3) !important;
      color: #00d9a3 !important;
      padding: 8px 16px !important;
      border-radius: 10px !important;
      font-size: 12px !important;
      font-weight: 700 !important;
      cursor: pointer !important;
      transition: all 200ms ease !important;
      box-shadow: 0 0 16px rgba(0,220,170,0.35) !important;
      letter-spacing: 0.04em !important;
      text-transform: uppercase !important;
    }

    .logout-btn:hover {
      background: linear-gradient(135deg, rgba(0,220,170,0.4), rgba(0,200,150,0.35)) !important;
      box-shadow: 0 0 24px rgba(0,220,170,0.5) !important;
      transform: translateY(-1px) !important;
    }

    .page-with-header {
      margin-top: 100px !important;
    }

    /* Cart page styling */
    :root {
      --bg: #0a0e1a;
      --card: linear-gradient(135deg, rgba(30,35,50,0.85), rgba(25,30,45,0.82));
      --muted: #aeb5c4;
      --accent: #ffaa00;
      --text: #f5e6d3;
      --border: rgba(255,255,255,0.08);
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg) url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100"><defs><filter id="noise"><feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="4" result="noise"/></filter></defs><rect width="100" height="100" fill="%23000" filter="url(%23noise)" opacity="0.03"/></svg>');
      background-attachment: fixed;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 20% 50%, rgba(255,140,0,0.15), transparent 50%), radial-gradient(circle at 80% 80%, rgba(0,200,150,0.1), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    body > * {
      position: relative;
      z-index: 1;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-top: 0;
    }

    .cart-card {
      background: var(--card);
      padding: 28px;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.1);
      width: 480px;
      max-width: 100%;
      border: 1px solid var(--border);
      backdrop-filter: blur(12px) saturate(140%);
      margin-top: 20px;
    }

    h2 {
      text-align: center;
      font-size: 24px;
      margin: 0 0 20px;
      letter-spacing: 0.12em;
      color: #f5e6d3;
      text-shadow: 0 4px 20px rgba(255,140,0,0.2);
    }

    .cart-list {
      max-height: 420px;
      overflow: auto;
      -webkit-overflow-scrolling: touch;
      margin-bottom: 20px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 12px 0;
    }

    .cart-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 10px;
      border-radius: 14px;
      background: rgba(40,50,70,0.3);
      margin-bottom: 8px;
      border: 1px solid var(--border);
      transition: all 200ms ease;
    }

    .cart-item:hover {
      background: rgba(50,65,90,0.4);
    }

    .cart-left {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      flex: 1;
    }

    .item-info {
      display: flex;
      flex-direction: column;
    }

    .item-name {
      font-weight: 700;
      color: #f5e6d3;
    }

    .item-desc {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .qty-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: 12px;
    }

    .qty-btn {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(40,50,70,0.4);
      color: #f5e6d3;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      cursor: pointer;
      touch-action: manipulation;
      transition: all 160ms ease;
    }

    .qty-btn:hover {
      background: rgba(50,65,90,0.6);
      border-color: rgba(0,220,170,0.3);
    }

    .qty-num {
      min-width: 28px;
      text-align: center;
      color: #f5e6d3;
      font-weight: 700;
    }

    .item-price {
      font-weight: 800;
      color: #00d9a3;
      white-space: nowrap;
      text-shadow: 0 0 8px rgba(0,220,170,0.3);
    }

    .remove-btn {
      background: transparent;
      border: 0;
      color: #ff6b6b;
      font-weight: 600;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 8px;
      transition: all 200ms ease;
      font-size: 13px;
    }

    .remove-btn:hover {
      background: rgba(255,107,107,0.1);
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 12px;
      font-size: 15px;
      color: var(--muted);
    }

    .summary-row strong {
      font-size: 16px;
      color: #f5e6d3;
    }

    .pay-btn {
      width: 100%;
      padding: 16px 0;
      margin-top: 20px;
      border-radius: 14px;
      border: 0;
      background: linear-gradient(135deg, #ffaa00, #ff8c00);
      color: #0a0e1a;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      touch-action: manipulation;
      transition: all 200ms ease;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      box-shadow: 0 0 20px rgba(255,140,0,0.35);
    }

    .pay-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(255,140,0,0.5);
    }

    .pay-btn:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .empty-text {
      text-align: center;
      padding: 40px 20px;
      color: var(--muted);
      font-size: 16px;
    }

    .parcel-section {
      margin-top: 20px;
      padding: 16px;
      border-top: 1px solid var(--border);
      background: rgba(40,50,70,0.3);
      border-radius: 12px;
      border: 1px solid var(--border);
    }

    .parcel-label {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 8px;
      cursor: pointer;
      user-select: none;
      color: #f5e6d3;
    }

    .parcel-label input {
      cursor: pointer;
      width: 18px;
      height: 18px;
    }

    .parcel-charge {
      font-size: 13px;
      color: var(--muted);
      margin-top: 6px;
    }

    .total-section {
      background: rgba(40,50,70,0.4);
      padding: 12px 16px;
      border-radius: 12px;
      margin-top: 16px;
      border: 1px solid var(--border);
    }

    @media (max-width: 480px) {
      .cart-card {
        padding: 20px;
        border-radius: 16px;
        margin-top: 10px;
      }
      
      .page {
        padding: 16px;
      }
      
      .qty-btn {
        width: 36px;
        height: 36px;
      }
      
      .user-bar {
        width: calc(100% - 20px) !important;
        padding: 10px 16px !important;
      }
    }

    /* Scrollbar styling */
    .cart-list::-webkit-scrollbar {
      width: 6px;
    }

    .cart-list::-webkit-scrollbar-track {
      background: rgba(40,50,70,0.3);
      border-radius: 3px;
    }

    .cart-list::-webkit-scrollbar-thumb {
      background: rgba(255,140,0,0.4);
      border-radius: 3px;
    }

    .cart-list::-webkit-scrollbar-thumb:hover {
      background: rgba(255,140,0,0.6);
    }
  </style>
</head>
<body>
  <div class="user-bar" aria-hidden="false">
    <div class="user-info">
      <div class="user-avatar">FP</div>
      <div class="user-text">
        <div class="user-name">Food Point</div>
        <div class="user-email">Cart</div>
      </div>
    </div>
    <button class="logout-btn" onclick="location.href='home.html'">Home</button>
  </div>

  <div class="page page-with-header">
    <div class="cart-card" role="main" aria-label="Cart">
      <h2>🛒 YOUR CART</h2>

      <div id="cartList" class="cart-list" aria-live="polite"></div>

      <div class="summary-row">
        <span>Total items:</span>
        <strong id="itemCount">0</strong>
      </div>

      <div class="summary-row">
        <span>Subtotal:</span>
        <strong id="amountDisplay">₹0.00</strong>
      </div>

      <div class="parcel-section">
        <label class="parcel-label">
          <input type="checkbox" id="parcelCheckbox">
          <span>📦 Add Parcel Protection (+₹5)</span>
        </label>
        <div class="parcel-charge" id="parcelChargeDisplay">Parcel charge: ₹0.00</div>
      </div>

      <div class="total-section">
        <div class="summary-row" style="font-size:17px;">
          <span>Total Amount:</span>
          <strong id="totalDisplay">₹0.00</strong>
        </div>
      </div>

      <button id="payBtn" class="pay-btn" disabled>PROCEED TO PAY</button>
      
      <div style="text-align:center; margin-top:16px;">
        <button onclick="location.href='store.html'" style="background:transparent; border:1px solid rgba(255,255,255,0.1); color:#aeb5c4; padding:10px 20px; border-radius:10px; cursor:pointer; transition:all 200ms ease;">
          ← Back to Menu
        </button>
      </div>
    </div>
  </div>

<script>
/*
  Cart page (updated)
  - Supports two store formats:
    1) legacy: selectedFoods (array of strings)
    2) modern: selectedFoods_v1 (array of objects {id, name, price, numericPrice, quantity, description})
  - Persists updates to same key it was read from.
  - Adds quantity controls, per-item subtotal, remove button.
  - Writes numeric amountPaid and cartItems to localStorage on PAY.
*/

/* ---------- Helpers ---------- */
const KEYS_TO_TRY = ['selectedFoods_v1', 'selectedFoods'];
function readCartStorageKey() {
  // prefer v1 if present
  for (const k of KEYS_TO_TRY) {
    if (localStorage.getItem(k)) return k;
  }
  // default to v1 if nothing exists
  return KEYS_TO_TRY[0];
}
function parsePriceToNumber(price) {
  if (price == null) return 0;
  if (typeof price === 'number') return price;
  const s = String(price);
  const m = s.match(/(\d+(\.\d+)?)/);
  return m ? Number(m[1]) : 0;
}
function formatCurrency(n) {
  return '₹' + Number(n).toFixed(2);
}

/* ---------- Read / Write ---------- */
let storageKey = readCartStorageKey();

function readSelectedFoodsRaw() {
  try {
    const raw = localStorage.getItem(storageKey);
    if (!raw) return [];
    return JSON.parse(raw);
  } catch (e) {
    console.error('Failed reading cart storage', e);
    return [];
  }
}

function writeSelectedFoodsRaw(value) {
  try {
    localStorage.setItem(storageKey, JSON.stringify(value));
    // keep backwards compatibility: also write legacy key if we're using modern
    if (storageKey === 'selectedFoods_v1') {
      localStorage.setItem('selectedFoods', JSON.stringify(value.map(i => (typeof i === 'string' ? i : i.name))));
    }
  } catch (e) { console.warn('Write failed', e); }
}

/* ---------- Normalized cart model ----------
   We normalize to an array of objects:
   { id, name, price, numericPrice, quantity, description }
---------------------------------------------*/
function normalizedCartFromStorage() {
  const raw = readSelectedFoodsRaw();
  if (!Array.isArray(raw)) return [];

  // If legacy array of strings
  if (raw.length && typeof raw[0] === 'string') {
    return raw.map((name, idx) => ({
      id: 'legacy-' + idx + '-' + slug(name),
      name,
      price: null,
      numericPrice: 0,
      quantity: 1,
      description: ''
    }));
  }

  // If array of objects (modern)
  return raw.map((it, idx) => {
    if (!it) return null;
    // robust numeric parsing: treat explicit 0 as valid (don't fall back because of ||)
    let numeric;
    if ('numericPrice' in it) {
      numeric = Number(it.numericPrice != null ? it.numericPrice : parsePriceToNumber(it.price));
    } else {
      numeric = parsePriceToNumber(it.price);
    }
    return {
      id: it.id || 'i' + idx + '-' + slug(it.name || 'item'),
      name: it.name || (typeof it === 'string' ? it : ('Item ' + idx)),
      price: (it.price != null) ? it.price : (it.numericPrice != null ? String(it.numericPrice) : null),
      numericPrice: Number.isFinite(Number(numeric)) ? Number(numeric) : 0,
      quantity: (it.quantity && Number(it.quantity) > 0) ? Number(it.quantity) : 1,
      description: it.description || ''
    };
  }).filter(Boolean);
}

function slug(s){ return String(s||'').toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''); }

/* ---------- UI ---------- */
const cartList = document.getElementById('cartList');
const itemCountEl = document.getElementById('itemCount');
const amountEl = document.getElementById('amountDisplay');
const totalEl = document.getElementById('totalDisplay');
const parcelCheckbox = document.getElementById('parcelCheckbox');
const parcelChargeDisplay = document.getElementById('parcelChargeDisplay');
const payBtn = document.getElementById('payBtn');

let normalizedCart = []; // in-memory
const PARCEL_CHARGE = 5;

function renderCart() {
  normalizedCart = normalizedCartFromStorage();
  cartList.innerHTML = '';

  if (!normalizedCart.length) {
    cartList.innerHTML = '<div class="empty-text">Your cart is empty.<br><small style="font-size:14px;margin-top:8px;display:block">Add items from the menu first</small></div>';
    itemCountEl.textContent = '0';
    amountEl.textContent = formatCurrency(0);
    totalEl.textContent = formatCurrency(0);
    payBtn.disabled = true;
    return;
  }

  normalizedCart.forEach((it, idx) => {
    const row = document.createElement('div');
    row.className = 'cart-item';
    row.dataset.index = idx;

    const variantText = it.price ? ` • ${escapeHtml(String(it.price))}` : '';
    const subtotal = (it.numericPrice || 0) * (it.quantity || 1);
    
    row.innerHTML = `
      <div class="cart-left">
        <div class="item-info">
          <div class="item-name">${escapeHtml(it.name)}<span style="font-size:12px;color:#00d9a3;margin-left:8px">${variantText}</span></div>
          ${it.description ? `<div class="item-desc">${escapeHtml(it.description)}</div>` : ''}
        </div>
      </div>

      <div style="display:flex;align-items:center;gap:12px">
        <div style="display:flex;align-items:center">
          <button class="qty-btn dec" aria-label="Decrease quantity">−</button>
          <div class="qty-num" style="min-width:28px;text-align:center">${it.quantity}</div>
          <button class="qty-btn inc" aria-label="Increase quantity">+</button>
        </div>
        <div style="text-align:right">
          <div class="item-price">${formatCurrency(it.numericPrice)}</div>
          <div style="font-size:13px;color:#aeb5c4;margin-top:4px">Subtotal: ${formatCurrency(subtotal)}</div>
        </div>
        <div style="margin-left:8px">
          <button class="remove-btn" aria-label="Remove item">✕</button>
        </div>
      </div>
    `;
    cartList.appendChild(row);

    // wire buttons
    row.querySelector('.dec').addEventListener('click', () => {
      changeQty(idx, Math.max(1, normalizedCart[idx].quantity - 1));
    });
    row.querySelector('.inc').addEventListener('click', () => {
      changeQty(idx, normalizedCart[idx].quantity + 1);
    });
    row.querySelector('.remove-btn').addEventListener('click', () => {
      if (confirm('Remove this item from cart?')) {
        removeItem(idx);
      }
    });
  });

  updateSummary();
  payBtn.disabled = false;
}

/* ---------- Actions ---------- */
function changeQty(index, newQty) {
  newQty = Number(newQty) || 1;
  normalizedCart[index].quantity = newQty;
  persistNormalizedCart();
  renderCart();
}

function removeItem(index) {
  normalizedCart.splice(index, 1);
  persistNormalizedCart();
  renderCart();
}

function persistNormalizedCart() {
  // write back to storage using the same key we read from (storageKey)
  if (storageKey === 'selectedFoods') {
    // legacy: write back array of names
    const names = normalizedCart.map(i => i.name);
    writeSelectedFoodsRaw(names);
  } else {
    // modern (selectedFoods_v1): write back array of objects
    const out = normalizedCart.map(i => ({
      id: i.id,
      name: i.name,
      price: i.price,
      numericPrice: i.numericPrice,
      quantity: i.quantity,
      description: i.description
    }));
    writeSelectedFoodsRaw(out);
  }
}

function updateSummary() {
  const count = normalizedCart.reduce((s,i) => s + (i.quantity || 1), 0);
  const amount = normalizedCart.reduce((s,i) => s + (i.numericPrice || 0) * (i.quantity || 1), 0);
  const parcelCharge = parcelCheckbox.checked ? PARCEL_CHARGE : 0;
  const total = amount + parcelCharge;
  
  itemCountEl.textContent = String(count);
  amountEl.textContent = formatCurrency(amount);
  parcelChargeDisplay.textContent = `Parcel charge: ${formatCurrency(parcelCharge)}`;
  totalEl.textContent = formatCurrency(total);
}

function escapeHtml(s){ 
  return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); 
}

/* ---------- PAY ---------- */
payBtn.addEventListener('click', () => {
  if (!normalizedCart.length) return;
  
  const amount = normalizedCart.reduce((s,i) => s + (i.numericPrice || 0) * (i.quantity || 1), 0);
  const parcelCharge = parcelCheckbox.checked ? PARCEL_CHARGE : 0;
  const totalAmount = amount + parcelCharge;
  
  // Persist for payment page
  localStorage.setItem('amountPaid', String(totalAmount));
  localStorage.setItem('cartItems', JSON.stringify(normalizedCart));
  localStorage.setItem('parcelSelected', String(parcelCheckbox.checked));
  localStorage.setItem('parcelCharge', String(parcelCharge));
  localStorage.setItem('amountPaidDisplay', formatCurrency(totalAmount));
  
  // Navigate to payment page
  window.location.href = 'payment-options.html';
});

/* Setup parcel checkbox */
parcelCheckbox.addEventListener('change', updateSummary);

/* ---------- boot ---------- */
(function boot(){
  // choose correct storageKey (re-evaluate at boot)
  storageKey = readCartStorageKey();
  
  // restore parcel checkbox state if previously selected
  try {
    parcelCheckbox.checked = localStorage.getItem('parcelSelected') === 'true';
  } catch (e) { /* ignore */ }

  // render UI
  renderCart();
})();

</script>
</body>
</html>
