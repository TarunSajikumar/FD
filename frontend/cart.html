<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>Food Point | Cart • Crypto Style</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="fp-config.js"></script>
  <script src="fp-fetch-proxy.js"></script>
  <script src="api.js"></script>
  <script src="dev-check.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Backgrounds - Crypto Dark Theme */
      --bg-primary: #0A0A0F;
      --bg-secondary: #111116;
      --bg-card: #15171E;
      --bg-elevated: #1A1C23;
      --bg-userbar: #0D0D12;
      
      /* Text Colors */
      --text-primary: #FFFFFF;
      --text-secondary: #8A8F9E;
      --text-muted: #5A5F73;
      
      /* Accent Colors */
      --accent-green: #00FF85;
      --accent-blue: #3B82F6;
      --accent-red: #FF4D4D;
      --accent-orange: #F97316;
      
      /* Borders */
      --border-subtle: #1E1E2E;
      --border-card: rgba(255, 255, 255, 0.05);
      
      /* Spacing */
      --spacing-xs: 0.5rem;
      --spacing-sm: 1rem;
      --spacing-md: 1.5rem;
      --spacing-lg: 2rem;
      --spacing-xl: 3rem;
      
      /* Border Radius */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      
      /* Gradients */
      --gradient-primary: linear-gradient(135deg, #00FF85 0%, #00C96D 100%);
      --gradient-card-hover: linear-gradient(180deg, #1A1C23 0%, #111116 100%);
      --gradient-glow: radial-gradient(circle at 50% 0%, rgba(0, 255, 133, 0.08), transparent);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(0, 255, 133, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(255, 157, 77, 0.1) 0%, transparent 50%),
        radial-gradient(circle at 50% 0%, rgba(255, 100, 50, 0.12) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      animation: gradientShift 15s ease-in-out infinite;
    }

    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: 
        linear-gradient(0deg, transparent 24%, rgba(0, 255, 133, 0.03) 25%, rgba(0, 255, 133, 0.03) 26%, transparent 27%, transparent 74%, rgba(0, 255, 133, 0.03) 75%, rgba(0, 255, 133, 0.03) 76%, transparent 77%, transparent),
        linear-gradient(90deg, transparent 24%, rgba(0, 255, 133, 0.03) 25%, rgba(0, 255, 133, 0.03) 26%, transparent 27%, transparent 74%, rgba(0, 255, 133, 0.03) 75%, rgba(0, 255, 133, 0.03) 76%, transparent 77%, transparent);
      background-size: 50px 50px;
      pointer-events: none;
      z-index: 0;
      animation: gridShift 20s linear infinite;
    }

    /* Floating circles */
    .bg-circle-1,
    .bg-circle-2,
    .bg-circle-3 {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      filter: blur(40px);
    }

    .bg-circle-1 {
      width: 300px;
      height: 300px;
      top: 10%;
      right: 5%;
      background: radial-gradient(circle, rgba(0, 255, 133, 0.3) 0%, rgba(0, 255, 133, 0.1) 40%, transparent 70%);
      animation: floatComplex1 25s ease-in-out infinite;
    }

    .bg-circle-2 {
      width: 250px;
      height: 250px;
      bottom: 15%;
      left: 8%;
      background: radial-gradient(circle, rgba(255, 157, 77, 0.25) 0%, rgba(255, 157, 77, 0.1) 40%, transparent 70%);
      animation: floatComplex2 30s ease-in-out infinite;
    }

    .bg-circle-3 {
      width: 280px;
      height: 280px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(255, 100, 50, 0.2) 0%, rgba(255, 100, 50, 0.1) 40%, transparent 70%);
      animation: floatComplex3 35s ease-in-out infinite;
    }

    /* User Bar */
    .user-bar {
      background: var(--bg-userbar);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--border-subtle);
      padding: 12px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 30px rgba(0, 255, 133, 0.05), inset 0 1px 0 rgba(255, 255, 255, 0.05);
      animation: userBarEnter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }

    @keyframes userBarEnter {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-avatar {
      width: 44px;
      height: 44px;
      background: var(--gradient-primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 18px;
      color: #0A0A0F;
      box-shadow: 0 0 20px rgba(0, 255, 133, 0.3), 0 0 40px rgba(0, 255, 133, 0.1);
      animation: avatarPulse 2s ease-in-out infinite;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .user-avatar:hover {
      transform: scale(1.1) rotate(5deg);
      box-shadow: 0 0 30px rgba(0, 255, 133, 0.5), 0 0 60px rgba(0, 255, 133, 0.3);
    }

    @keyframes avatarPulse {
      0%, 100% {
        box-shadow: 0 0 0 0 rgba(0, 255, 133, 0.4);
      }
      50% {
        box-shadow: 0 0 0 8px rgba(0, 255, 133, 0);
      }
    }

    .user-text .user-name {
      font-weight: 600;
      font-size: 15px;
      color: var(--text-primary);
    }

    .user-text .user-email {
      font-size: 12px;
      color: var(--text-muted);
    }

    .logout-btn {
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      padding: 8px 20px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow: hidden;
    }

    .logout-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at center, rgba(59, 130, 246, 0.1) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: 100px;
    }

    .logout-btn:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      background: rgba(59, 130, 246, 0.05);
      box-shadow: 0 0 20px rgba(59, 130, 246, 0.3), inset 0 0 20px rgba(59, 130, 246, 0.05);
      transform: translateY(-3px) scale(1.05);
    }

    .logout-btn:hover::before {
      opacity: 1;
    }

    /* Page */
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 20px 60px;
      position: relative;
      z-index: 1;
      animation: pageEnter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }

    @keyframes pageEnter {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Cart Card */
    .cart-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-xl);
      padding: 28px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 133, 0.05);
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: cardEnter 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
      position: relative;
      overflow: hidden;
    }

    .cart-card::before {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle, rgba(0, 255, 133, 0.1) 0%, transparent 70%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s ease;
      animation: shimmerPulse 4s ease-in-out infinite;
    }

    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: translateY(24px) scale(0.98);
        filter: blur(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes shimmerPulse {
      0%, 100% {
        opacity: 0.2;
      }
      50% {
        opacity: 0.4;
      }
    }

    .cart-card:hover {
      box-shadow: 0 30px 70px -10px rgba(0, 255, 133, 0.25), 0 0 40px rgba(0, 255, 133, 0.2), inset 0 0 20px rgba(0, 255, 133, 0.05);
      border-color: rgba(0, 255, 133, 0.2);
      transform: translateY(-8px);
    }

    .cart-card:hover::before {
      opacity: 1;
    }

    .cart-card h2 {
      font-size: 1.5rem;
      font-weight: 700;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 24px;
      letter-spacing: -0.02em;
      filter: drop-shadow(0 0 20px rgba(0, 255, 133, 0.3));
      animation: titleShimmer 3s ease-in-out infinite, fadeInUp 0.6s ease-out backwards;
    }

    @keyframes titleShimmer {
      0%, 100% {
        filter: drop-shadow(0 0 20px rgba(0, 255, 133, 0.3));
      }
      50% {
        filter: drop-shadow(0 0 30px rgba(0, 255, 133, 0.5));
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Cart List */
    .cart-list {
      margin-bottom: 24px;
    }

    /* Cart Item */
    .cart-item {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.6s ease-out backwards;
    }

    .cart-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 133, 0.1), transparent);
      transition: left 0.6s ease;
    }

    .cart-item:hover {
      border-color: rgba(0, 255, 133, 0.5);
      background: rgba(21, 23, 30, 0.8);
      box-shadow: 0 0 25px rgba(0, 255, 133, 0.15), inset 0 0 15px rgba(0, 255, 133, 0.05);
      transform: translateX(6px);
    }

    .cart-item:hover::before {
      left: 100%;
    }

    .cart-left {
      flex: 1;
    }

    .item-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .item-name {
      font-weight: 600;
      font-size: 15px;
      color: var(--text-primary);
    }

    .item-desc {
      font-size: 11px;
      color: var(--text-muted);
    }

    .item-price {
      font-weight: 700;
      color: var(--accent-green);
      font-size: 14px;
      animation: priceShimmer 2s ease-in-out infinite;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes priceShimmer {
      0%, 100% {
        color: var(--accent-green);
        text-shadow: 0 0 5px rgba(0, 255, 133, 0);
      }
      50% {
        color: var(--accent-green);
        text-shadow: 0 0 10px rgba(0, 255, 133, 0.4);
      }
    }

    /* Quantity Controls */
    .qty-btn {
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: 'Inter', sans-serif;
      position: relative;
      overflow: hidden;
    }

    .qty-btn::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: radial-gradient(circle, rgba(0, 255, 133, 0.3) 0%, transparent 70%);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.5s ease, height 0.5s ease;
    }

    .qty-btn:hover {
      border-color: var(--accent-green);
      color: var(--accent-green);
      box-shadow: 0 0 15px rgba(0, 255, 133, 0.3), inset 0 0 10px rgba(0, 255, 133, 0.1);
      transform: scale(1.1) translateY(-2px);
    }

    .qty-btn:hover::before {
      width: 100px;
      height: 100px;
    }

    .qty-btn:active {
      transform: scale(0.98) translateY(0);
    }

    .qty-num {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
    }

    /* Remove Button */
    .remove-btn {
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: var(--text-muted);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
    }

    .remove-btn::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: radial-gradient(circle, rgba(255, 77, 77, 0.4) 0%, transparent 70%);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.4s ease, height 0.4s ease;
    }

    .remove-btn:hover {
      border-color: var(--accent-red);
      color: var(--accent-red);
      background: rgba(255, 77, 77, 0.08);
      box-shadow: 0 0 20px rgba(255, 77, 77, 0.3), inset 0 0 10px rgba(255, 77, 77, 0.1);
      transform: scale(1.15) translateY(-2px);
    }

    .remove-btn:hover::after {
      width: 100px;
      height: 100px;
    }

    .remove-btn:active {
      transform: scale(0.98) translateY(0);
    }

    /* Empty State */
    .empty-text {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
      font-size: 0.9rem;
      animation: fadeInUp 0.6s ease-out backwards;
    }

    .empty-text i {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
      animation: emptyIconFloat 3s ease-in-out infinite;
      display: inline-block;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes emptyIconFloat {
      0%, 100% {
        transform: translateY(0px) scale(1);
      }
      50% {
        transform: translateY(-12px) scale(1.08);
      }
    }

    /* Summary Rows */
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-subtle);
      font-size: 14px;
      color: var(--text-secondary);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: fadeInUp 0.6s ease-out backwards;
    }

    .summary-row:nth-of-type(1) {
      animation-delay: 0.2s;
    }
    .summary-row:nth-of-type(2) {
      animation-delay: 0.25s;
    }

    .summary-row:hover {
      color: var(--text-primary);
      transform: translateX(4px);
    }

    .summary-row strong {
      color: var(--text-primary);
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .summary-row:hover strong {
      color: var(--accent-green);
      text-shadow: 0 0 10px rgba(0, 255, 133, 0.2);
    }

    /* Parcel Section */
    .parcel-section {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      padding: 16px;
      margin: 16px 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: cardEnter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s backwards;
      position: relative;
      overflow: hidden;
    }

    .parcel-section:hover {
      border-color: rgba(0, 255, 133, 0.3);
      background: rgba(17, 17, 22, 0.8);
      box-shadow: 0 0 20px rgba(0, 255, 133, 0.1), inset 0 0 15px rgba(0, 255, 133, 0.03);
      transform: translateY(-2px) scale(1.01);
    }

    .parcel-label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-secondary);
    }

    .parcel-label input {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: var(--accent-green);
      transition: all 0.3s ease;
    }

    .parcel-label input:hover {
      filter: drop-shadow(0 0 6px rgba(0, 255, 133, 0.4));
    }

    .parcel-label input:checked {
      filter: drop-shadow(0 0 10px rgba(0, 255, 133, 0.6));
    }

    .parcel-charge {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 8px;
      padding-top: 8px;
      border-top: 1px solid var(--border-subtle);
    }

    /* Total Section */
    .total-section {
      background: var(--bg-elevated);
      border-radius: var(--radius-md);
      padding: 16px;
      margin: 16px 0;
      border: 1px solid var(--border-card);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      animation: cardEnter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s backwards;
      position: relative;
      overflow: hidden;
    }

    .total-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at center, rgba(0, 255, 133, 0.05) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
      animation: shimmerPulse 3s ease-in-out infinite;
    }

    .total-section:hover {
      border-color: rgba(0, 255, 133, 0.3);
      box-shadow: 0 8px 24px rgba(0, 255, 133, 0.2), inset 0 0 15px rgba(0, 255, 133, 0.08);
      transform: translateY(-2px) scale(1.01);
    }

    .total-section:hover::before {
      opacity: 1;
    }

    .total-section .summary-row {
      border-bottom: none;
      font-size: 18px;
    }

    .total-section .summary-row strong {
      font-size: 20px;
      color: var(--accent-green);
    }

    /* Pay Button */
    .pay-btn {
      width: 100%;
      padding: 16px;
      background: var(--gradient-primary);
      color: #0A0A0F;
      font-size: 16px;
      font-weight: 700;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: 'Inter', sans-serif;
      margin-top: 8px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 8px 25px rgba(0, 255, 133, 0.3);
      animation: buttonEnter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }

    .pay-btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transform: rotate(45deg);
      opacity: 0;
      transition: opacity 0.5s ease;
      pointer-events: none;
    }

    .pay-btn:hover:not(:disabled)::before {
      opacity: 1;
    }

    .pay-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at top left, rgba(0, 255, 133, 0.12), transparent 45%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .pay-btn:hover:not(:disabled)::after {
      opacity: 1;
    }

    .pay-btn:hover:not(:disabled) {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 16px 40px rgba(0, 255, 133, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.1);
    }

    .pay-btn:active:not(:disabled) {
      transform: translateY(0) scale(0.98);
    }

    .pay-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      box-shadow: 0 0 10px rgba(0, 255, 133, 0.1);
    }

    @keyframes buttonEnter {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    /* Back Button */
    .back-to-menu {
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      padding: 10px 20px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: 'Inter', sans-serif;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.6s ease-out 0.3s backwards;
    }

    .back-to-menu::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 255, 133, 0.1), transparent);
      transition: left 0.6s ease;
    }

    .back-to-menu:hover {
      border-color: var(--accent-green);
      color: var(--accent-green);
      background: rgba(0, 255, 133, 0.05);
      box-shadow: 0 0 20px rgba(0, 255, 133, 0.2), inset 0 0 15px rgba(0, 255, 133, 0.05);
      transform: translateX(4px) translateY(-2px) scale(1.05);
    }

    .back-to-menu:hover::before {
      left: 100%;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .user-bar {
        padding: 10px 16px;
        animation: none;
      }
      .user-bar::before {
        display: none;
      }
      .cart-card {
        padding: 20px;
        animation: none;
      }
      .cart-card::before {
        display: none;
      }
      .cart-card h2 {
        font-size: 1.25rem;
        animation: none;
      }
      .cart-item {
        flex-direction: column;
        align-items: stretch;
        gap: 12px;
        animation: none;
      }
      .cart-item > div:last-child {
        justify-content: space-between;
      }
      .total-section .summary-row {
        font-size: 14px;
      }
      .total-section .summary-row strong {
        font-size: 16px;
      }
      .qty-btn {
        transition: all 0.2s ease;
      }
      .qty-btn:hover::before {
        display: none;
      }
      .remove-btn:hover::after {
        display: none;
      }
    }

    /* Additional animation stagger for cart items */
    .cart-item:nth-child(1) {
      animation-delay: 0.1s;
    }
    .cart-item:nth-child(2) {
      animation-delay: 0.15s;
    }
    .cart-item:nth-child(3) {
      animation-delay: 0.2s;
    }
    .cart-item:nth-child(4) {
      animation-delay: 0.25s;
    }
    .cart-item:nth-child(n+5) {
      animation-delay: 0.3s;
    }

    /* Animation system keyframes */
    @keyframes gradientShift {
      0%, 100% {
        background: 
          radial-gradient(circle at 20% 50%, rgba(0, 255, 133, 0.15) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(255, 157, 77, 0.1) 0%, transparent 50%),
          radial-gradient(circle at 50% 0%, rgba(255, 100, 50, 0.12) 0%, transparent 60%);
      }
      50% {
        background: 
          radial-gradient(circle at 80% 20%, rgba(0, 255, 133, 0.15) 0%, transparent 50%),
          radial-gradient(circle at 20% 80%, rgba(255, 157, 77, 0.1) 0%, transparent 50%),
          radial-gradient(circle at 50% 100%, rgba(255, 100, 50, 0.12) 0%, transparent 60%);
      }
    }

    @keyframes gridShift {
      0% {
        background-position: 0 0, 0 0;
      }
      100% {
        background-position: 50px 50px, 50px 50px;
      }
    }

    @keyframes floatComplex1 {
      0%, 100% {
        transform: translate(0, 0) scale(1) rotate(0deg);
      }
      25% {
        transform: translate(30px, -40px) scale(1.1) rotate(90deg);
      }
      50% {
        transform: translate(-20px, 30px) scale(0.95) rotate(180deg);
      }
      75% {
        transform: translate(40px, 20px) scale(1.05) rotate(270deg);
      }
    }

    @keyframes floatComplex2 {
      0%, 100% {
        transform: translate(0, 0) scale(1) rotate(0deg);
      }
      25% {
        transform: translate(-35px, 25px) scale(0.9) rotate(-90deg);
      }
      50% {
        transform: translate(25px, -35px) scale(1.08) rotate(-180deg);
      }
      75% {
        transform: translate(-20px, -15px) scale(0.98) rotate(-270deg);
      }
    }

    @keyframes floatComplex3 {
      0%, 100% {
        transform: translate(-50%, -50%) scale(1) rotate(0deg);
      }
      25% {
        transform: translate(-50%, -40%) scale(1.08) rotate(45deg);
      }
      50% {
        transform: translate(-60%, -50%) scale(0.95) rotate(90deg);
      }
      75% {
        transform: translate(-40%, -60%) scale(1.05) rotate(135deg);
      }
    }
  </style>
</head>
<body>

<!-- Floating circle decorations -->
<div class="bg-circle-1"></div>
<div class="bg-circle-2"></div>
<div class="bg-circle-3"></div>
  <div class="user-bar" aria-hidden="false">
    <div class="user-info">
      <div class="user-avatar">FP</div>
      <div class="user-text">
        <div class="user-name">Food Point</div>
        <div class="user-email">Cart</div>
      </div>
    </div>
    <button class="logout-btn" onclick="location.href='menu.html'">🍽️ Menu</button>
  </div>

  <div class="page page-with-header">
    <div class="cart-card" role="main" aria-label="Cart">
      <h2><i class="fas fa-shopping-cart"></i> YOUR CART</h2>

      <div id="cartList" class="cart-list" aria-live="polite"></div>

      <div class="summary-row">
        <span>Total items:</span>
        <strong id="itemCount">0</strong>
      </div>

      <div class="summary-row">
        <span>Subtotal:</span>
        <strong id="amountDisplay">₹0.00</strong>
      </div>

      <div class="parcel-section">
        <label class="parcel-label">
          <input type="checkbox" id="parcelCheckbox">
          <span id="parcelLabel">📦 Add Parcel Protection</span>
        </label>
        <div class="parcel-charge" id="parcelChargeDisplay">Parcel charge: ₹0.00</div>
      </div>

      <div class="total-section">
        <div class="summary-row" style="font-size:17px;">
          <span>Total Amount:</span>
          <strong id="totalDisplay">₹0.00</strong>
        </div>
      </div>

      <button id="payBtn" class="pay-btn" disabled>💳 PROCEED TO PAY</button>
      
      <div style="text-align:center; margin-top:20px;">
        <button onclick="location.href='menu.html'" class="back-to-menu">
          <i class="fas fa-arrow-left"></i> Back to Menu
        </button>
      </div>
    </div>
  </div>

<script>
/*
  Cart page (updated)
  - Supports two store formats:
    1) legacy: selectedFoods (array of strings)
    2) modern: selectedFoods_v1 (array of objects {id, name, price, numericPrice, quantity, description})
  - Persists updates to same key it was read from.
  - Adds quantity controls, per-item subtotal, remove button.
  - Writes numeric amountPaid and cartItems to localStorage on PAY.
*/

/* ---------- Helpers ---------- */
/* ---------- User-specific storage ---------- */
function getCurrentUser() {
  try {
    const raw = localStorage.getItem("fp_current_user");
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

function getUserSpecificKey(baseKey) {
  const user = getCurrentUser();
  return user && user.id ? baseKey + "_" + user.id : baseKey;
}

const KEYS_TO_TRY = ['selectedFoods_v1', 'selectedFoods'].map(k => getUserSpecificKey(k));
function readCartStorageKey() {
  // prefer v1 if present
  for (const k of KEYS_TO_TRY) {
    if (localStorage.getItem(k)) return k;
  }
  // default to v1 if nothing exists
  return KEYS_TO_TRY[0];
}
function parsePriceToNumber(price) {
  if (price == null) return 0;
  if (typeof price === 'number') return price;
  const s = String(price);
  const m = s.match(/(\d+(\.\d+)?)/);
  return m ? Number(m[1]) : 0;
}
function formatCurrency(n) {
  return '₹' + Number(n).toFixed(2);
}

/* ---------- Read / Write ---------- */
let storageKey = readCartStorageKey();

function readSelectedFoodsRaw() {
  try {
    const raw = localStorage.getItem(storageKey);
    if (!raw) return [];
    return JSON.parse(raw);
  } catch (e) {
    console.error('Failed reading cart storage', e);
    return [];
  }
}

function writeSelectedFoodsRaw(value) {
  try {
    localStorage.setItem(storageKey, JSON.stringify(value));
    // keep backwards compatibility: also write legacy key if we're using modern
    if (storageKey === 'selectedFoods_v1') {
      localStorage.setItem('selectedFoods', JSON.stringify(value.map(i => (typeof i === 'string' ? i : i.name))));
    }
  } catch (e) { console.warn('Write failed', e); }
}

/* ---------- Normalized cart model ----------
   We normalize to an array of objects:
   { id, name, price, numericPrice, quantity, description }
---------------------------------------------*/
function normalizedCartFromStorage() {
  const raw = readSelectedFoodsRaw();
  if (!Array.isArray(raw)) return [];

  // If legacy array of strings
  if (raw.length && typeof raw[0] === 'string') {
    return raw.map((name, idx) => ({
      id: 'legacy-' + idx + '-' + slug(name),
      name,
      price: null,
      numericPrice: 0,
      quantity: 1,
      description: ''
    }));
  }

  // If array of objects (modern)
  return raw.map((it, idx) => {
    if (!it) return null;
    // robust numeric parsing: treat explicit 0 as valid (don't fall back because of ||)
    let numeric;
    if ('numericPrice' in it) {
      numeric = Number(it.numericPrice != null ? it.numericPrice : parsePriceToNumber(it.price));
    } else {
      numeric = parsePriceToNumber(it.price);
    }
    return {
      id: it.id || 'i' + idx + '-' + slug(it.name || 'item'),
      name: it.name || (typeof it === 'string' ? it : ('Item ' + idx)),
      price: (it.price != null) ? it.price : (it.numericPrice != null ? String(it.numericPrice) : null),
      numericPrice: Number.isFinite(Number(numeric)) ? Number(numeric) : 0,
      quantity: (it.quantity && Number(it.quantity) > 0) ? Number(it.quantity) : 1,
      description: it.description || ''
    };
  }).filter(Boolean);
}

function slug(s){ return String(s||'').toLowerCase().replace(/\s+/g,'-').replace(/[^a-z0-9-]/g,''); }

/* ---------- UI ---------- */
const cartList = document.getElementById('cartList');
const itemCountEl = document.getElementById('itemCount');
const amountEl = document.getElementById('amountDisplay');
const totalEl = document.getElementById('totalDisplay');
const parcelCheckbox = document.getElementById('parcelCheckbox');
const parcelChargeDisplay = document.getElementById('parcelChargeDisplay');
const payBtn = document.getElementById('payBtn');

let normalizedCart = []; // in-memory

// Get dynamic parcel charge from owner settings
function getParcelCharge() {
  try {
    const settings = localStorage.getItem('restaurantSettings');
    if (settings) {
      const parsed = JSON.parse(settings);
      const charge = parsed.parcelCharge;
      if (charge != null) {
        return parsePriceToNumber(charge);
      }
    }
  } catch (e) {
    console.warn('Failed to read parcel charge from settings', e);
  }
  return 5; // fallback to 5 if not set
}

function renderCart() {
  normalizedCart = normalizedCartFromStorage();
  cartList.innerHTML = '';

  if (!normalizedCart.length) {
    cartList.innerHTML = '<div class="empty-text"><i class="fas fa-shopping-bag"></i><br>Your cart is empty.<br><small style="font-size:14px;margin-top:8px;display:block">Add items from the menu first</small></div>';
    itemCountEl.textContent = '0';
    amountEl.textContent = formatCurrency(0);
    totalEl.textContent = formatCurrency(0);
    payBtn.disabled = true;
    return;
  }

  normalizedCart.forEach((it, idx) => {
    const row = document.createElement('div');
    row.className = 'cart-item';
    row.dataset.index = idx;

    const variantText = it.price ? ` • ${escapeHtml(String(it.price))}` : '';
    const subtotal = (it.numericPrice || 0) * (it.quantity || 1);
    
    row.innerHTML = `
      <div class="cart-left">
        <div class="item-info">
          <div class="item-name">${escapeHtml(it.name)}<span style="font-size:12px;color:#00FF85;margin-left:8px">${variantText}</span></div>
          ${it.description ? `<div class="item-desc">${escapeHtml(it.description)}</div>` : ''}
        </div>
      </div>

      <div style="display:flex;align-items:center;gap:12px">
        <div style="display:flex;align-items:center;gap:6px">
          <button class="qty-btn dec" aria-label="Decrease quantity">−</button>
          <div class="qty-num" style="min-width:28px;text-align:center">${it.quantity}</div>
          <button class="qty-btn inc" aria-label="Increase quantity">+</button>
        </div>
        <div style="text-align:right">
          <div class="item-price">${formatCurrency(it.numericPrice)}</div>
          <div style="font-size:12px;color:#5A5F73;margin-top:4px">Subtotal: ${formatCurrency(subtotal)}</div>
        </div>
        <div style="margin-left:8px">
          <button class="remove-btn" aria-label="Remove item">✕</button>
        </div>
      </div>
    `;
    cartList.appendChild(row);

    // wire buttons
    row.querySelector('.dec').addEventListener('click', () => {
      changeQty(idx, Math.max(1, normalizedCart[idx].quantity - 1));
    });
    row.querySelector('.inc').addEventListener('click', () => {
      changeQty(idx, normalizedCart[idx].quantity + 1);
    });
    row.querySelector('.remove-btn').addEventListener('click', () => {
      if (confirm('Remove this item from cart?')) {
        removeItem(idx);
      }
    });
  });

  updateSummary();
  payBtn.disabled = false;
}

/* ---------- Actions ---------- */
function changeQty(index, newQty) {
  newQty = Number(newQty) || 1;
  normalizedCart[index].quantity = newQty;
  persistNormalizedCart();
  renderCart();
}

function removeItem(index) {
  normalizedCart.splice(index, 1);
  persistNormalizedCart();
  renderCart();
}

function persistNormalizedCart() {
  // write back to storage using the same key we read from (storageKey)
  if (storageKey === 'selectedFoods') {
    // legacy: write back array of names
    const names = normalizedCart.map(i => i.name);
    writeSelectedFoodsRaw(names);
  } else {
    // modern (selectedFoods_v1): write back array of objects
    const out = normalizedCart.map(i => ({
      id: i.id,
      name: i.name,
      price: i.price,
      numericPrice: i.numericPrice,
      quantity: i.quantity,
      description: i.description
    }));
    writeSelectedFoodsRaw(out);
  }
}

function updateSummary() {
  const count = normalizedCart.reduce((s,i) => s + (i.quantity || 1), 0);
  const amount = normalizedCart.reduce((s,i) => s + (i.numericPrice || 0) * (i.quantity || 1), 0);
  const parcelCharge = parcelCheckbox.checked ? getParcelCharge() : 0;
  const total = amount + parcelCharge;
  
  itemCountEl.textContent = String(count);
  amountEl.textContent = formatCurrency(amount);
  parcelChargeDisplay.textContent = `Parcel charge: ${formatCurrency(parcelCharge)}`;
  totalEl.textContent = formatCurrency(total);
}

function escapeHtml(s){ 
  return String(s||'').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); 
}

/* ---------- PAY ---------- */
payBtn.addEventListener('click', () => {
  if (!normalizedCart.length) return;
  
  const amount = normalizedCart.reduce((s,i) => s + (i.numericPrice || 0) * (i.quantity || 1), 0);
  const parcelCharge = parcelCheckbox.checked ? getParcelCharge() : 0;
  const totalAmount = amount + parcelCharge;
  
  // Persist for payment page
  localStorage.setItem(getUserSpecificKey('amountPaid'), String(totalAmount));
  localStorage.setItem(getUserSpecificKey('cartItems'), JSON.stringify(normalizedCart));
  localStorage.setItem(getUserSpecificKey('parcelSelected'), String(parcelCheckbox.checked));
  localStorage.setItem(getUserSpecificKey('parcelCharge'), String(parcelCharge));
  localStorage.setItem(getUserSpecificKey('amountPaidDisplay'), formatCurrency(totalAmount));
  
  // Navigate to payment page
  window.location.href = 'payment-way.html';
});

/* Setup parcel checkbox */
parcelCheckbox.addEventListener('change', updateSummary);

/* ---------- boot ---------- */
(function boot(){
  // choose correct storageKey (re-evaluate at boot)
  storageKey = readCartStorageKey();
  
  // update parcel label with dynamic charge
  const parcelLabel = document.getElementById('parcelLabel');
  const charge = getParcelCharge();
  parcelLabel.textContent = `📦 Add Parcel Protection (+${formatCurrency(charge)})`;
  
  // restore parcel checkbox state if previously selected
  try {
    parcelCheckbox.checked = localStorage.getItem('parcelSelected') === 'true';
  } catch (e) { /* ignore */ }

  // render UI
  renderCart();
  
  // Listen for parcel charge updates from owner dashboard
  window.addEventListener('storage', (event) => {
    if (event.key === 'restaurantSettings') {
      const newCharge = getParcelCharge();
      const parcelLabel = document.getElementById('parcelLabel');
      if (parcelLabel) {
        parcelLabel.textContent = `📦 Add Parcel Protection (+${formatCurrency(newCharge)})`;
      }
      // Update summary if checkbox is checked
      if (parcelCheckbox && parcelCheckbox.checked) {
        updateSummary();
      }
    }
  });
})();

</script>
</body>
</html>
