<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Food Point | Crypto-Style Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
  />
  <script src="fp-config.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Backgrounds - Crypto Dark Theme */
      --bg-primary: #0A0A0F;
      --bg-secondary: #111116;
      --bg-card: #15171E;
      --bg-elevated: #1A1C23;
      --bg-modal: #1A1C23;
      
      /* Text Colors */
      --text-primary: #FFFFFF;
      --text-secondary: #8A8F9E;
      --text-muted: #5A5F73;
      
      /* Accent Colors */
      --accent-green: #00FF85;
      --accent-blue: #3B82F6;
      --accent-red: #FF4D4D;
      --accent-orange: #F97316;
      
      /* Borders */
      --border-subtle: #1E1E2E;
      --border-card: rgba(255, 255, 255, 0.05);
      
      /* Spacing */
      --spacing-xs: 0.5rem;
      --spacing-sm: 1rem;
      --spacing-md: 1.5rem;
      --spacing-lg: 2rem;
      --spacing-xl: 3rem;
      
      /* Border Radius */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      
      /* Gradients */
      --gradient-primary: linear-gradient(135deg, #00FF85 0%, #00C96D 100%);
      --gradient-card-hover: linear-gradient(180deg, #1A1C23 0%, #111116 100%);
      --gradient-glow: radial-gradient(circle at 50% 0%, rgba(0, 255, 133, 0.08), transparent);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--spacing-lg);
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(circle at 20% 50%, rgba(255, 157, 77, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(0, 255, 133, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 50% 0%, rgba(255, 100, 50, 0.1) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
      animation: foodGradientShift 15s ease-in-out infinite;
    }

    body::after {
      content: '🍽️ 🍔 🍕 🍜 🍱 🍛 🍝 🌮 🍤 🥘';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      font-size: 120px;
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-around;
      overflow: hidden;
      animation: foodFloat 20s linear infinite;
    }

    body.modal-open {
      overflow: hidden;
    }

    /* Auth Card - Premium Crypto Style */
    .auth-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-xl);
      padding: var(--spacing-xl);
      max-width: 480px;
      width: 100%;
      position: relative;
      z-index: 1;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 133, 0.05);
      transition: all 0.3s ease;
      animation: cardEnter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }

    @keyframes cardEnter {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.95);
        filter: blur(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    .auth-card:hover {
      box-shadow: 0 30px 60px -15px rgba(0, 255, 133, 0.15), 0 0 0 1px rgba(0, 255, 133, 0.15);
      transform: translateY(-2px);
    }

    /* Top Links */
    .top-links {
      display: flex;
      justify-content: flex-end;
      margin-bottom: var(--spacing-lg);
    }

    .top-links button {
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
      padding: 8px 20px;
      font-size: 0.85rem;
      font-weight: 500;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: 'Inter', sans-serif;
      animation: topLinkEnter 0.6s ease-out backwards;
      position: relative;
      overflow: hidden;
    }

    .top-links button::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0, 255, 133, 0.1) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .top-links button:hover::before {
      opacity: 1;
    }

    .top-links button:hover {
      border-color: var(--accent-green);
      color: var(--accent-green);
      background: rgba(0, 255, 133, 0.05);
      box-shadow: 0 0 20px rgba(0, 255, 133, 0.2);
      transform: translateY(-2px);
    }

    @keyframes topLinkEnter {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Brand */
    .brand {
      font-size: 2rem;
      font-weight: 800;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-align: center;
      letter-spacing: -0.02em;
      margin-bottom: var(--spacing-xs);
      animation: brandEnter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }

    .subtitle {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
      margin-bottom: var(--spacing-lg);
      animation: subtitleEnter 0.8s ease-out 0.2s backwards;
    }

    h2 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: var(--spacing-md);
      color: var(--text-primary);
      animation: titleEnter 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s backwards;
    }

    /* Input Groups */
    .input-group {
      margin-bottom: var(--spacing-md);
      animation: inputEnter 0.6s ease-out 0.3s backwards;
    }

    .input-group label {
      display: block;
      margin-bottom: var(--spacing-xs);
      color: var(--text-secondary);
      font-size: 0.85rem;
      font-weight: 500;
    }

    .input-group input {
      width: 100%;
      padding: 14px 18px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
    }

    .input-group input:focus {
      outline: none;
      border-color: var(--accent-green);
      box-shadow: 0 0 0 3px rgba(0, 255, 133, 0.1);
    }

    .input-group input::placeholder {
      color: var(--text-muted);
    }

    /* Messages */
    .error,
    .success {
      display: none;
    }

    .error:not(:empty),
    .success:not(:empty) {
      display: block;
    }

    .error {
      background: rgba(255, 77, 77, 0.1);
      border: 1px solid rgba(255, 77, 77, 0.2);
      border-radius: var(--radius-md);
      padding: var(--spacing-sm);
      color: #FF6B6B;
      font-size: 0.85rem;
      margin-bottom: var(--spacing-md);
      text-align: center;
    }

    .success {
      background: rgba(0, 255, 133, 0.1);
      border: 1px solid rgba(0, 255, 133, 0.2);
      border-radius: var(--radius-md);
      padding: var(--spacing-sm);
      color: var(--accent-green);
      font-size: 0.85rem;
      margin-bottom: var(--spacing-md);
      text-align: center;
    }

    /* Button */
    .btn {
      width: 100%;
      padding: 14px 28px;
      background: var(--gradient-primary);
      color: #0A0A0F;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: var(--spacing-md);
      animation: buttonEnter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s backwards;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
      transform: rotate(45deg);
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .btn:hover:not(:disabled)::before {
      opacity: 1;
      animation: shimmer 0.6s ease-in-out;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-3px) scale(1.02);
      box-shadow: 0 10px 30px rgba(0, 255, 133, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.1);
      animation: buttonGlow 1.5s ease-in-out infinite;
    }

    .btn:active:not(:disabled) {
      transform: translateY(0) scale(0.98);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Switch Text */
    .switch-text {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.9rem;
      animation: switchTextEnter 0.8s ease-out 0.6s backwards;
    }

    .switch-text button {
      background: none;
      border: none;
      color: var(--accent-blue);
      cursor: pointer;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      margin-left: var(--spacing-xs);
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
    }

    .switch-text button::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 2px;
      background: var(--accent-green);
      transition: width 0.3s ease;
    }

    .switch-text button:hover {
      color: var(--accent-green);
    }

    .switch-text button:hover::after {
      width: 100%;
    }

    @keyframes switchTextEnter {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Modal Overlay - Crypto Style */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 10, 15, 0.95);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      visibility: hidden;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .modal-overlay.active {
      opacity: 1;
      visibility: visible;
    }

    .modal-overlay::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at center, rgba(0, 255, 133, 0.1) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.5s ease;
      animation: glowPulse 3s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes glowPulse {
      0%, 100% {
        opacity: 0;
        transform: scale(0.8);
      }
      50% {
        opacity: 0.5;
        transform: scale(1.1);
      }
    }

    .modal-overlay.active::before {
      opacity: 1;
    }

    /* Password Modal */
    .password-modal {
      background: var(--bg-modal);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-xl);
      padding: var(--spacing-xl);
      max-width: 420px;
      width: 90%;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(0, 255, 133, 0.1);
      transform: scale(0.8) translateY(20px);
      opacity: 0;
      transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
      position: relative;
      overflow: hidden;
      animation: modalEnter 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }

    .password-modal::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0, 255, 133, 0.1) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.6s ease;
      pointer-events: none;
    }

    .modal-overlay.active .password-modal {
      transform: scale(1) translateY(0);
      opacity: 1;
    }

    .modal-overlay.active .password-modal::before {
      opacity: 1;
    }

    .modal-header {
      text-align: center;
      margin-bottom: var(--spacing-lg);
    }

    .lock-icon {
      width: 60px;
      height: 60px;
      background: rgba(0, 255, 133, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--spacing-md);
      box-shadow: 0 0 20px rgba(0, 255, 133, 0.3), inset 0 0 20px rgba(0, 255, 133, 0.1);
      animation: lockIconGlow 2s ease-in-out infinite, lockIconBounce 0.6s ease-out 0.3s backwards, lockPulse 2.5s ease-in-out infinite 0.5s;
      position: relative;
    }

    @keyframes lockPulse {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.08);
      }
    }

    .lock-icon::after {
      content: '';
      position: absolute;
      top: -10px;
      left: -10px;
      right: -10px;
      bottom: -10px;
      border: 2px solid rgba(0, 255, 133, 0.3);
      border-radius: 50%;
      opacity: 0;
      animation: lockRingPulse 2s ease-in-out infinite 0.5s;
    }

    @keyframes lockIconGlow {
      0%, 100% {
        box-shadow: 0 0 20px rgba(0, 255, 133, 0.3), inset 0 0 20px rgba(0, 255, 133, 0.1);
      }
      50% {
        box-shadow: 0 0 35px rgba(0, 255, 133, 0.5), inset 0 0 30px rgba(0, 255, 133, 0.2);
      }
    }

    @keyframes lockIconBounce {
      from {
        transform: scale(0.8) translateY(10px);
        opacity: 0;
      }
      to {
        transform: scale(1) translateY(0);
        opacity: 1;
      }
    }

    @keyframes lockRingPulse {
      0%, 100% {
        transform: scale(1);
        opacity: 0.3;
      }
      50% {
        transform: scale(1.2);
        opacity: 0.6;
      }
    }

    .lock-icon i {
      font-size: 28px;
      color: var(--accent-green);
      animation: lockIconShake 2s ease-in-out infinite 1s;
    }

    @keyframes lockIconShake {
      0%, 100% {
        transform: rotate(0deg);
      }
      25% {
        transform: rotate(-5deg);
      }
      75% {
        transform: rotate(5deg);
      }
    }

    .password-modal h2 {
      font-size: 1.75rem;
      font-weight: 700;
      background: var(--gradient-primary);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: var(--spacing-sm);
      animation: titleGlow 2s ease-in-out infinite, titleSlideIn 0.6s ease-out 0.2s backwards, titlePulseScale 2s ease-in-out infinite 0.8s;
    }

    @keyframes titlePulseScale {
      0%, 100% {
        letter-spacing: -0.02em;
      }
      50% {
        letter-spacing: 0.02em;
      }
    }

    @keyframes titleGlow {
      0%, 100% {
        text-shadow: 0 0 0 rgba(0, 255, 133, 0);
      }
      50% {
        text-shadow: 0 0 15px rgba(0, 255, 133, 0.3);
      }
    }

    @keyframes titleSlideIn {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .password-modal p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .password-input {
      width: 100%;
      padding: 14px 18px;
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 1rem;
      font-family: 'Inter', monospace;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      margin-bottom: var(--spacing-sm);
      animation: inputSlideIn 0.5s ease-out 0.3s backwards;
      position: relative;
    }

    .password-input::placeholder {
      color: var(--text-muted);
    }

    .password-input:focus {
      outline: none;
      border-color: var(--accent-green);
      box-shadow: 0 0 0 3px rgba(0, 255, 133, 0.2), 0 0 15px rgba(0, 255, 133, 0.2);
      transform: translateY(-2px);
    }

    .password-input.error {
      border-color: var(--accent-red);
      box-shadow: 0 0 0 3px rgba(255, 77, 77, 0.2), 0 0 15px rgba(255, 77, 77, 0.2);
      animation: shake 0.4s ease-in-out;
    }

    @keyframes inputSlideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes shake {
      0%, 100% {
        transform: translateX(0);
      }
      25% {
        transform: translateX(-5px);
      }
      75% {
        transform: translateX(5px);
      }
    }

    .error-message {
      color: var(--accent-red);
      font-size: 0.8rem;
      margin-bottom: var(--spacing-sm);
      display: none;
    }

    .error-message.show {
      display: block;
      animation: messageSlideDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .attempts-warning {
      color: var(--accent-orange);
      font-size: 0.8rem;
      margin-bottom: var(--spacing-sm);
      display: none;
    }

    .attempts-warning.show {
      display: block;
      animation: messageSlideDown 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes messageSlideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-buttons {
      display: flex;
      gap: var(--spacing-sm);
      margin-top: var(--spacing-md);
    }

    .modal-btn {
      flex: 1;
      padding: 12px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      font-family: 'Inter', sans-serif;
      border: none;
      position: relative;
      overflow: hidden;
      animation: buttonSlideIn 0.5s ease-out 0.4s backwards;
    }

    .modal-btn::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.2), transparent);
      transform: rotate(45deg);
      opacity: 0;
      transition: opacity 0.5s ease;
    }

    .modal-btn:hover::before {
      opacity: 1;
      animation: shimmer 0.5s ease-in-out;
    }

    @keyframes buttonSlideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-btn-primary {
      background: var(--gradient-primary);
      color: #0A0A0F;
      box-shadow: 0 0 15px rgba(0, 255, 133, 0.2);
    }

    .modal-btn-primary:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 0 8px 25px rgba(0, 255, 133, 0.4), inset 0 0 15px rgba(255, 255, 255, 0.1);
      animation: buttonGlow 1s ease-in-out infinite;
    }

    .modal-btn-primary:hover::before {
      left: 100%;
    }

    .modal-btn-secondary {
      background: transparent;
      border: 1px solid var(--border-subtle);
      color: var(--text-secondary);
    }

    .modal-btn-secondary:hover {
      border-color: var(--accent-blue);
      color: var(--accent-blue);
      background: rgba(59, 130, 246, 0.1);
      box-shadow: 0 0 25px rgba(59, 130, 246, 0.4), inset 0 0 10px rgba(59, 130, 246, 0.1);
      transform: translateY(-2px);
      animation: buttonSecondaryGlow 1s ease-in-out infinite;
    }

    @keyframes buttonSecondaryGlow {
      0%, 100% {
        box-shadow: 0 0 25px rgba(59, 130, 246, 0.4), inset 0 0 10px rgba(59, 130, 246, 0.1);
      }
      50% {
        box-shadow: 0 0 40px rgba(59, 130, 246, 0.6), inset 0 0 15px rgba(59, 130, 246, 0.2);
      }
    }

    /* Animation Keyframes */
    @keyframes foodGradientShift {
      0%, 100% {
        background: 
          radial-gradient(circle at 20% 50%, rgba(255, 157, 77, 0.15) 0%, transparent 50%),
          radial-gradient(circle at 80% 80%, rgba(0, 255, 133, 0.08) 0%, transparent 50%),
          radial-gradient(circle at 50% 0%, rgba(255, 100, 50, 0.1) 0%, transparent 60%);
      }
      50% {
        background: 
          radial-gradient(circle at 80% 20%, rgba(255, 157, 77, 0.15) 0%, transparent 50%),
          radial-gradient(circle at 20% 80%, rgba(0, 255, 133, 0.08) 0%, transparent 50%),
          radial-gradient(circle at 50% 100%, rgba(255, 100, 50, 0.1) 0%, transparent 60%);
      }
    }

    @keyframes foodFloat {
      0% {
        transform: translateY(0) translateX(0);
        opacity: 0.03;
      }
      50% {
        opacity: 0.06;
      }
      100% {
        transform: translateY(-100vh) translateX(50px);
        opacity: 0.01;
      }
    }

    @keyframes brandEnter {
      from {
        opacity: 0;
        transform: scale(0.8) translateY(-20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes titleEnter {
      from {
        opacity: 0;
        transform: translateY(-15px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes subtitleEnter {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes inputEnter {
      from {
        opacity: 0;
        transform: translateX(-20px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    @keyframes buttonEnter {
      from {
        opacity: 0;
        transform: scale(0.8) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes buttonGlow {
      0%, 100% {
        box-shadow: 0 10px 30px rgba(0, 255, 133, 0.4), inset 0 0 10px rgba(255, 255, 255, 0.1);
      }
      50% {
        box-shadow: 0 15px 40px rgba(0, 255, 133, 0.6), inset 0 0 15px rgba(255, 255, 255, 0.2);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -1000px 0;
      }
      100% {
        background-position: 1000px 0;
      }
    }

    @keyframes modalEnter {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(30px);
        filter: blur(10px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
        filter: blur(0);
      }
    }

    /* Responsive */
    @media (max-width: 560px) {
      body {
        padding: var(--spacing-md);
      }

      .auth-card {
        padding: var(--spacing-lg);
      }

      .brand {
        font-size: 1.5rem;
      }

      /* Disable heavy animations on mobile for performance */
      .modal-overlay {
        transition: all 0.2s ease;
      }

      .modal-overlay::before {
        display: none;
      }

      .password-modal {
        animation: none;
        transition: all 0.2s ease;
      }

      .password-modal::before {
        display: none;
      }

      .lock-icon {
        animation: none;
      }

      .lock-icon::after {
        display: none;
      }

      .modal-btn {
        animation: none;
        transition: all 0.2s ease;
      }

      .modal-btn::before {
        display: none;
      }

      .password-modal h2 {
        animation: none;
      }
    }
  </style>
</head>
<body>

<script src="fp-config.js"></script>
<script src="fp-fetch-proxy.js"></script>
<script src="api.js"></script>
<script src="dev-check.js"></script>

  <div class="auth-card">
    <div class="top-links">
      <button id="ownerBtnTop">
        <i class="fas fa-lock"></i> Owner Access
      </button>
    </div>

    <div class="brand">🍽️ FOOD POINT</div>
    <div class="subtitle">Sign in to continue or create an account</div>

    <h2 id="formTitle">Log in</h2>

    <div class="input-group" id="loginIdGroup">
      <label for="loginIdInput">Email or name</label>
      <input type="text" id="loginIdInput" placeholder="you@example.com or your name">
    </div>

    <div id="nameGroup" class="input-group" style="display:none;">
      <label for="nameInput">Full name</label>
      <input type="text" id="nameInput" placeholder="Your name" autocomplete="name">
    </div>

    <div id="emailGroup" class="input-group" style="display:none;">
      <label for="emailInput">Email</label>
      <input type="email" id="emailInput" placeholder="you@example.com" autocomplete="email">
    </div>

    <div class="input-group">
      <label for="passwordInput">Password</label>
      <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password">
    </div>

    <div class="input-group" id="confirmGroup" style="display:none;">
      <label for="confirmInput">Confirm password</label>
      <input type="password" id="confirmInput" placeholder="Repeat password" autocomplete="new-password">
    </div>

    <div id="message" class="error"></div>
    <div id="successMsg" class="success"></div>

    <button class="btn" id="submitBtn">
      <i class="fas fa-sign-in-alt" id="btnIcon"></i>
      <span id="btnText">Log in</span>
    </button>

    <div class="switch-text">
      <span id="switchLabel">New here?</span>
      <button id="switchBtn" type="button">Create an account</button>
    </div>
  </div>

  <div class="modal-overlay" id="ownerPasswordModal">
    <div class="password-modal">
      <div class="modal-header">
        <div class="lock-icon">
          <i class="fas fa-lock"></i>
        </div>
        <h2>Owner Access</h2>
        <p>Enter the owner password to open the dashboard</p>
      </div>

      <input
        type="password"
        id="ownerPasswordInput"
        class="password-input"
        placeholder="Owner password"
      />
      <div class="error-message" id="ownerErrorMsg">
        Incorrect password. Please try again.
      </div>
      <div class="attempts-warning" id="ownerAttemptsWarn">
        Too many failed attempts. Please wait 30 seconds.
      </div>

      <div class="modal-buttons">
        <button class="modal-btn modal-btn-secondary" id="ownerCancelBtn">Cancel</button>
        <button class="modal-btn modal-btn-primary" id="ownerSubmitBtn">Submit</button>
      </div>
    </div>
  </div>

  <script>
    // ---------- USER LOGIN / SIGNUP (same logic) ----------
    const USERS_KEY = "fp_users";
    const CURRENT_USER_KEY = "fp_current_user";
    const SHOP_STATUS_KEY = "shopStatus";

    const formTitle     = document.getElementById("formTitle");
    const loginIdGroup  = document.getElementById("loginIdGroup");
    const loginIdInput  = document.getElementById("loginIdInput");
    const nameGroup     = document.getElementById("nameGroup");
    const emailGroup    = document.getElementById("emailGroup");
    const confirmGroup  = document.getElementById("confirmGroup");
    const nameInput     = document.getElementById("nameInput");
    const emailInput    = document.getElementById("emailInput");
    const passwordInput = document.getElementById("passwordInput");
    const confirmInput  = document.getElementById("confirmInput");
    const submitBtn     = document.getElementById("submitBtn");
    const btnText       = document.getElementById("btnText");
    const btnIcon       = document.getElementById("btnIcon");
    const switchLabel   = document.getElementById("switchLabel");
    const switchBtn     = document.getElementById("switchBtn");
    const message       = document.getElementById("message");
    const successMsg    = document.getElementById("successMsg");

    let mode = "login";

    function loadUsers() {
      try {
        return JSON.parse(localStorage.getItem(USERS_KEY) || "[]");
      } catch {
        return [];
      }
    }

    function saveUsers(users) {
      localStorage.setItem(USERS_KEY, JSON.stringify(users));
    }

    function setCurrentUser(user) {
      localStorage.setItem(CURRENT_USER_KEY, JSON.stringify(user));
    }

    function switchMode() {
      message.textContent = "";
      successMsg.textContent = "";
      passwordInput.value = "";
      confirmInput.value = "";

      if (mode === "login") {
        mode = "signup";
        formTitle.textContent = "Create account";
        loginIdGroup.style.display = "none";
        nameGroup.style.display = "block";
        emailGroup.style.display = "block";
        confirmGroup.style.display = "block";
        btnText.textContent = "Sign up";
        btnIcon.className = "fas fa-user-plus";
        switchLabel.textContent = "Already have an account?";
        switchBtn.textContent = "Log in";
      } else {
        mode = "login";
        formTitle.textContent = "Log in";
        loginIdGroup.style.display = "block";
        nameGroup.style.display = "none";
        emailGroup.style.display = "none";
        confirmGroup.style.display = "none";
        btnText.textContent = "Log in";
        btnIcon.className = "fas fa-sign-in-alt";
        switchLabel.textContent = "New here?";
        switchBtn.textContent = "Create an account";
      }
    }

    function getShopStatus() {
      return localStorage.getItem(SHOP_STATUS_KEY) || "open";
    }

    function refreshShopStatusUI() {
      const isClosed = getShopStatus() === "closed";
      if (isClosed) {
        message.textContent = "Shop is currently closed. Customer login is disabled until the owner opens it again.";
        submitBtn.disabled = true;
        submitBtn.style.opacity = "0.6";
        submitBtn.style.cursor = "not-allowed";
      } else {
        if (message.textContent.startsWith("Shop is currently closed")) {
          message.textContent = "";
        }
        submitBtn.disabled = false;
        submitBtn.style.opacity = "1";
        submitBtn.style.cursor = "pointer";
      }
    }

    async function handleSubmit() {
      message.textContent = "";
      successMsg.textContent = "";

      const shopStatus = getShopStatus();
      if (shopStatus === "closed") {
        message.textContent = "Shop is currently closed. Customer login/signup is disabled until the owner reopens it.";
        return;
      }
      message.textContent = "";
      successMsg.textContent = "";

      const users = loadUsers();

      if (mode === "login") {
          const identifier = loginIdInput.value.trim().toLowerCase();
          const password = passwordInput.value.trim();

          if (!identifier || !password) {
            message.textContent = "Please fill in login and password.";
            return;
          }

          try {
            const data = await FPAPI.post('/auth/login', { identifier, password });
            if (data && data.token) localStorage.setItem('fp_token', data.token);
            if (data && data.user) setCurrentUser(data.user);
            successMsg.textContent = 'Logged in successfully. Redirecting…';
            setTimeout(() => window.location.href = 'menu.html', 700);
            return;
          } catch (e) {
            // fallback
          }

          const user = users.find(u =>
            (u.email && u.email.toLowerCase() === identifier) ||
            (u.name && u.name.toLowerCase() === identifier)
          );

          if (!user) {
            message.textContent = "Email is not found.";
            return;
          }

          if (user.password !== password) {
            message.textContent = "Password is wrong.";
            return;
          }

          setCurrentUser(user);
          successMsg.textContent = "Logged in successfully. Redirecting…";
          setTimeout(() => {
            window.location.href = "menu.html";
          }, 700);
      } else {
        const name = nameInput.value.trim();
        const email = emailInput.value.trim().toLowerCase();
        const password = passwordInput.value.trim();
        const confirm = confirmInput.value.trim();

        if (!name || !email || !password || !confirm) {
          message.textContent = "Please fill all fields.";
          return;
        }
        if (!email.includes("@")) {
          message.textContent = "Enter a valid email address.";
          return;
        }
        if (password.length < 4) {
          message.textContent = "Password should be at least 4 characters.";
          return;
        }
        if (password !== confirm) {
          message.textContent = "Passwords do not match.";
          return;
        }
        if (users.some(u => u.email === email)) {
          message.textContent = "This email is already registered.";
          return;
        }

        try {
          const data = await FPAPI.post('/auth/signup', { name, email, password });
          if (data && data.token) localStorage.setItem('fp_token', data.token);
          if (data && data.user) setCurrentUser(data.user);
          successMsg.textContent = 'Account created! Redirecting…';
          setTimeout(() => window.location.href = 'menu.html', 800);
          return;
        } catch (e) {
          // fallback
        }

        const newUser = {
          id: Date.now(),
          name,
          email,
          password
        };
        users.push(newUser);
        saveUsers(users);
        setCurrentUser(newUser);
        successMsg.textContent = "Account created! Redirecting…";
        setTimeout(() => {
          window.location.href = "menu.html";
        }, 800);
      }
    }

    switchBtn.addEventListener("click", switchMode);
    submitBtn.addEventListener("click", handleSubmit);

    [loginIdInput, nameInput, emailInput, passwordInput, confirmInput].forEach(inp => {
      inp.addEventListener("keypress", e => {
        if (e.key === "Enter") handleSubmit();
      });
    });

    refreshShopStatusUI();

    // ---------- OWNER PASSWORD POPUP (same connection as index) ----------
    const OWNER_PASSWORD_KEY = "ownerPassword";
    const ATTEMPTS_KEY = "passwordAttempts";
    const LOCKOUT_KEY = "passwordLockout";

    function getOwnerPassword() {
      try {
        const p = localStorage.getItem(OWNER_PASSWORD_KEY);
        if (!p || !p.toString().trim()) return "1515";
        return p.toString().trim();
      } catch (e) {
        return "1515";
      }
    }

    function ownerCheckLockout() {
      const lockoutUntil = localStorage.getItem(LOCKOUT_KEY);
      const warn = document.getElementById("ownerAttemptsWarn");
      const submit = document.getElementById("ownerSubmitBtn");
      if (lockoutUntil && Date.now() < parseInt(lockoutUntil)) {
        const remaining = Math.ceil((parseInt(lockoutUntil) - Date.now()) / 1000);
        warn.textContent = `Too many failed attempts. Please wait ${remaining} seconds.`;
        warn.classList.add("show");
        submit.disabled = true;
        return true;
      } else {
        localStorage.removeItem(LOCKOUT_KEY);
        localStorage.removeItem(ATTEMPTS_KEY);
        warn.classList.remove("show");
        submit.disabled = false;
        return false;
      }
    }

    function ownerFailedAttempt() {
      let attempts = parseInt(localStorage.getItem(ATTEMPTS_KEY) || "0");
      attempts++;
      localStorage.setItem(ATTEMPTS_KEY, attempts.toString());
      if (attempts >= 3) {
        const lockoutTime = Date.now() + 30000;
        localStorage.setItem(LOCKOUT_KEY, lockoutTime.toString());
        document.getElementById("ownerAttemptsWarn").classList.add("show");
        document.getElementById("ownerSubmitBtn").disabled = true;
        setTimeout(ownerCheckLockout, 30000);
      }
    }

    function verifyOwnerPassword() {
      if (ownerCheckLockout()) return;

      const input = document.getElementById("ownerPasswordInput");
      const error = document.getElementById("ownerErrorMsg");
      const entered = (input.value || '').toString().trim();
      const correct = (getOwnerPassword() || '1515').toString().trim();

      (async () => {
        try {
          const data = await FPAPI.post('/auth/login', { identifier: 'Owner', password: entered });
          if (data && data.token) {
            localStorage.setItem('fp_owner_token', data.token);
          }
          localStorage.removeItem(ATTEMPTS_KEY);
          localStorage.removeItem(LOCKOUT_KEY);
          window.location.href = 'owner-dashboard.html';
          return;
        } catch (e) {
          // fallback
        }

        if (entered === correct) {
          localStorage.removeItem(ATTEMPTS_KEY);
          localStorage.removeItem(LOCKOUT_KEY);
          window.location.href = "owner.html";
        } else {
          input.classList.add("error");
          error.classList.add("show");
          ownerFailedAttempt();
          ownerCheckLockout();
        }
      })();
    }

    const ownerBtnTop        = document.getElementById("ownerBtnTop");
    const ownerModal         = document.getElementById("ownerPasswordModal");
    const ownerCancelBtn     = document.getElementById("ownerCancelBtn");
    const ownerSubmitBtn     = document.getElementById("ownerSubmitBtn");
    const ownerPasswordInput = document.getElementById("ownerPasswordInput");
    const ownerErrorMsg      = document.getElementById("ownerErrorMsg");

    ownerBtnTop.addEventListener("click", () => {
      ownerModal.classList.add("active");
      document.body.classList.add("modal-open");
      ownerPasswordInput.value = "";
      ownerPasswordInput.classList.remove("error");
      ownerErrorMsg.classList.remove("show");
      ownerCheckLockout();
      setTimeout(() => ownerPasswordInput.focus(), 60);
    });

    ownerCancelBtn.addEventListener("click", () => {
      ownerModal.classList.remove("active");
      document.body.classList.remove("modal-open");
    });

    ownerSubmitBtn.addEventListener("click", verifyOwnerPassword);

    ownerPasswordInput.addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        verifyOwnerPassword();
      }
    });

    ownerPasswordInput.addEventListener("input", () => {
      ownerPasswordInput.classList.remove("error");
      ownerErrorMsg.classList.remove("show");
    });

    ownerModal.addEventListener("click", (e) => {
      if (e.target === ownerModal) {
        ownerModal.classList.remove("active");
        document.body.classList.remove("modal-open");
      }
    });
  </script>
</body>
</html>
